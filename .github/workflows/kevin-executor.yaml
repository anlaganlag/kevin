# .github/workflows/kevin-executor.yaml
name: Kevin Executor

on:
  repository_dispatch:
    types: [executor-run]

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      # owner set + repositories omitted => token for all repos this app can access under
      # that owner (see actions/create-github-app-token README). Add repos only in GitHub
      # App installation settings, not here.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        continue-on-error: true
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout AgenticSDLC
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Checkout target repo
        id: checkout-target
        if: github.event.client_payload.context != ''
        env:
          CONTEXT: ${{ github.event.client_payload.context }}
          CLONE_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          SELF_REPO: ${{ github.repository }}
        run: |
          REPO=$(echo "$CONTEXT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('repo',''))" 2>/dev/null || echo "")
          REF=$(echo "$CONTEXT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('ref','main'))" 2>/dev/null || echo "main")
          if [ -n "$REPO" ] && [ "$REPO" != "$SELF_REPO" ]; then
            git clone "https://x-access-token:${CLONE_TOKEN}@github.com/${REPO}.git" target-repo
            cd target-repo && git checkout "$REF"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Kevin
        run: pip install -e .

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Kevin Executor
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          API_TIMEOUT_MS: "600000"
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          KEVIN_RUN_ID: ${{ github.event.client_payload.run_id }}
          KEVIN_BLUEPRINT_ID: ${{ github.event.client_payload.blueprint_id }}
          KEVIN_INSTRUCTION: ${{ github.event.client_payload.instruction }}
          KEVIN_CONTEXT: ${{ github.event.client_payload.context }}
          KEVIN_CALLBACK_URL: ${{ github.event.client_payload.callback_url }}
          KEVIN_CALLBACK_SECRET: ${{ secrets.CALLBACK_HMAC_SECRET }}
        run: |
          TARGET_DIR="."
          if [ -d "target-repo" ]; then TARGET_DIR="target-repo"; fi

          python -m kevin run \
            --run-id "$KEVIN_RUN_ID" \
            --blueprint "$KEVIN_BLUEPRINT_ID" \
            --instruction "$KEVIN_INSTRUCTION" \
            --context "$KEVIN_CONTEXT" \
            --callback-url "$KEVIN_CALLBACK_URL" \
            --callback-secret "$KEVIN_CALLBACK_SECRET" \
            --target-repo "$TARGET_DIR"

      - name: Fallback callback on failure
        if: failure() && github.event.client_payload.callback_url != ''
        env:
          CALLBACK_URL: ${{ github.event.client_payload.callback_url }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_HMAC_SECRET }}
          RUN_ID: ${{ github.event.client_payload.run_id }}
        run: |
          python3 -c "
          import json, hmac, hashlib, os, subprocess
          body = json.dumps({
              'run_id': os.environ['RUN_ID'],
              'status': 'failed',
              'error_code': 'WORKFLOW_FAILED',
              'error_message': 'GitHub Actions workflow failed before Kevin could execute'
          })
          sig = hmac.new(
              os.environ['CALLBACK_SECRET'].encode(),
              body.encode(),
              hashlib.sha256
          ).hexdigest()
          subprocess.run([
              'curl', '-s', '-X', 'POST', os.environ['CALLBACK_URL'],
              '-H', 'Content-Type: application/json',
              '-H', f'X-Signature: {sig}',
              '-d', body
          ], check=True)
          "
          echo "Fallback callback sent: failed"

      - name: Upload run state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kevin-run-${{ github.event.client_payload.run_id }}
          path: |
            .kevin/runs/
            target-repo/.kevin/runs/
          retention-days: 30
