# Kevin Planning Agent — Reusable Workflow
#
# Called by target repos via workflow_call.
# All logic lives here; target repos only need a thin caller workflow.

name: Kevin Reusable

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
      issue_title:
        required: false
        type: string
        default: ""
      repo:
        required: true
        type: string
      blueprint_id:
        description: "Blueprint ID to run (overrides label classification)"
        required: false
        type: string
        default: ""
      agent_id:
        description: "Agent identity posted in AgentCompletedEvent (e.g. ba-agent)"
        required: false
        type: string
        default: ""
    # Secrets must be declared to be accessible via secrets: inherit.
    # All set to required: false — actual availability depends on org/repo config.
    secrets:
      APP_ID:
        required: false
      APP_PRIVATE_KEY:
        required: false
      CHECKOUT_TOKEN:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      ANTHROPIC_BASE_URL:
        required: false
      ANTHROPIC_MODEL:
        required: false
      ANTHROPIC_SMALL_FAST_MODEL:
        required: false
      ANTHROPIC_DEFAULT_HAIKU_MODEL:
        required: false
      ANTHROPIC_DEFAULT_SONNET_MODEL:
        required: false
      ANTHROPIC_DEFAULT_OPUS_MODEL:
        required: false
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC:
        required: false
      TEAMS_BOT_URL:
        required: false

  # Direct dispatch from the Planning Agent (Azure Function → createWorkflowDispatch).
  # workflow_dispatch only supports string/boolean/choice inputs.
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number"
        required: true
        type: string
      issue_title:
        description: "Issue title (optional, used in notifications)"
        required: false
        type: string
        default: ""
      repo:
        description: "Target repo (owner/repo)"
        required: true
        type: string
      blueprint_id:
        description: "Blueprint ID to run (overrides label classification)"
        required: false
        type: string
        default: ""
      agent_id:
        description: "Agent identity posted in AgentCompletedEvent (e.g. ba-agent)"
        required: false
        type: string
        default: ""

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  kevin-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Generate a short-lived GitHub App installation token so that Kevin's
      # cross-repo operations (issue comments, PRs) appear as kevinkantkode[bot]
      # rather than as a personal account. Falls back gracefully if App credentials
      # are not configured.
      - name: Generate GitHub App token
        id: app-token
        if: secrets.APP_ID != '' && secrets.APP_PRIVATE_KEY != ''
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: "AgenticSDLC,event-driven-architecture-playground"

      - name: Checkout AgenticSDLC
        uses: actions/checkout@v4
        with:
          repository: centific-cn/AgenticSDLC
          token: ${{ steps.app-token.outputs.token || secrets.CHECKOUT_TOKEN || github.token }}
          path: agentic-sdlc

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo }}
          token: ${{ steps.app-token.outputs.token || secrets.CHECKOUT_TOKEN || github.token }}
          path: target-repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Notify Teams — Run Started
        if: env.TEAMS_BOT_URL != ''
        env:
          TEAMS_BOT_URL: ${{ secrets.TEAMS_BOT_URL }}
        run: |
          curl -sf -X POST "$TEAMS_BOT_URL/api/notify" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "run_started",
              "run_id": "gh-${{ github.run_id }}",
              "issue_number": ${{ inputs.issue_number }},
              "issue_title": ${{ toJSON(inputs.issue_title) }},
              "repo": "${{ inputs.repo }}",
              "blueprint_id": "",
              "status": "running",
              "blocks": []
            }' || echo "::warning::Teams notification failed (non-fatal)"

      - name: Run Kevin
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ secrets.ANTHROPIC_SMALL_FAST_MODEL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ secrets.ANTHROPIC_DEFAULT_HAIKU_MODEL }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ secrets.ANTHROPIC_DEFAULT_SONNET_MODEL }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ secrets.ANTHROPIC_DEFAULT_OPUS_MODEL }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: ${{ secrets.CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC }}
          API_TIMEOUT_MS: "600000"
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.CHECKOUT_TOKEN || github.token }}
          TEAMS_BOT_URL: ${{ secrets.TEAMS_BOT_URL }}
        working-directory: agentic-sdlc
        run: |
          python -m kevin run \
            --issue ${{ inputs.issue_number }} \
            --repo ${{ inputs.repo }} \
            --target-repo ${{ github.workspace }}/target-repo \
            ${{ inputs.blueprint_id != '' && format('--blueprint {0}', inputs.blueprint_id) || '' }} \
            ${{ inputs.agent_id != '' && format('--agent-id {0}', inputs.agent_id) || '' }} \
            --verbose

      - name: Notify Teams — Run Completed
        if: success() && env.TEAMS_BOT_URL != ''
        env:
          TEAMS_BOT_URL: ${{ secrets.TEAMS_BOT_URL }}
        run: |
          curl -sf -X POST "$TEAMS_BOT_URL/api/notify" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "run_completed",
              "run_id": "gh-${{ github.run_id }}",
              "issue_number": ${{ inputs.issue_number }},
              "issue_title": ${{ toJSON(inputs.issue_title) }},
              "repo": "${{ inputs.repo }}",
              "status": "completed",
              "blocks": []
            }' || echo "::warning::Teams notification failed (non-fatal)"

      - name: Notify Teams — Run Failed
        if: failure() && env.TEAMS_BOT_URL != ''
        env:
          TEAMS_BOT_URL: ${{ secrets.TEAMS_BOT_URL }}
        run: |
          curl -sf -X POST "$TEAMS_BOT_URL/api/notify" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "run_failed",
              "run_id": "gh-${{ github.run_id }}",
              "issue_number": ${{ inputs.issue_number }},
              "issue_title": ${{ toJSON(inputs.issue_title) }},
              "repo": "${{ inputs.repo }}",
              "status": "failed",
              "error": "Check workflow logs for details",
              "blocks": []
            }' || echo "::warning::Teams notification failed (non-fatal)"

      - name: Upload Kevin run state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kevin-run-issue-${{ inputs.issue_number }}
          path: ${{ github.workspace }}/target-repo/.kevin/runs/
          retention-days: 30

      - name: Post failure comment
        if: failure()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.CHECKOUT_TOKEN || github.token }}
        run: |
          gh issue comment ${{ inputs.issue_number }} \
            --repo ${{ inputs.repo }} \
            --body "Kevin run **failed**. Check [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
