# Kevin Planning Agent — Direct Dispatch
#
# Triggered by the Planning Agent (Azure Function → createWorkflowDispatch).
# Converts workflow_dispatch inputs into a workflow_call to the reusable workflow.
#
# Why a separate file: reusable workflows (workflow_call) cannot have other
# trigger types. This thin wrapper bridges workflow_dispatch → workflow_call.

name: Kevin Dispatch

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number"
        required: true
        type: string
      issue_title:
        description: "Issue title (optional, used in notifications)"
        required: false
        type: string
        default: ""
      repo:
        description: "Target repo (owner/repo)"
        required: true
        type: string
      blueprint_id:
        description: "Blueprint ID to run (overrides label classification)"
        required: false
        type: string
        default: ""
      agent_id:
        description: "Agent identity posted in AgentCompletedEvent (e.g. ba-agent)"
        required: false
        type: string
        default: ""

jobs:
  kevin:
    uses: centific-cn/AgenticSDLC/.github/workflows/kevin-reusable.yaml@main
    with:
      issue_number: ${{ fromJSON(inputs.issue_number) }}
      issue_title: ${{ inputs.issue_title }}
      repo: ${{ inputs.repo }}
      blueprint_id: ${{ inputs.blueprint_id }}
      agent_id: ${{ inputs.agent_id }}
    secrets: inherit
