  # ================================================================
  # 9. 风险和应急处理
  # ================================================================
  risk_management:
    # 风险识别
    risks:
      - risk_id: "R001"
        risk_type: "technical"
        description: "JWT 实现的安全漏洞"
        probability: "low"
        impact: "critical"
        mitigation: "使用成熟的 jwt-go 库，遵循最佳实践"
        status: "mitigated"

      - risk_id: "R002"
        risk_type: "security"
        description: "密码存储不安全"
        probability: "low"
        impact: "critical"
        mitigation: "强制使用 bcrypt 加密，cost factor ≥ 12"
        status: "mitigated"

      - risk_id: "R003"
        risk_type: "performance"
        description: "高并发下的性能问题"
        probability: "medium"
        impact: "high"
        mitigation: "实施连接池、缓存、速率限制"
        status: "monitored"

    # 应急处理（未触发）
    escalation_triggers:
      - trigger: "budget_exceeded"
        condition: "total_cost_usd > budget_usd"
        threshold: "$10.00"
        actual: "$4.25"
        status: "not_triggered"

      - trigger: "fix_loop_non_convergence"
        condition: "iteration_count > 3 AND issues_remaining > 0"
        actual: "iteration_count = 0"
        status: "not_triggered"

      - trigger: "security_gate_failure"
        condition: "critical_findings > 0 OR high_findings > 0"
        actual: "critical = 0, high = 0"
        status: "not_triggered"

      - trigger: "agent_timeout"
        condition: "execution_time > timeout_limit"
        threshold: "24 hours"
        actual: "6.5 hours"
        status: "not_triggered"

  # ================================================================
  # 10. 配置和参数
  # ================================================================
  config:
    # 风险级别
    risk_level: "medium"

    # 是否需要安全审查
    requires_security_review: true
    security_review_completed: true

    # 部署策略
    deployment_strategy: "canary"
    canary_percentage: 10
    rollout_duration_minutes: 30

    # 并行度
    parallelism:
      max_parallel_blocks: 3
      max_parallel_agents: 2
      actual_parallelism: 2

    # 超时设置
    timeouts:
      block_timeout: "2h"
      blueprint_timeout: "24h"
      agent_timeout: "30m"
      actual_execution_time: "6.5h"

    # 重试策略
    retry:
      max_retries: 3
      retry_delay: "5m"
      backoff_multiplier: 2
      actual_retries: 0

    # 通知配置
    notifications:
      on_start: true
      on_complete: true
      on_failure: false
      channels: ["slack", "email"]
      notifications_sent: 2

