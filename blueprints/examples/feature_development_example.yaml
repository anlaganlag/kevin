# Blueprint 示例: 用户认证系统开发
# 基于 blueprint_template.yaml
# 这是一个完整的功能开发 Blueprint 示例

blueprint:
  # ================================================================
  # 1. 基本信息
  # ================================================================
  metadata:
    # Blueprint ID 遵循语义化命名规范
    blueprint_id: "bp_auth_feature_jwt_authentication.1.0.0"
    blueprint_name: "用户认证系统开发"
    blueprint_type: "feature"
    version: "1.0.0"
    created_at: "2026-03-26T10:00:00Z"
    created_by: "BA_Agent"
    tags:
      - "feature"
      - "auth"
      - "security"
      - "high-priority"

  # ================================================================
  # 2. 输入定义
  # ================================================================
  input:
    # 触发器定义
    trigger:
      event_type: "IssueCreatedEvent"
      event_source: "github"
      event_schema:
        issue_id: "GH-123"
        issue_type: "requirement"
        labels: ["feature", "auth", "security"]
        priority: "high"
        title: "实现基于 JWT 的用户认证系统"
        description: |
          需要实现一个完整的用户认证系统，包括：
          - 用户注册和登录
          - JWT Token 生成和验证
          - 密码加密存储
          - 会话管理
          - 基于角色的访问控制 (RBAC)

    # 任务类型映射
    task_mapping:
      requirement:
        primary_phase: "analysis"
        entry_point: "BA_Agent"

    # 输入上下文
    context:
      source_documents:
        - type: "Raw Requirement"
          location: "github://owner/repo/issues/123"
          required: true

        - type: "Business Context"
          location: "docs/business/auth_requirements.md"
          required: true

      data_sources:
        - "Git Repository (main branch)"
        - "Learning Agent Knowledge Base"
        - "Infrastructure State (Platform Agent)"

  # ================================================================
  # 3. 执行 Agent 配置
  # ================================================================
  execution:
    # Primary Agent 选择
    primary_agent:
      agent_type: "BA_Agent"
      selection_logic:
        # 基于 Issue 标签和类型
        reasoning: |
          1. Issue type = "requirement" → 默认 BA_Agent
          2. Labels include "security" → 考虑 SecurityAgent
          3. 复杂度高，需要需求分析优先
          → 决定: BA_Agent 作为 primary，SecurityAgent 作为支持

      responsibilities:
        - "需求澄清和结构化"
        - "用户故事编写"
        - "协调后续架构设计"

    # Sub-Agents 协调
    sub_agents:
      # 第一阶段: 需求分析
      - agent_type: "BA_Agent"
        phase: "analysis"
        responsibilities:
          - "需求澄清和结构化"
          - "生成 BRD 和用户故事"
          - "识别安全要求"
        coordination: "sequential"

      # 第二阶段: 架构设计
      - agent_type: "PlanningAgent"
        phase: "design"
        responsibilities:
          - "系统架构设计"
          - "API 合约定义"
          - "任务分解"
        coordination: "event_driven"
        dependencies: ["analysis_complete"]

      # 第三阶段: 并行执行
      - agent_type: "BuilderAgent"
        phase: "implementation"
        responsibilities:
          - "实现认证 API"
          - "编写单元测试"
          - "代码提交"
        coordination: "event_driven"
        dependencies: ["design_complete"]

      - agent_type: "PlatformAgent"
        phase: "infrastructure"
        responsibilities:
          - "生成 IaC 配置"
          - "配置密钥管理"
          - "设置网络策略"
        coordination: "parallel_with_builder"
        dependencies: ["design_complete"]

      # 第四阶段: 验证（并行）
      - agent_type: "QAAgent"
        phase: "verification"
        responsibilities:
          - "集成测试"
          - "边界测试"
          - "性能测试"
        coordination: "parallel_with_security"
        dependencies: ["implementation_complete", "infrastructure_complete"]

      - agent_type: "SecurityAgent"
        phase: "security"
        responsibilities:
          - "安全扫描"
          - "漏洞评估"
          - "OWASP Top 10 检查"
        coordination: "parallel_with_qa"
        dependencies: ["implementation_complete"]

      # 第五阶段: 部署
      - agent_type: "SREAgent"
        phase: "deployment"
        responsibilities:
          - "金丝雀部署"
          - "监控配置"
          - "回滚准备"
        coordination: "sequential"
        dependencies: ["verification_complete"]

  # ================================================================
  # 4. 技能和工具配置
  # ================================================================
  capabilities:
    # Agent 技能集
    agent_skills:
      BA_Agent:
        - "requirement_analysis"
        - "user_story_writing"
        - "brd_generation"
        - "security_requirement_identification"

      PlanningAgent:
        - "blueprint_design"
        - "task_decomposition"
        - "api_contract_design"
        - "security_architecture_design"

      BuilderAgent:
        - "code_generation"
        - "jwt_implementation"
        - "password_hashing"
        - "unit_test_writing"

      QAAgent:
        - "test_generation"
        - "authentication_testing"
        - "boundary_testing"
        - "performance_testing"

      SecurityAgent:
        - "sast_analysis"
        - "dast_analysis"
        - "owasp_top_10_check"
        - "vulnerability_assessment"

      PlatformAgent:
        - "terraform_generation"
        - "k8s_secret_management"
        - "network_policy_configuration"
        - "vault_integration"

    # 工具访问权限
    tool_access:
      - tool: "github_api"
        permissions:
          - "issues:read/write"
          - "pull_requests:read/write"
          - "commits:read/write"

      - tool: "bash_execution"
        permissions:
          - "command_execution"
          - "file_operations"

      - tool: "learning_agent_query"
        permissions:
          - "knowledge_base:read"
          - "pattern_matching"

      - tool: "platform_agent_api"
        permissions:
          - "infra_state:read"
          - "resource_quotas:read"
          - "secret_management:write"

  # ================================================================
  # 5. 任务执行流程
  # ================================================================
  workflow:
    # Ralph Loop 5步执行流程
    ralph_loop:
      # Step 1: 确认 Primary Agent
      step_1:
        action: "PlannerAgent → BA_Agent as Primary"
        input:
          issue_type: "requirement"
          labels: ["feature", "auth", "security"]
          priority: "high"
        output: "BA_Agent assigned as Primary"
        reasoning: |
          - Issue type = requirement → Default: BA_Agent
          - Has security label → Involve SecurityAgent
          → BA_Agent as primary, SecurityAgent as secondary

      # Step 2: 加载规则和上下文
      step_2:
        action: "BA_Agent → Load Rules + Context"
        input_sources:
          - source: "Infra Dependency Layer (Static)"
            content:
              language_stack: ["Go", "TypeScript"]
              framework_versions:
                go: "1.21+"
                node: "20.x"
              security_policies: "OWASP Top 10 compliance"
              access_constraints:
                vpn_required: false
                authentication_methods: "mTLS for service-to-service"

          - source: "Infra Dependency Layer (Dynamic)"
            content:
              resource_quotas:
                cpu_usage_percent: 45
                memory_usage_percent: 52
              deployment_status:
                environment: "staging"
                healthy_replicas: 3

          - source: "Learning Agent"
            content:
              success_patterns:
                - "JWT + mTLS for authentication"
                - "bcrypt for password hashing"
              failure_lessons:
                - "Avoid hardcoded secrets"
                - "Never store plain text passwords"
              security_best_practices:
                - "Use HTTPS only"
                - "Implement rate limiting"
                - "Log authentication attempts"

        output: "Execution strategy formulated"

      # Step 3: 协调 Sub-Agents
      step_3:
        action: "BA_Agent → Coordinate Sub-Agents"
        coordination_model: "hybrid"
        dependency_graph:
          blocks:
            # 阶段 1: 需求分析
            - block_id: "B1"
              name: "requirement_analysis"
              assigned_to: "BA_Agent"
              dependencies: []
              skills: ["requirement_analysis", "user_story_writing"]
              output: "Structured BRD and User Stories"

            # 阶段 2: 架构设计
            - block_id: "B2"
              name: "architecture_design"
              assigned_to: "PlanningAgent"
              dependencies: ["B1"]
              skills: ["blueprint_design", "api_contract_design"]
              output: "Technical Blueprint and API Specs"

            # 阶段 3a: 实现
            - block_id: "B3"
              name: "auth_implementation"
              assigned_to: "BuilderAgent"
              dependencies: ["B2"]
              skills: ["code_generation", "jwt_implementation"]
              output: "Authentication Service Code"

            # 阶段 3b: 基础设施（与实现并行）
            - block_id: "B4"
              name: "infrastructure_setup"
              assigned_to: "PlatformAgent"
              dependencies: ["B2"]
              skills: ["terraform_generation", "vault_integration"]
              output: "IaC Configuration and Secrets"

            # 阶段 4a: QA 测试
            - block_id: "B5"
              name: "qa_testing"
              assigned_to: "QAAgent"
              dependencies: ["B3", "B4"]
              skills: ["test_generation", "authentication_testing"]
              output: "Test Report and Coverage"

            # 阶段 4b: 安全扫描（与 QA 并行）
            - block_id: "B6"
              name: "security_scanning"
              assigned_to: "SecurityAgent"
              dependencies: ["B3", "B4"]
              skills: ["sast_analysis", "owasp_top_10_check"]
              output: "Security Scan Report"

            # 阶段 5: 部署
            - block_id: "B7"
              name: "deployment"
              assigned_to: "SREAgent"
              dependencies: ["B5", "B6"]
              skills: ["canary_deployment", "monitoring_setup"]
              output: "Deployment Manifest and Monitoring Config"

          execution_order: "B1 → B2 → (B3 + B4 parallel) → (B5 + B6 parallel) → B7"

      # Step 4: 确认完成并交付输出
      step_4:
        action: "Confirm Completion + Deliver Output"
        deliverables:
          - type: "github_issue_update"
            content:
              parent_issue: "GH-123"
              status: "In Progress → Done"
              comments:
                - "✅ requirement_analysis (BA_Agent) - Complete"
                - "✅ architecture_design (PlanningAgent) - Complete"
                - "✅ auth_implementation (BuilderAgent) - Complete"
                - "✅ infrastructure_setup (PlatformAgent) - Complete"
                - "✅ qa_testing (QAAgent) - Complete"
                - "✅ security_scanning (SecurityAgent) - Complete"
                - "✅ deployment (SREAgent) - Complete"
              labels:
                remove: ["in-progress"]
                add: ["completed", "ready-for-merge"]

          - type: "artifact"
            artifact_type: "blueprint_execution_report"
            content:
              blueprint_id: "bp_auth_feature_jwt_authentication.1.0.0"
              blueprint_name: "用户认证系统开发"
              execution_start: "2026-03-26T10:00:00Z"
              execution_end: "2026-03-26T16:30:00Z"
              duration_hours: 6.5
              status: "success"

              blocks_executed:
                - block_id: "B1"
                  name: "requirement_analysis"
                  agent: "BA_Agent"
                  status: "completed"
                  duration_minutes: 45
                  artifacts: ["brd_auth_system.md", "user_stories.md"]

                - block_id: "B2"
                  name: "architecture_design"
                  agent: "PlanningAgent"
                  status: "completed"
                  duration_minutes: 90
                  artifacts: ["auth_blueprint.yaml", "api_contract_openapi.yaml"]

                - block_id: "B3"
                  name: "auth_implementation"
                  agent: "BuilderAgent"
                  status: "completed"
                  duration_minutes: 180
                  artifacts: ["auth_service.go", "jwt_handler.go", "password_utils.go"]

                - block_id: "B4"
                  name: "infrastructure_setup"
                  agent: "PlatformAgent"
                  status: "completed"
                  duration_minutes: 60
                  artifacts: ["terraform_auth.tf", "k8s_auth_deployment.yaml"]

                - block_id: "B5"
                  name: "qa_testing"
                  agent: "QAAgent"
                  status: "completed"
                  duration_minutes: 120
                  artifacts: ["test_report.xml", "coverage_report.html"]

                - block_id: "B6"
                  name: "security_scanning"
                  agent: "SecurityAgent"
                  status: "completed"
                  duration_minutes: 45
                  artifacts: ["security_scan_report.sarif"]

                - block_id: "B7"
                  name: "deployment"
                  agent: "SREAgent"
                  status: "completed"
                  duration_minutes: 30
                  artifacts: ["canary_deployment.yaml", "monitoring_dashboard.json"]

              output_artifacts:
                - artifact_id: "artifact-001"
                  type: "brd"
                  name: "Auth System BRD"
                  storage_location: "github://owner/repo/docs/brd_auth_system.md"

                - artifact_id: "artifact-002"
                  type: "blueprint"
                  name: "Auth Blueprint"
                  storage_location: "github://owner/repo/docs/auth_blueprint.yaml"

                - artifact_id: "artifact-003"
                  type: "code"
                  name: "Auth Service Code"
                  storage_location: "github://owner/repo/src/auth/"

                - artifact_id: "artifact-004"
                  type: "test_report"
                  name: "Test Report"
                  storage_location: "s3://artifacts/test-reports/auth_system_20260326.xml"

                - artifact_id: "artifact-005"
                  type: "security_scan"
                  name: "Security Scan Report"
                  storage_location: "s3://artifacts/security-scans/auth_system_20260326.sarif"

              metrics:
                total_blocks: 7
                completed_blocks: 7
                failed_blocks: 0
                total_tokens_used: 85000
                total_cost_usd: 4.25
                test_coverage_percentage: 96.5
                security_vulnerabilities:
                  critical: 0
                  high: 0
                  medium: 1
                  low: 3

      # Step 5: 审计和治理决策
      step_5:
        action: "Audit Agents → Generate Audit Report"
        phase_1_parallel_audits:
          - agent: "SecurityAuditAgent"
            scope: "安全审计"
            checks:
              - "SAST 扫描验证": "passed"
              - "DAST 漏洞检查": "passed"
              - "密钥检测": "passed"
              - "依赖安全": "passed"
              - "OWASP Top 10": "passed"
            output: "SecurityAuditReport Artifact"
            status: "passed"

          - agent: "QualityAuditAgent"
            scope: "质量审计"
            checks:
              - "测试覆盖率": "96.5% ≥ 95% = passed"
              - "代码标准合规": "passed"
              - "技术债务评估": "low"
              - "代码审查完整性": "passed"
            output: "QualityAuditReport Artifact"
            status: "passed"

          - agent: "ComplianceAuditAgent"
            scope: "合规审计"
            checks:
              - "API 合约合规": "passed"
              - "文档完整性": "passed"
              - "许可证合规": "passed"
              - "数据保护合规": "passed"
            output: "ComplianceAuditReport Artifact"
            status: "passed"

          - agent: "CostAuditAgent"
            scope: "成本审计"
            checks:
              - "Token 使用": "85000 ≤ 100000 = passed"
              - "计算资源": "reasonable"
              - "存储成本": "as expected"
            output: "CostAuditReport Artifact"
            status: "passed"

        phase_2_governance_decision:
          inputs:
            - "BlueprintExecutionReport"
            - "SecurityAuditReport"
            - "QualityAuditReport"
            - "ComplianceAuditReport"
            - "CostAuditReport"

          gates_check:
            quality_gate:
              condition: "test_coverage ≥ 95% AND code_smells ≤ 5"
              actual: "test_coverage = 96.5%, code_smells = 2"
              status: "passed"

            security_gate:
              condition: "critical_findings == 0 AND high_findings == 0"
              actual: "critical = 0, high = 0"
              status: "passed"

            compliance_gate:
              condition: "all_compliance_checks_passed"
              actual: "all checks passed"
              status: "passed"

            budget_gate:
              condition: "total_cost_usd ≤ budget_usd"
              actual: "$4.25 ≤ $10.00"
              status: "passed"

          final_decision:
            status: "passed"
            reason: "所有 gates 通过，Blueprint 执行成功"
            action: "允许进入 HITL Gate 2（最终审查）"

  # ================================================================
  # 6. 约束和依赖
  # ================================================================
  constraints:
    # 基础设施依赖层 (EEF)
    infra_dependency_layer:
      static_constraints:
        version_control:
          git_repositories: "owner/repo"
          branch_strategy: "trunk-based"
          pr_policies: "Require 2 approvals, all checks must pass"

        pipeline_system:
          ci_platform: "github_actions"
          cd_strategy: "canary"
          pipeline_templates: ".github/workflows/standard.yml"

        configuration_system:
          config_management: "Environment variables + Config files"
          secret_management: "HashiCorp Vault"
          feature_flags: "LaunchDarkly"

        network_architecture:
          regions: ["us-east-1", "us-west-2"]
          vpc_topology: "Multi-AZ VPC"
          service_mesh: "AWS App Mesh"

        access_constraints:
          bastion_host: "bastion.company.com"
          vpn_required: false
          authentication_methods: "mTLS for service-to-service"

        technical_constraints:
          language_stack: ["Go 1.21+", "TypeScript 5.0+", "Python 3.11+"]
          framework_versions:
            go: "1.21+"
            node: "20.x"
            python: "3.11+"
          resource_quotas:
            max_cpu_cores: 16
            max_memory_gb: 32
          security_policies: "OWASP Top 10, SOC2 compliance"

      dynamic_constraints:
        resource_quotas:
          cpu_usage_percent: 45
          memory_usage_percent: 52
          storage_available_gb: 450

        deployment_status:
          environment: "staging"
          healthy_replicas: 3
          total_replicas: 3
          last_deployment: "2026-03-25T15:00:00Z"

        pipeline_health:
          ci_status: "operational"
          cd_status: "operational"
          last_failure: null

    # 业务规则依赖
    business_rules:
      # 安全规则
      security_rules:
        source: "docs/security_policy.md"
        rules:
          - "使用 HTTPS only"
          - "密码必须使用 bcrypt 加密（cost factor ≥ 12）"
          - "JWT Token 必须签名并设置过期时间"
          - "实施速率限制（rate limiting）"
          - "记录所有认证尝试"
          - "永不存储明文密码"

      # 命名规范
      naming_rules:
        source: "docs/naming_conventions.md"
        conventions:
          go_files: "snake_case"
          go_functions: "PascalCase (exported), camelCase (private)"
          go_variables: "camelCase"
          go_constants: "PascalCase"
          go_interfaces: "PascalCase ending with 'er'"

      # 代码风格
      code_style:
        source: ".golangci.yml"
        linters: ["golangci-lint"]
        formatters: ["gofmt", "goimports"]
        rules:
          - "Max line length: 120"
          - "Max function complexity: 10"
          - "Max function lines: 50"

    # 依赖管理
    dependencies:
      internal:
        - "shared/utils"
        - "shared/logger"
        - "shared/config"

      external:
        - name: "github.com/golang-jwt/jwt/v5"
          version: "v5.2.0"
          purpose: "JWT token generation and validation"

        - name: "golang.org/x/crypto/bcrypt"
          version: "latest"
          purpose: "Password hashing"

        - name: "github.com/gin-gonic/gin"
          version: "v1.9.1"
          purpose: "HTTP framework"

      dependency_resolution:
        strategy: "version_locking"
        conflict_resolution: "fail"

  # ================================================================
  # 7. 完成条件和输出
  # ================================================================
  completion:
    # 验收条件
    acceptance_criteria:
      functional:
        - "用户可以注册新账户"
        - "用户可以使用邮箱和密码登录"
        - "系统生成并验证 JWT Token"
        - "Token 过期后需要重新认证"
        - "支持基于角色的访问控制 (RBAC)"
        - "密码重置功能正常工作"

      non_functional:
        - "测试覆盖率 ≥ 95%"
        - "API 响应时间 < 200ms (p95)"
        - "支持 1000+ 并发用户"
        - "无关键和高危安全漏洞"
        - "符合 OWASP Top 10 标准"
        - "所有认证尝试都有审计日志"

      process:
        - "代码审查完成并批准"
        - "安全扫描通过"
        - "集成测试通过"
        - "文档更新完成"
        - "部署到 staging 环境"
        - "金丝雀部署成功"

    # 输出制品
    artifacts:
      # 代码制品
      code_artifacts:
        - artifact_type: "source_code"
          name: "认证服务代码"
          storage_location: "github://owner/repo/src/auth/"
          files:
            - "auth_service.go"
            - "jwt_handler.go"
            - "password_utils.go"
            - "middleware.go"
            - "models.go"
          format: "Go source code"

        - artifact_type: "unit_tests"
          name: "单元测试"
          storage_location: "github://owner/repo/src/auth/"
          files:
            - "auth_service_test.go"
            - "jwt_handler_test.go"
            - "password_utils_test.go"
          format: "Go test code"

        - artifact_type: "integration_tests"
          name: "集成测试"
          storage_location: "github://owner/repo/tests/integration/auth/"
          files:
            - "auth_flow_test.go"
            - "api_integration_test.go"
          format: "Go test code"

      # 文档制品
      documentation_artifacts:
        - artifact_type: "brd"
          name: "业务需求文档"
          storage_location: "github://owner/repo/docs/brd_auth_system.md"
          format: "Markdown"

        - artifact_type: "api_doc"
          name: "API 文档"
          storage_location: "github://owner/repo/docs/api/auth_openapi.yaml"
          format: "OpenAPI 3.0"

        - artifact_type: "architecture_diagram"
          name: "架构图"
          storage_location: "github://owner/repo/docs/diagrams/auth_architecture.mmd"
          format: "Mermaid"

        - artifact_type: "changelog"
          name: "变更日志"
          storage_location: "github://owner/repo/CHANGELOG.md"
          format: "Markdown"

      # 报告制品
      report_artifacts:
        - artifact_type: "blueprint_execution_report"
          name: "Blueprint 执行报告"
          storage_location: "s3://artifacts/blueprint-reports/bp_auth_feature_jwt_authentication.1.0.0.json"
          format: "JSON"

        - artifact_type: "test_report"
          name: "测试报告"
          storage_location: "s3://artifacts/test-reports/auth_system_20260326.xml"
          format: "JUnit XML"

        - artifact_type: "coverage_report"
          name: "覆盖率报告"
          storage_location: "s3://artifacts/coverage-reports/auth_system_20260326.html"
          format: "HTML"

        - artifact_type: "security_scan"
          name: "安全扫描报告"
          storage_location: "s3://artifacts/security-scans/auth_system_20260326.sarif"
          format: "SARIF"

      # 部署制品
      deployment_artifacts:
