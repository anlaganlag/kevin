        target: "≤ 4h"
        actual: 2.5
        status: "passed"

      - metric_name: "test_implementation_time"
        description: "测试实现时间"
        unit: "hours"
        target: "≤ 6h"
        actual: 3.5
        status: "passed"

      - metric_name: "test_execution_time"
        description: "测试执行时间"
        unit: "hours"
        target: "≤ 2h"
        actual: 1.5
        status: "passed"

      - metric_name: "token_usage"
        description: "Token 使用量"
        unit: "tokens"
        target: "≤ 100000"
        actual: 95000
        status: "passed"

    # Quality Metrics
    quality:
      - metric_name: "test_coverage"
        description: "测试覆盖率"
