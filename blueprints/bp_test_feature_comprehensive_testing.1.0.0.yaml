# Comprehensive Testing Automation Blueprint
# Blueprint for end-to-end testing automation with multi-agent coordination
# Ralph Loop execution with QAAgent (Test Lead) for comprehensive testing strategy

blueprint:
  # ================================================================
  # 1. Basic Information
  # ================================================================
  metadata:
    blueprint_id: "bp_test_feature_comprehensive_testing.1.0.0"
    blueprint_name: "Comprehensive Testing Automation"
    blueprint_type: "test"
    version: "1.0.0"
    created_at: "2026-03-27T10:00:00Z"
    created_by: "QAAgent"
    tags:
      - "testing"
      - "qa"
      - "automation"
      - "comprehensive"
      - "test_strategy"
      - "multi_agent"

  # ================================================================
  # 2. Configuration Loading Declaration
  # ================================================================
  configuration:
    # Profile Reference
    profile:
      name: "strict_profile"
      description: "Strict testing profile with comprehensive coverage requirements"

    # Rules Loading
    rules:
      # Load entire rule directories
      load_from:
        - ".agentic/rules/naming/"
        - ".agentic/rules/security/"
        - ".agentic/rules/code_style/"
        - ".agentic/rules/testing/"
        - ".agentic/rules/workflows/"

      # Specific rule files
      specific:
        - ".agentic/rules/naming/general.yaml"
        - ".agentic/rules/security/owasp_top10.yaml"
        - ".agentic/rules/testing/coverage.yaml"
        - ".agentic/rules/testing/unit_tests.yaml"
        - ".agentic/rules/testing/integration_tests.yaml"

      # Test-specific inline rules
      inline:
        custom_rules:
          - name: "test_coverage_mandatory"
            rule: "All code must have test coverage ≥ 95%"
            enforcement: "strict"
            validator: "coverage_validator"

          - name: "test_first_approach"
            rule: "Test scenarios must be designed before implementation when possible"
            enforcement: "moderate"
            validator: "test_design_validator"

          - name: "rl_style_testing"
            rule: "Use RL-style exploration for edge case discovery in complex state spaces"
            enforcement: "strict"
            validator: "rl_testing_validator"

          - name: "synthetic_data_generation"
            rule: "Generate synthetic test data for realistic production-like scenarios"
            enforcement: "strict"
            validator: "data_generation_validator"

          - name: "adversarial_testing"
            rule: "Include adversarial/fuzzing tests for security-sensitive components"
            enforcement: "strict"
            validator: "adversarial_validator"

    # Constraints Loading
    constraints:
      # Load entire constraint directories
      load_from:
        - ".agentic/constraints/infra/static/"
        - ".agentic/constraints/devops/ci/"

      # Specific constraint files
      specific:
        - ".agentic/constraints/infra/static/technical_stack.yaml"
        - ".agentic/constraints/devops/ci/quality_gates.yaml"

      # Testing-specific inline constraints
      inline:
        testing_constraints:
          minimum_coverage: 95
          critical_path_coverage: 100
          integration_test_coverage: 90
          e2e_test_coverage: 85

        test_environments:
          - name: "unit_test"
            type: "local"
            isolation: "mock"
          - name: "integration_test"
            type: "container"
            isolation: "docker"
          - name: "e2e_test"
            type: "staging"
            isolation: "namespace"

        test_tools:
          unit_testing:
            - "go test"
            - "jest"
            - "pytest"
          integration_testing:
            - "testcontainers"
            - "docker-compose"
          e2e_testing:
            - "playwright"
            - "cypress"
          performance_testing:
            - "k6"
            - "jmeter"
          security_testing:
            - "owasp_zap"
            - "semgrep"

  # ================================================================
  # 3. Input Definition
  # ================================================================
  input:
    # Trigger Definition
    trigger:
      event_type: "IssueCreatedEvent | RequirementReadyEvent | FeatureCompleteEvent"
      event_source: "github"
      event_schema:
        issue_id: "23"
        issue_type: "test"
        labels: ["testing", "qa", "automation"]
        priority: "high"
        complexity: "medium"
        estimated_hours: "8-16"
        description: "Comprehensive testing automation for feature or release"

    # Task Type Mapping
    task_mapping:
      testing:
        primary_phase: "test_strategy_and_execution"
        entry_point: "QAAgent"

      feature_testing:
        primary_phase: "comprehensive_testing"
        entry_point: "QAAgent"

      release_testing:
        primary_phase: "release_validation"
        entry_point: "QAAgent"

    # Input Context
    context:
      source_documents:
        - type: "GitHub Issue (Testing Task)"
          location: "github://centific-cn/AgenticSDLC/issues/23"
          required: true
          description: "Testing requirements and scope"
          contains:
            - "Test scope and objectives"
            - "Features to be tested"
            - "Testing timeline constraints"
            - "Acceptance criteria for testing"

        - type: "Requirements Documentation"
          location: "requirements/brd_*.md"
          required: true
          description: "Business requirements and user stories"

        - type: "Architecture Design"
          location: "docs/architecture/architecture_design.md"
          required: true
          description: "System architecture and component design"

        - type: "API Specifications"
          location: "docs/api/api_contract_openapi.yaml"
          required: true
          description: "API contracts and endpoint definitions"

        - type: "Implementation Code"
          location: "github://centific-cn/AgenticSDLC/tree/main/src"
          required: true
          description: "Source code to be tested"

        - type: "Existing Test Suite"
          location: "tests/"
          required: true
          description: "Current test coverage and test cases"

      data_sources:
        - "Git Repository (feature branch)"
        - "Learning Agent (test patterns, failure history)"
        - "Infrastructure State (test environments)"
        - "Monitoring Data (production metrics for baseline)"

  # ================================================================
  # 4. Execution Agent Configuration
  # ================================================================
  execution:
    # Primary Agent Selection
    primary_agent:
      agent_type: "QAAgent"
      role: "Test Lead"
      selection_logic:
        reasoning: |
          1. Issue type = "test" OR label = "testing" OR "qa" → QAAgent
          2. Task requires comprehensive testing strategy → QAAgent core competency
          3. Need RL-style exploration and test design → QAAgent expertise
          4. Need coordination across test types → QAAgent leadership
          → Decision: QAAgent as Primary Agent (Test Lead)

      responsibilities:
        - "Design comprehensive test strategy"
        - "Coordinate all testing phases"
        - "Generate test scenarios"
        - "Execute test suites"
        - "Report test results"
        - "Coordinate defect triage"

    # Sub-Agents Coordination
    sub_agents:
      # 1. Test Lead (QAAgent - Primary)
      - agent_type: "QAAgent"
        role: "Test Lead"
        phase: "test_strategy_and_coordination"
        responsibilities:
          - "Design overall test strategy"
          - "Define test coverage requirements"
          - "Coordinate test execution phases"
          - "Review and approve test scenarios"
          - "Sign off on test completion"
        coordination: "primary_agent"

      # 2. Architecture Agent (PlanningAgent)
      - agent_type: "PlanningAgent"
        role: "Architecture Test Designer"
        phase: "architecture_test_design"
        responsibilities:
          - "Analyze architecture for test points"
          - "Design integration test strategy"
          - "Identify architectural dependencies"
          - "Design contract testing approach"
          - "Define test environment architecture"
        coordination: "consultative"

      # 3. Development Lead (BuilderAgent)
      - agent_type: "BuilderAgent"
        role: "Development Lead"
        phase: "unit_test_coordination"
        responsibilities:
          - "Review unit test coverage"
          - "Validate unit test quality"
          - "Ensure testability of code"
          - "Provide implementation context"
          - "Support test fixture creation"
        coordination: "consultative"

      # 4. Backend Expert (BuilderAgent - Backend)
      - agent_type: "BuilderAgent"
        role: "Backend Testing Expert"
        phase: "backend_test_design"
        responsibilities:
          - "Design backend unit tests"
          - "Design API integration tests"
          - "Create backend test fixtures"
          - "Design contract tests"
          - "Validate backend test coverage"
        coordination: "event_driven"

      # 5. Frontend Expert (BuilderAgent - Frontend)
      - agent_type: "BuilderAgent"
        role: "Frontend Testing Expert"
        phase: "frontend_test_design"
        responsibilities:
          - "Design frontend unit tests"
          - "Design component tests"
          - "Design E2E UI test scenarios"
          - "Create UI test fixtures"
          - "Validate frontend test coverage"
        coordination: "event_driven"

      # 6. DevOps Expert (PlatformAgent)
      - agent_type: "PlatformAgent"
        role: "DevOps Testing Expert"
        phase: "test_environment_setup"
        responsibilities:
          - "Provision test environments"
          - "Configure test infrastructure"
          - "Set up test data pipelines"
          - "Configure CI/CD test pipelines"
          - "Manage test resource quotas"
        coordination: "sequential_before_testing"

      # 7. QA Engineer (QAAgent - Test Execution)
      - agent_type: "QAAgent"
        role: "QA Engineer"
        phase: "test_execution"
        responsibilities:
          - "Execute test suites"
          - "Perform RL-style exploration"
          - "Generate synthetic test data"
          - "Run adversarial tests"
          - "Report test results"
        coordination: "event_driven"

  # ================================================================
  # 5. Capabilities and Tools Configuration
  # ================================================================
  capabilities:
    # Agent Skills
    agent_skills:
      QAAgent:
        - "test_strategy_design"
        - "test_scenario_generation"
        - "test_execution"
        - "rl_style_exploration"
        - "coverage_analysis"
        - "defect_triage"
        - "synthetic_data_generation"
        - "adversarial_testing"

      PlanningAgent:
        - "architecture_analysis"
        - "integration_test_design"
        - "contract_testing"
        - "test_environment_architecture"

      BuilderAgent:
        - "unit_test_design"
        - "test_fixture_creation"
        - "testability_review"
        - "backend_testing"
        - "frontend_testing"
        - "api_testing"

      PlatformAgent:
        - "environment_provisioning"
        - "test_infrastructure_setup"
        - "test_data_pipelines"
        - "ci_cd_configuration"

    # Tool Access Permissions
    tool_access:
      - tool: "github_api"
        permissions:
          - "issues:read/write"
          - "pull_requests:read/write"
          - "commits:read"
          - "repository:read"

      - tool: "test_frameworks"
        permissions:
          - "go_test:execute"
          - "jest:execute"
          - "pytest:execute"
          - "playwright:execute"
          - "cypress:execute"

      - tool: "test_infrastructure"
        permissions:
          - "docker:manage"
          - "kubernetes:manage"
          - "testcontainers:execute"

      - tool: "monitoring_api"
        permissions:
          - "metrics:query"
          - "logs:query"
          - "traces:query"

      - tool: "learning_agent_query"
        permissions:
          - "knowledge_base:read"
          - "test_patterns:query"
          - "failure_history:query"
          - "edge_cases:query"

      - tool: "bash_execution"
        permissions:
          - "command_execution"
          - "test_commands"
          - "file_operations"

  # ================================================================
  # 6. Task Execution Workflow (Ralph Loop)
  # ================================================================
  workflow:
    # Ralph Loop 5-Step Execution Process
    ralph_loop:
      # Step 1: Confirm Primary Agent
      step_1:
        action: "PlannerAgent → Confirm QAAgent as Primary (Test Lead)"
        input:
          issue_type: "test"
          issue_id: "23"
          labels: ["testing", "qa", "automation"]
          complexity: "medium"
          estimated_hours: "8-16"
          priority: "high"
        output: "QAAgent assigned as Primary Agent (Test Lead) for comprehensive testing"
        decision_logic: |
          IF label == "testing" OR label == "qa" THEN QAAgent
          ELSE IF label == "security" THEN SecurityAgent
          ELSE IF label == "infrastructure" THEN PlatformAgent
          ELSE IF label == "performance" THEN QAAgent
          ELSE PlanningAgent (for architecture)

      # Step 2: Load Rules and Context
      step_2:
        action: "Primary Agent → Load Rules + Context"
        input_sources:
          - source: "Infra Dependency Layer (Static)"
            content:
              testing_frameworks:
                unit: ["go test", "jest", "pytest"]
                integration: ["testcontainers", "docker-compose"]
                e2e: ["playwright", "cypress"]
                performance: ["k6", "jmeter"]
                security: ["owasp_zap", "semgrep"]

              testing_standards:
                coverage_minimum: 95
                critical_path_coverage: 100
                test_documentation: "required"

              quality_gates:
                test_coverage: "≥ 95%"
                no_critical_defects: true
                no_high_defects: true
                performance_baseline: "must meet or exceed"

          - source: "Requirements and Architecture"
            content:
              business_requirements: "Business requirements and user stories"
              architecture_design: "System architecture and component design"
              api_specifications: "API contracts and endpoints"
              data_models: "Database schema and structures"

          - source: "Implementation Context"
            content:
              source_code_location: "src/"
              existing_tests: "tests/"
              test_coverage_current: "Current coverage percentage"
              known_issues: "Existing defects and issues"

          - source: "Learning Agent"
            content:
              test_patterns:
                - "Successful test patterns for similar features"
                - "Common failure modes and edge cases"
                - "Historical defect patterns"

              failure_lessons:
                - "Common bugs in similar components"
                - "Integration points that often fail"
                - "Performance bottlenecks"

              best_practices:
                - "Test design patterns"
                - "Fixture and mock strategies"
                - "Test data management"

        output: "Comprehensive test strategy formulated with full context"

      # Step 3: Coordinate Sub-Agents
      step_3:
        action: "Primary Agent → Execute Test Strategy"
        coordination_model: "sequential_preparation_parallel_execution"
        description: |
          Comprehensive testing workflow with sequential preparation and parallel execution:
          1. Architecture analysis and test environment setup
          2. Test scenario design (all types in parallel)
          3. Test implementation
          4. Parallel test execution
          5. Results aggregation and reporting

        dependency_graph:
          blocks:
            # Phase 1: Test Strategy and Analysis
            - block_id: "B1"
              name: "analyze_requirements_and_architecture"
              assigned_to: "QAAgent (Test Lead)"
              dependencies: []
              skills: ["requirement_analysis", "architecture_review"]
              output: "Test scope and objectives defined"

            - block_id: "B2"
              name: "design_test_environment_architecture"
              assigned_to: "PlanningAgent (Architecture Designer)"
              dependencies: ["B1"]
              skills: ["architecture_design", "test_environment_design"]
              output: "Test environment architecture design"

            # Phase 2: Environment Setup (Parallel with B3)
            - block_id: "B3"
              name: "design_test_scenarios"
              assigned_to: "QAAgent (Test Lead)"
              dependencies: ["B1"]
              skills: ["test_design", "scenario_generation"]
              output: "Comprehensive test scenarios document"

            - block_id: "B4"
              name: "setup_test_environments"
              assigned_to: "PlatformAgent (DevOps Expert)"
              dependencies: ["B2"]
              skills: ["environment_setup", "infrastructure_provisioning"]
              output: "Test environments ready and configured"
              environments:
                - name: "unit_test"
                  type: "local"
                - name: "integration_test"
                  type: "container"
                - name: "e2e_test"
                  type: "staging"

            # Phase 3: Test Implementation (Parallel after B3 and B4)
            - block_id: "B5"
              name: "design_unit_tests"
              assigned_to: "BuilderAgent (Backend Expert)"
              dependencies: ["B3", "B4"]
              skills: ["unit_test_design", "backend_testing"]
              output: "Unit test specifications and fixtures"

            - block_id: "B6"
              name: "design_frontend_tests"
              assigned_to: "BuilderAgent (Frontend Expert)"
              dependencies: ["B3", "B4"]
              skills: ["frontend_test_design", "component_testing"]
              output: "Frontend test specifications"

            - block_id: "B7"
              name: "design_integration_tests"
              assigned_to: "PlanningAgent (Architecture Designer)"
              dependencies: ["B3", "B4"]
              skills: ["integration_test_design", "contract_testing"]
              output: "Integration test specifications"

            - block_id: "B8"
              name: "design_e2e_tests"
              assigned_to: "QAAgent (QA Engineer)"
              dependencies: ["B3", "B4"]
              skills: ["e2e_test_design", "scenario_testing"]
              output: "E2E test scenarios"

            # Phase 4: Test Implementation and Data Generation
            - block_id: "B9"
              name: "implement_unit_tests"
              assigned_to: "BuilderAgent (Development Lead)"
              dependencies: ["B5"]
              skills: ["test_implementation", "mock_creation"]
              output: "Unit tests implemented"

            - block_id: "B10"
              name: "implement_frontend_tests"
              assigned_to: "BuilderAgent (Frontend Expert)"
              dependencies: ["B6"]
              skills: ["test_implementation", "component_test_creation"]
              output: "Frontend tests implemented"

            - block_id: "B11"
              name: "generate_synthetic_test_data"
              assigned_to: "QAAgent (QA Engineer)"
              dependencies: ["B7", "B8"]
              skills: ["synthetic_data_generation", "test_data_management"]
              output: "Synthetic test datasets ready"

            # Phase 5: Test Execution (Parallel)
            - block_id: "B12"
              name: "execute_unit_tests"
              assigned_to: "BuilderAgent (Development Lead)"
              dependencies: ["B9", "B11"]
              skills: ["test_execution", "coverage_analysis"]
              output: "Unit test results and coverage report"
              coordination: "parallel"

            - block_id: "B13"
              name: "execute_integration_tests"
              assigned_to: "QAAgent (QA Engineer)"
              dependencies: ["B7", "B11"]
              skills: ["test_execution", "integration_testing"]
              output: "Integration test results"
              coordination: "parallel"

            - block_id: "B14"
              name: "execute_e2e_tests"
              assigned_to: "QAAgent (QA Engineer)"
              dependencies: ["B8", "B10", "B11"]
              skills: ["e2e_test_execution", "ui_testing"]
              output: "E2E test results with screenshots"
              coordination: "parallel"

            # Phase 6: Advanced Testing (Parallel with basic execution)
            - block_id: "B15"
              name: "rl_style_exploration_testing"
              assigned_to: "QAAgent (QA Engineer)"
              dependencies: ["B12", "B13"]
              skills: ["rl_testing", "edge_case_exploration"]
              output: "Edge cases discovered and documented"
              coordination: "parallel"

            - block_id: "B16"
              name: "adversarial_security_testing"
              assigned_to: "QAAgent (QA Engineer)"
              dependencies: ["B12", "B13"]
              skills: ["adversarial_testing", "fuzzing", "security_testing"]
              output: "Security test results and vulnerability report"
              coordination: "parallel"

            - block_id: "B17"
              name: "performance_testing"
              assigned_to: "QAAgent (QA Engineer)"
              dependencies: ["B14"]
              skills: ["performance_testing", "load_testing"]
              output: "Performance test results and baseline comparison"
              coordination: "parallel"

            # Phase 7: Results Aggregation and Reporting
            - block_id: "B18"
              name: "aggregate_test_results"
              assigned_to: "QAAgent (Test Lead)"
              dependencies: ["B12", "B13", "B14", "B15", "B16", "B17"]
              skills: ["result_aggregation", "test_analysis"]
              output: "Comprehensive test results aggregation"

            - block_id: "B19"
              name: "generate_test_reports"
              assigned_to: "QAAgent (Test Lead)"
              dependencies: ["B18"]
              skills: ["report_generation", "metrics_analysis"]
              output: "Test reports for all stakeholders"

            - block_id: "B20"
              name: "triage_defects"
              assigned_to: "QAAgent (Test Lead)"
              dependencies: ["B18"]
              skills: ["defect_triage", "prioritization"]
              output: "Defect triage report and Jira tickets"

            # Phase 8: Sign-off
            - block_id: "B21"
              name: "qa_sign_off"
              assigned_to: "QAAgent (Test Lead)"
              dependencies: ["B19", "B20"]
              skills: ["quality_gate_evaluation", "sign_off"]
              output: "QA sign-off and release recommendation"
              validators:
                - type: "git_diff_check"
                  min_files_changed: 3
                - type: "file_exists"
                  path: "tests/**/*test*"
                - type: "command"
                  run: "find tests/ -name '*test*' -type f | head -1"

          execution_order: |
            B1 → B2 → (B3 + B4) → (B5 + B6 + B7 + B8) → (B9 + B10 + B11) →
            (B12 + B13 + B14) → (B15 + B16 + B17) → B18 → (B19 + B20) → B21

      # Step 4: Confirm Completion and Deliver Output
      step_4:
        action: "Confirm Completion + Deliver Output"
        deliverables:
          - type: "github_issue_update"
            content:
              parent_issue: "GH-23"
              status: "In Progress → Done"
              comments:
                - "✅ analyze_requirements_and_architecture (QAAgent) - Complete"
                - "✅ design_test_environment_architecture (PlanningAgent) - Complete"
                - "✅ setup_test_environments (PlatformAgent) - Complete"
                - "✅ design_test_scenarios (QAAgent) - Complete"
                - "✅ design_unit_tests (BuilderAgent) - Complete"
                - "✅ design_frontend_tests (BuilderAgent) - Complete"
                - "✅ design_integration_tests (PlanningAgent) - Complete"
                - "✅ design_e2e_tests (QAAgent) - Complete"
                - "✅ implement_unit_tests (BuilderAgent) - Complete"
                - "✅ implement_frontend_tests (BuilderAgent) - Complete"
                - "✅ execute_unit_tests (BuilderAgent) - Complete"
                - "✅ execute_integration_tests (QAAgent) - Complete"
                - "✅ execute_e2e_tests (QAAgent) - Complete"
                - "✅ rl_style_exploration_testing (QAAgent) - Complete"
                - "✅ adversarial_security_testing (QAAgent) - Complete"
                - "✅ performance_testing (QAAgent) - Complete"
                - "✅ aggregate_test_results (QAAgent) - Complete"
                - "✅ generate_test_reports (QAAgent) - Complete"
                - "✅ triage_defects (QAAgent) - Complete"
                - "✅ qa_sign_off (QAAgent) - Complete"
                - ""
                - "📊 **Testing Summary:**"
                - "- Status: Complete"
                - "- Unit Tests: PASSING (XX/XX)"
                - "- Integration Tests: PASSING (XX/XX)"
                - "- E2E Tests: PASSING (XX/XX)"
                - "- Coverage: XX% (≥ 95% requirement)"
                - "- Edge Cases Found: XX"
                - "- Security Issues: XX"
                - "- Performance: MEETS_BASELINE"
                - "- Defects Logged: XX"

              labels:
                remove: ["in-progress", "pending"]
                add: ["completed", "tested", "qa_approved"]

          - type: "artifact"
            artifact_type: "comprehensive_test_report"
            content:
              blueprint_id: "bp_test_feature_comprehensive_testing.1.0.0"
              blueprint_name: "Comprehensive Testing Automation"
              execution_start: "2026-03-27T10:00:00Z"
              execution_end: "2026-03-27T18:00:00Z"
              duration_hours: 8.0
              status: "success"

              test_info:
                issue_id: "GH-23"
                test_type: "comprehensive_testing"
                complexity: "medium"
                estimated_hours: "12"
                actual_hours: 8.0

              test_summary:
                total_tests_designed: 150
                total_tests_executed: 150
                tests_passed: 142
                tests_failed: 5
                tests_skipped: 3
                pass_rate: 94.7

                coverage:
                  unit_coverage: 97.2
                  integration_coverage: 94.5
                  e2e_coverage: 88.0
                  overall_coverage: 95.5

                edge_cases:
                  rl_discovered_cases: 8
                  confirmed_bugs: 3
                  test_enhancements: 5

                security:
                  vulnerabilities_found: 2
                  critical: 0
                  high: 0
                  medium: 2
                  low: 0

                performance:
                  baseline_met: true
                  response_time_p95: "within SLA"
                  throughput_target: "met"

              blocks_executed:
                - block_id: "B1"
                  name: "analyze_requirements_and_architecture"
                  agent: "QAAgent"
                  status: "completed"
                  duration_minutes: 30
                  artifacts: ["test_scope.md"]

                - block_id: "B2"
                  name: "design_test_environment_architecture"
                  agent: "PlanningAgent"
                  status: "completed"
                  duration_minutes: 45
                  artifacts: ["test_environment_architecture.md"]

                - block_id: "B3"
                  name: "design_test_scenarios"
                  agent: "QAAgent"
                  status: "completed"
                  duration_minutes: 60
                  artifacts: ["test_scenarios.md"]

                - block_id: "B4"
                  name: "setup_test_environments"
                  agent: "PlatformAgent"
                  status: "completed"
                  duration_minutes: 40
                  artifacts: ["environment_configs/"]

                # ... more blocks

                - block_id: "B15"
                  name: "rl_style_exploration_testing"
                  agent: "QAAgent"
                  status: "completed"
                  duration_minutes: 90
                  artifacts: ["edge_case_report.md"]

                - block_id: "B21"
