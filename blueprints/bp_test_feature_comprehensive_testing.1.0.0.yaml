                  format: "PDF"

              metrics:
                total_blocks: 21
                completed_blocks: 21
                failed_blocks: 0
                total_tokens_used: 95000
                total_cost_usd: 4.75
                testing_success: true
                coverage_target_met: true
                quality_gates_passed: true

      # Step 5: Audit and Governance Decision
      step_5:
        action: "Audit Agents → Generate Audit Report"
        phase_1_parallel_audits:
          - agent: "SecurityAuditAgent"
            scope: "安全审计"
            checks:
              - "测试中的安全问题": "passed"
              - "OWASP 测试覆盖": "passed"
              - "渗透测试完成": "passed"
              - "漏洞验证": "passed"
            output: "SecurityAuditReport Artifact"
            status: "passed"

          - agent: "QualityAuditAgent"
            scope: "质量审计"
            checks:
              - "测试覆盖率 ≥ 95%": "95.5% ≥ 95% = passed"
              - "测试通过率": "94.7% = passed"
              - "测试完整性": "passed"
              - "缺陷追踪完整": "passed"
            output: "QualityAuditReport Artifact"
            status: "passed"

          - agent: "TestAuditAgent"
            scope: "测试审计"
            checks:
              - "测试策略完整性": "passed"
              - "测试场景覆盖": "passed"
              - "RL 探索执行": "passed"
              - "边界测试覆盖": "passed"
              - "性能基准测试": "passed"
            output: "TestAuditReport Artifact"
            status: "passed"

          - agent: "ComplianceAuditAgent"
            scope: "合规审计"
            checks:
              - "测试文档完整": "passed"
              - "审计追踪完整": "passed"
              - "缺陷记录符合标准": "passed"
            output: "ComplianceAuditReport Artifact"
            status: "passed"

          - agent: "CostAuditAgent"
            scope: "成本审计"
            checks:
              - "Token 使用": "95000 ≤ 100000 = passed"
              - "执行时间": "8h ≤ 16h = passed"
            output: "CostAuditReport Artifact"
            status: "passed"

        phase_2_governance_decision:
          inputs:
            - "Comprehensive Test Report"
            - "SecurityAuditReport"
            - "QualityAuditReport"
            - "TestAuditReport"
            - "ComplianceAuditReport"
            - "CostAuditReport"

          gates_check:
            quality_gate:
              condition: "test_coverage ≥ 95% AND pass_rate ≥ 90%"
              actual: "coverage = 95.5%, pass_rate = 94.7%"
              status: "passed"

            security_gate:
              condition: "no_critical_vulnerabilities AND security_tests_passed"
              actual: "no critical vulnerabilities, security tests passed"
              status: "passed"

            test_coverage_gate:
              condition: "unit ≥ 95% AND integration ≥ 90% AND e2e ≥ 85%"
              actual: "unit = 97.2%, integration = 94.5%, e2e = 88%"
              status: "passed"

            defect_gate:
              condition: "no_critical_defects AND no_high_defects_unresolved"
              actual: "no critical defects, no high defects unresolved"
              status: "passed"

            performance_gate:
              condition: "performance_baseline_met = true"
              actual: "performance baseline met"
              status: "passed"

            cost_gate:
              condition: "total_cost_usd ≤ budget_usd AND time ≤ estimated"
              actual: "$4.75 ≤ $10.00, 8h ≤ 16h"
              status: "passed"

          final_decision:
            status: "passed"
            reason: "所有 gates 通过，综合测试成功完成，质量达标"
            action: "测试已成功完成，覆盖率达标，QA 已签署批准，可继续发布流程"

