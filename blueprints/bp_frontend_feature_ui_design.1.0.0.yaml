              status: "passed"

            budget_gate:
              condition: "total_tokens ≤ 60000 AND execution_time ≤ 6h"
              actual: "52000 tokens, 5.75h"
              status: "passed"

          final_decision:
            status: "passed"
            reason: "All governance gates passed. Frontend implementation meets quality, security, and compliance standards."
