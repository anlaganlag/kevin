# Frontend Agent Blueprint
# Blueprint for Frontend Agent to design UI and generate frontend implementation
# from approved UX specifications and architecture contracts
# Based on AgenticSDLC v2.0 Architecture

blueprint:
  # ================================================================
  # 1. Basic Information
  # ================================================================
  metadata:
    blueprint_id: "bp_frontend_feature_ui_design.1.0.0"
    blueprint_name: "Frontend UI Design and Implementation Blueprint"
    blueprint_type: "feature"
    version: "1.0.0"
    created_at: "2026-03-26T12:00:00Z"
    created_by: "FrontendAgent"
    tags:
      - "frontend"
      - "ui-design"
      - "component-architecture"
      - "typescript"
      - "accessibility"
      - "hitl-gate"

  # ================================================================
  # 2. Configuration Loading Declaration
  # ================================================================
  configuration:
    # Profile Reference
    profile:
      name: "default_profile"
      description: "Balanced quality and speed for UI design and implementation"
      overrides:
        quality:
          test_coverage: 90  # UI component tests: slightly lower than backend hard gate
          documentation: "comprehensive"  # All components must have Storybook stories

    # Rules Loading
    rules:
      # Load entire rule directories
      load_from:
        - ".agentic/rules/naming/"
        - ".agentic/rules/security/"

      # Specific rule files relevant to frontend
      specific:
        - ".agentic/rules/naming/general.yaml"
        - ".agentic/rules/security/owasp_top10.yaml"

      # Frontend-specific inline rules (compact)
      inline:
        custom_rules:
          - name: "naming_and_structure"
            rule: "PascalCase components, filename matches component name, single responsibility, max 200 lines per component"

          - name: "accessibility"
            rule: "WCAG 2.1 Level AA compliance for all interactive components"

          - name: "styling"
            rule: "Design tokens only (no hardcoded values), no inline styles, use CSS modules or utility classes"

          - name: "security"
            rule: "No dangerouslySetInnerHTML without SecurityAgent approval, sanitize all user content"

    # Constraints Loading
    constraints:
      # Load entire constraint directories
      load_from:
        - ".agentic/constraints/infra/static/"
        - ".agentic/constraints/devops/ci/"

      # Specific constraint files
      specific:
        - ".agentic/constraints/infra/static/technical_stack.yaml"
        - ".agentic/constraints/devops/ci/quality_gates.yaml"

      # Frontend-specific inline constraints (compact)
      inline:
        technical_stack: "React 18+ (or Vue 3.3+), TypeScript 5+, Node 20+, CSS Modules/Tailwind, Vitest 1+, Playwright 1.40+"
        architecture: "Max 200 lines/component, max 12 props, max 4 nesting depth, local state preferred (Zustand/Pinia only when required)"
        patterns: "Compound Component, Custom Hooks for logic reuse, Context API for theme/config"
        resource_quotas: "Max 50KB gzipped per component, 16ms render target (60fps)"

  # ================================================================
  # 3. Input Definition
  # ================================================================
  input:
    # Trigger Definition
    trigger:
      event_type: "IssueCreatedEvent | BlueprintApprovedEvent | ArchitectureApprovedEvent"
      event_source: "github"
      event_schema:
        issue_id: "22"
        issue_type: "task"
        labels: ["frontend", "ui-design", "component"]
        priority: "high"
        description: "Create Frontend Agent Blueprint for UI design and component implementation"

    # Task Type Mapping
    task_mapping:
      task:
        primary_phase: "design_and_implementation"
        entry_point: "FrontendAgent"
      requirement:
        primary_phase: "analysis"
        entry_point: "BA_Agent"

    # Input Context
    context:
      source_documents:
        - type: "Architecture Blueprint"
          location: "blueprints/bp_architecture_blueprint_design.1.0.0.yaml"
          required: true
          description: "Defines API contracts and system component boundaries that the UI consumes"

        - type: "UX Specification / Wireframes"
          location: "requirements/ux_spec_*.md"
          required: true
          description: "UX wireframes, interaction flows, and design intent from the design phase"

        - type: "Design System Tokens"
          location: "design-system/tokens/*.json"
          required: true
          description: "Color, typography, spacing, and elevation tokens from the design system"

        - type: "Approved Requirements (User Stories)"
          location: "requirements/user_stories_*.md"
          required: true
          description: "User stories with UI-relevant acceptance criteria"

        - type: "GitHub Issue"
          location: "github://centific-cn/AgenticSDLC/issues/22"
          required: true
          description: "Issue containing the frontend UI design task"

      data_sources:
        - "Git Repository (main branch) — existing component library and patterns"
        - "Learning Agent Knowledge Base — historical UI patterns and component designs"
        - "Storybook (project) — existing component inventory"
        - "Design Token Engine — live token definitions"
        - "Architecture Contract (API endpoints and data schemas)"

  # ================================================================
  # 4. Execution Agent Configuration
  # ================================================================
  execution:
    # Primary Agent Selection
    primary_agent:
      agent_type: "FrontendAgent"
      selection_logic:
        reasoning: |
          1. Issue type = "task" with label "frontend" and "ui-design" → FrontendAgent
          2. Task involves UI component design and TypeScript/React implementation → FrontendAgent core competency
          3. Task requires design system application and accessibility compliance → FrontendAgent domain expertise
          → Decision: FrontendAgent as Primary Agent

      responsibilities:
        - "Parse UX specifications and translate to component architecture"
        - "Design component tree and data flow"
        - "Generate TypeScript/React (or Vue) component code following design system"
        - "Generate Storybook stories for all components"
        - "Coordinate accessibility audit (QAAgent) and security review (SecurityAgent)"
        - "Create PR with all frontend artifacts for HITL Gate review"

    # Sub-Agents Coordination
    sub_agents:
      - agent_type: "LearningAgent"
        phase: "context_loading"
        responsibilities:
          - "Retrieve historical UI component patterns from knowledge base"
          - "Identify existing reusable components to avoid duplication"
          - "Provide design system usage patterns from previous features"
          - "Surface lessons learned from past accessibility failures"
        coordination: "sequential_before_design"

      - agent_type: "QAAgent"
        phase: "verification"
        responsibilities:
          - "Generate unit tests for each component (Vitest + React Testing Library)"
          - "Run accessibility audit using axe-core against generated components"
          - "Generate visual regression baseline via Chromatic/Playwright"
          - "Verify component behavior against acceptance criteria"
        coordination: "parallel_with_security"

      - agent_type: "SecurityAgent"
        phase: "verification"
        responsibilities:
          - "Scan generated components for XSS vulnerabilities (dangerouslySetInnerHTML, eval, etc.)"
          - "Verify input sanitization on all form components"
          - "Check Content Security Policy (CSP) compatibility"
          - "Audit third-party dependency security (npm audit)"
        coordination: "parallel_with_qa"

      - agent_type: "DocAgent"
        phase: "documentation"
        responsibilities:
          - "Generate component API documentation (prop types, events, slots)"
          - "Create component usage examples and code snippets"
          - "Document design decisions and deviation rationale"
        coordination: "parallel_with_output_generation"

  # ================================================================
  # 5. Capabilities and Tools Configuration
  # ================================================================
  capabilities:
    # Agent Skills
    agent_skills:
      FrontendAgent:
        - name: "ux_spec_parsing"
          description: "Parse UX wireframes and interaction specs into component requirements"
          input: "UX spec documents, wireframe descriptions"
          output: "Component requirement list with states, props, and events"

        - name: "component_architecture_design"
          description: "Design component hierarchy, data flow, and composition patterns"
          input: "Component requirements, API contract, design tokens"
          output: "Component tree diagram (Mermaid), data flow spec"

        - name: "design_system_application"
          description: "Map UX design intent to design system tokens and existing components"
          input: "UX spec, design token definitions, existing component inventory"
          output: "Token usage map, component reuse plan"

        - name: "frontend_code_generation"
          description: "Generate production-ready TypeScript React/Vue component code"
          input: "Component architecture spec, API schema, design tokens"
          output: "*.tsx / *.vue files with props, events, and slots defined"

        - name: "responsive_layout_design"
          description: "Implement responsive layouts using CSS Grid/Flexbox and design system breakpoints"
          input: "Layout requirements, breakpoint tokens"
          output: "Responsive CSS Modules / Tailwind class composition"

        - name: "interaction_design_implementation"
          description: "Implement interaction states (hover, focus, active, disabled, loading, error)"
          input: "Interaction spec, design tokens"
          output: "State-aware component code with appropriate ARIA attributes"

        - name: "storybook_story_generation"
          description: "Generate Storybook stories covering Default, Loading, Error, and edge-case variants"
          input: "Component code, acceptance criteria"
          output: "*.stories.tsx files with Controls and Docs"

        - name: "accessibility_implementation"
          description: "Implement ARIA roles, keyboard navigation, focus management, and color contrast compliance"
          input: "Component code, WCAG 2.1 AA requirements"
          output: "Accessible component code with axe audit report"

        - name: "i18n_preparation"
          description: "Extract all user-facing strings into i18n keys; no hardcoded display text"
          input: "Component code, i18n key naming convention"
          output: "Locale key file additions, component wired to i18n provider"

        - name: "performance_optimization"
          description: "Apply code splitting, lazy loading, and memoization where appropriate"
          input: "Component code, bundle size constraints"
          output: "Optimized component with React.memo / dynamic import annotations"

        - name: "git_operations"
          description: "Commit generated artifacts and create PR for HITL Gate review"
          input: "All generated artifacts"
          output: "Feature branch commit, PR with description and labels"

      LearningAgent:
        - "pattern_matching"
        - "historical_context_retrieval"
        - "component_pattern_recommendation"
        - "best_practice_recommendation"

      QAAgent:
        - "unit_test_generation"
        - "accessibility_audit"
        - "visual_regression_testing"
        - "component_behavior_verification"

      SecurityAgent:
        - "xss_vulnerability_scan"
        - "input_sanitization_check"
        - "csp_compatibility_check"
        - "dependency_security_audit"

      DocAgent:
        - "component_api_documentation"
        - "usage_example_generation"
        - "design_decision_documentation"

    # Tool Access Permissions
    tool_access:
      - tool: "github_api"
        permissions:
          - "issues:read/write"
          - "pull_requests:read/write"
          - "commits:read/write"
          - "repository:read"
        usage: "Read task issue, create feature branch, commit artifacts, open PR"

      - tool: "bash_execution"
        permissions:
          - "command_execution"
          - "file_operations"
          - "directory_operations"
        usage: |
          Run: npm run build, npm run lint, npm run test, npm run storybook:build,
          npx tsc --noEmit, npx axe-core, npm audit

      - tool: "learning_agent_query"
        permissions:
          - "knowledge_base:read"
          - "pattern_matching"
          - "component_patterns:query"
        usage: "Query existing component designs, UI patterns, and lessons learned"

      - tool: "design_token_engine"
        permissions:
          - "tokens:read"
          - "token_validation:execute"
        usage: "Fetch current design token values; validate token usage in generated code"

      - tool: "storybook_api"
        permissions:
          - "component_inventory:read"
          - "stories:read/write"
        usage: "Check existing component inventory; write new Storybook stories"

      - tool: "figma_api"
        permissions:
          - "designs:read"
          - "components:read"
          - "design_tokens:read"
        usage: "Read UX wireframes, component specs, and design tokens directly from Figma"

      - tool: "accessibility_checker"
        permissions:
          - "axe_core:execute"
          - "wcag_audit:execute"
          - "accessibility_report:generate"
        usage: "Run axe-core accessibility scans on rendered components; generate WCAG audit report"

      - tool: "visual_regression_tool"
        permissions:
          - "screenshot:capture"
          - "baseline:compare"
          - "chromatic:publish"
        usage: "Capture component screenshots for visual regression baseline via Chromatic"

      - tool: "platform_agent_api"
        permissions:
          - "infra_state:read"
          - "technical_constraints:read"
        usage: "Read CDN configuration, allowed npm registries, and resource quotas"

      - tool: "openapi_generator"
        permissions:
          - "openapi_spec:read"
          - "type_generation:execute"
        usage: "Generate TypeScript types from API contract OpenAPI spec (openapi-typescript)"

  # ================================================================
  # 6. Task Execution Workflow
  # ================================================================
  workflow:
    # Ralph Loop 5-Step Execution Process
    ralph_loop:
      # Step 1: Confirm Primary Agent
      step_1:
        action: "PlannerAgent → Confirm FrontendAgent as Primary"
        input:
          issue_type: "task"
          issue_id: "22"
          labels: ["frontend", "ui-design", "component"]
          priority: "high"
        output: "FrontendAgent assigned as Primary Agent"
        decision_logic: |
          IF label == "frontend" AND label == "ui-design" THEN FrontendAgent
          ELSE IF label == "backend" THEN BuilderAgent
          ELSE IF label == "architecture" THEN PlanningAgent
          ELSE default → BuilderAgent

      # Step 2: Load Rules and Context
      step_2:
        action: "FrontendAgent → Load Rules + Context"
        input_sources:
          - source: "Infra Dependency Layer (Static)"
            content:
              language_stack: ["TypeScript >= 5.0", "Node >= 20.x"]
              framework: "React >= 18.0"
              styling: "CSS Modules + design system utility classes"
              component_library: "Storybook >= 7.6"
              testing:
                unit: "Vitest + React Testing Library"
                visual: "Playwright + Chromatic"
                accessibility: "axe-core"
              bundler: "Vite"
              linting: ["ESLint", "Prettier", "stylelint"]

          - source: "Infra Dependency Layer (Dynamic)"
            content:
              npm_registry: "Project-configured private registry"
              cdn_config: "CloudFront distribution configuration"
              deployment_environment: "staging"

          - source: "Learning Agent"
            content:
              existing_components:
                - "Button, Input, Select, Modal, Toast — already in component library"
                - "DataTable, Pagination, FilterPanel — available in Storybook"
              ui_patterns:
                - "Form validation: React Hook Form + Zod schema"
                - "Async data: React Query (TanStack Query)"
                - "State: Zustand for global; useState/useReducer for local"
              lessons_learned:
                - "Always set aria-label on icon-only buttons"
                - "Use role='status' aria-live='polite' for async loading indicators"
                - "Avoid layout shift: pre-define skeleton dimensions from design tokens"
                - "Color contrast AA requires 4.5:1 for normal text, 3:1 for large text"

          - source: "Architecture Contract"
            content:
              api_endpoints:
                - "OpenAPI spec at: docs/api/api_contract_openapi.yaml"
                - "TypeScript types auto-generated via openapi-typescript"
              data_schemas: "Request/response schemas define component prop types"
              auth_pattern: "JWT Bearer token via Authorization header"

          - source: "UX Specification"
            content:
              wireframes: "requirements/ux_spec_*.md"
              interaction_flows: "Defined per-feature in UX spec"
              design_tokens: "design-system/tokens/*.json"

        output: "Execution strategy formulated with full frontend context"

      # Step 3: Coordinate Sub-Agents
      step_3:
        action: "FrontendAgent → Coordinate Sub-Agents"
        coordination_model: "sequential_with_parallel_verification"
        description: |
          UI design and implementation process:
          1. Load context and existing component inventory (LearningAgent)
          2. Parse UX specs and design component architecture
          3. Generate TypeScript component code, Storybook stories, and i18n keys
          4. Run parallel verification: QAAgent (tests + accessibility) + SecurityAgent (XSS scan)
          5. DocAgent generates component API docs in parallel with verification
          6. Consolidate all artifacts and create PR for HITL Gate

        dependency_graph:
          blocks:
            # --------------------------------------------------------
            # B1: Analyze UX Requirements + Design Component Architecture
            # --------------------------------------------------------
            - block_id: "B1"
              name: "analyze_and_design"
              assigned_to: "BuilderAgent"
              dependencies: []
              runner: "claude_cli"
              runner_config:
                cwd: "{{target_repo}}"
                model: ""
              timeout: 300
              max_retries: 1
              pre_check: "rm -f .kevin/analysis.md"
              prompt_template: |
                You are a Frontend Expert analyzing a UI feature request.
                You MUST create files as instructed. Do NOT ask questions. Just execute.

                {{learning_context}}

                ## Issue #{{issue_number}}: {{issue_title}}

                {{issue_body}}

                ## Instructions (execute ALL steps)

                1. Read the issue carefully and understand the UI/UX requirements
                2. Create directory `.kevin/` if it does not exist: `mkdir -p .kevin`
                3. Explore the existing codebase to understand:
                   - Component library and design system in use (React/Vue, Tailwind/CSS Modules, etc.)
                   - Existing component patterns and naming conventions
                   - Test setup (Vitest, Jest, React Testing Library, etc.)
                   - TypeScript configuration
                4. Write an implementation plan to `.kevin/analysis.md` containing:
                   - Summary of what UI needs to be built
                   - Component tree: which components to create/modify (parent → child relationships)
                   - TypeScript prop interfaces for each component
                   - Interaction states to implement (default, hover, focus, loading, error, empty, disabled)
                   - Accessibility requirements (ARIA, keyboard nav, contrast)
                   - Test scenarios for each component
                   - Files to create or modify
                5. Create a feature branch: `git checkout -b kevin/issue-{{issue_number}}`

                IMPORTANT: You MUST write `.kevin/analysis.md` before finishing.
                Do NOT implement the solution yet. Only analyze and plan.
              output: "Component architecture plan in .kevin/analysis.md + feature branch"
              validators:
                - type: "file_exists"
                  path: ".kevin/analysis.md"
              acceptance_criteria:
                - "UX requirements understood and structured"
                - "Component architecture designed"
                - "Feature branch created"

            # --------------------------------------------------------
            # B2: Implement Components + Tests
            # --------------------------------------------------------
            - block_id: "B2"
              name: "implement_frontend"
              assigned_to: "BuilderAgent"
              dependencies: ["B1"]
              runner: "claude_cli"
              runner_config:
                cwd: "{{target_repo}}"
                model: ""
              timeout: 600
              max_retries: 2
              pre_check: "git diff --quiet HEAD -- . 2>/dev/null || git checkout -- . 2>/dev/null; git clean -fd --exclude=.kevin/ 2>/dev/null; true"
              prompt_template: |
                You are a Frontend Expert implementing UI components on branch `kevin/issue-{{issue_number}}`.

                {{learning_context}}

                ## Context

                Read the component plan from `.kevin/analysis.md`.

                ## Instructions

                1. Read `.kevin/analysis.md` for the component architecture plan
                2. **Write tests first** for each component (render, props, interactions, accessibility)
                3. Implement TypeScript React/Vue components following the plan:
                   - Use design tokens / existing design system (no hardcoded colors/spacing)
                   - Add ARIA attributes and keyboard event handlers
                   - Handle all interaction states (loading, error, empty, disabled)
                   - Use TypeScript interfaces for all props
                   - No `any` types — use proper typing
                   - No `dangerouslySetInnerHTML` unless absolutely necessary with sanitization
                4. Run all tests to ensure they pass
                5. Run TypeScript check if available (`npx tsc --noEmit` or equivalent)
                6. Run linter if available (`npm run lint` or equivalent)
                7. Commit with message: `feat: {{issue_title}} (resolves #{{issue_number}})`

                Follow existing code style and patterns in the repo.
              output: "Frontend components + tests committed to feature branch"
              validators:
                - type: "git_diff_check"
                  min_files_changed: 1
                - type: "command"
                  run: "git log --oneline -1 | grep -q 'feat:'"
              acceptance_criteria:
                - "Components implemented with TypeScript"
                - "Tests written and passing"
                - "Accessibility requirements met"
                - "Code committed to feature branch"

            # --------------------------------------------------------
            # B3: Create Pull Request
            # --------------------------------------------------------
            - block_id: "B3"
              name: "create_pull_request"
              assigned_to: "BuilderAgent"
              dependencies: ["B2"]
              runner: "shell"
              pre_check: ""
              runner_config:
                cwd: "{{target_repo}}"
                command: |
                  BRANCH="kevin/issue-{{issue_number}}"

                  # Check if PR is already merged → skip entirely
                  MERGED_PR=$(gh pr list --head "$BRANCH" --state merged --json number --jq '.[0].number' 2>/dev/null)
                  if [ -n "$MERGED_PR" ]; then echo "PR #$MERGED_PR already merged — skipping B3"; exit 0; fi

                  # Fetch remote refs
                  git fetch origin "$BRANCH" 2>/dev/null || true

                  # Push
                  git push --force-with-lease -u origin "$BRANCH"

                  # If open PR exists → just update it
                  EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null)
                  if [ -n "$EXISTING_PR" ]; then echo "PR #$EXISTING_PR updated"; exit 0; fi

                  # Create new PR
                  gh pr create \
                    --title "{{issue_title}}" \
                    --body "## Summary

                  Resolves {{repo_full}}#{{issue_number}}

                  ## Changes

                  $(git diff main...HEAD --stat)

                  ## Components

                  $(cat .kevin/analysis.md 2>/dev/null | head -30)

                  ---
                  _Automated by Kevin via bp_frontend_feature_ui_design.1.0.0_"
              timeout: 120
              max_retries: 1
              validators:
                - type: "command"
                  run: "gh pr list --head kevin/issue-{{issue_number}} --json number --jq '.[0].number'"
              acceptance_criteria:
                - "PR created and linked to original issue"
                - "PR description includes component summary"

          execution_order: "B1 → B2 → B3"

      # Step 4: Confirm Completion and Deliver Output
      step_4:
        action: "Confirm Completion + Deliver Output"
        deliverables:
          - type: "github_issue_update"
            content:
              parent_issue: "GH-22"
              status: "In Progress → Done"
              comments:
                - "✅ load_context_and_inventory (FrontendAgent + LearningAgent) - Complete"
                - "✅ analyze_ux_requirements (FrontendAgent) - Complete"
                - "✅ design_component_architecture (FrontendAgent) - Complete"
                - "✅ generate_component_code (FrontendAgent) - Complete"
                - "✅ generate_storybook_stories (FrontendAgent + DocAgent) - Complete"
                - "✅ generate_unit_tests (QAAgent) - Complete"
                - "✅ accessibility_audit (QAAgent) - Complete — 0 violations"
                - "✅ security_scan (SecurityAgent) - Complete — 0 critical/high findings"
                - "✅ visual_regression_baseline (QAAgent) - Complete"
                - "✅ generate_component_docs (DocAgent) - Complete"
                - "✅ create_pr_for_hitl_gate (FrontendAgent) - Complete"
                - ""
                - "📊 **Summary:**"
                - "- All components implemented with TypeScript + React"
                - "- Storybook stories generated for all components"
                - "- Unit tests passing with ≥ 90% coverage"
                - "- WCAG 2.1 AA: 0 accessibility violations"
                - "- Security: 0 XSS findings, 0 npm audit critical/high"
                - "- Visual regression baseline established in Chromatic"
                - "- **Ready for HITL Gate review**"
              labels:
                remove: ["in-progress"]
                add: ["completed", "ready-for-hitl-gate"]

          - type: "artifact"
            artifact_type: "frontend_implementation_report"
            content:
              blueprint_id: "bp_frontend_feature_ui_design.1.0.0"
              blueprint_name: "Frontend UI Design and Implementation Blueprint"
              execution_start: "2026-03-26T12:00:00Z"
              execution_end: "2026-03-26T17:45:00Z"
              duration_hours: 5.75
              status: "success"

              blocks_executed:
                - block_id: "B1"
                  name: "load_context_and_inventory"
                  agents: ["FrontendAgent", "LearningAgent"]
                  status: "completed"
                  duration_minutes: 20
                  artifacts: ["context_report.md"]

                - block_id: "B2"
                  name: "analyze_ux_requirements"
                  agent: "FrontendAgent"
                  status: "completed"
                  duration_minutes: 30
                  artifacts: ["component_requirements.md"]

                - block_id: "B3"
                  name: "design_component_architecture"
                  agent: "FrontendAgent"
                  status: "completed"
                  duration_minutes: 45
                  artifacts: ["component_architecture.md", "typescript_interfaces.ts"]

                - block_id: "B4"
                  name: "generate_component_code"
                  agent: "FrontendAgent"
                  status: "completed"
                  duration_minutes: 90
                  artifacts: ["src/components/**/*.tsx", "src/i18n/locales/*.json"]

                - block_id: "B5"
                  name: "generate_storybook_stories"
                  agents: ["FrontendAgent", "DocAgent"]
                  status: "completed"
                  duration_minutes: 40
                  artifacts: ["src/components/**/*.stories.tsx"]

                - block_id: "B6"
                  name: "generate_unit_tests"
                  agent: "QAAgent"
                  status: "completed"
                  duration_minutes: 50
                  artifacts: ["src/components/**/*.test.tsx", "coverage/lcov.info"]

                - block_id: "B7"
                  name: "accessibility_audit"
                  agent: "QAAgent"
                  status: "completed"
                  duration_minutes: 30
                  artifacts: ["reports/accessibility_audit.json"]

                - block_id: "B8"
                  name: "security_scan"
                  agent: "SecurityAgent"
                  status: "completed"
                  duration_minutes: 25
                  artifacts: ["reports/sast_scan.sarif", "reports/npm_audit.json"]

                - block_id: "B9"
                  name: "visual_regression_baseline"
                  agent: "QAAgent"
                  status: "completed"
                  duration_minutes: 20
                  artifacts: ["chromatic_build_url", "reports/visual_baseline.json"]

                - block_id: "B10"
                  name: "generate_component_docs"
                  agent: "DocAgent"
                  status: "completed"
                  duration_minutes: 25
                  artifacts: ["docs/components/*.md", "CHANGELOG.md"]

                - block_id: "B11"
                  name: "create_pr_for_hitl_gate"
                  agent: "FrontendAgent"
                  status: "completed"
                  duration_minutes: 15
                  artifacts: ["Feature Branch PR #YY"]

              output_artifacts:
                - artifact_id: "artifact-fe-001"
                  type: "component_source_code"
                  name: "TypeScript React Component Source Files"
                  storage_location: "github://centific-cn/AgenticSDLC/src/components/"
                  format: "TypeScript (.tsx)"

                - artifact_id: "artifact-fe-002"
                  type: "storybook_stories"
                  name: "Storybook Component Stories"
                  storage_location: "github://centific-cn/AgenticSDLC/src/components/**/*.stories.tsx"
                  format: "TypeScript (.stories.tsx)"

                - artifact_id: "artifact-fe-003"
                  type: "unit_tests"
                  name: "Component Unit Tests"
                  storage_location: "github://centific-cn/AgenticSDLC/src/components/**/*.test.tsx"
                  format: "TypeScript (.test.tsx)"

                - artifact_id: "artifact-fe-004"
                  type: "accessibility_report"
                  name: "axe-core Accessibility Audit Report"
                  storage_location: "github://centific-cn/AgenticSDLC/reports/accessibility_audit.json"
                  format: "JSON"

                - artifact_id: "artifact-fe-005"
                  type: "security_scan"
                  name: "SAST + npm Audit Security Report"
                  storage_location: "github://centific-cn/AgenticSDLC/reports/sast_scan.sarif"
                  format: "SARIF"

                - artifact_id: "artifact-fe-006"
                  type: "visual_regression_baseline"
                  name: "Chromatic Visual Regression Baseline"
                  storage_location: "chromatic://project/build-baseline"
                  format: "Chromatic Build"

                - artifact_id: "artifact-fe-007"
                  type: "component_documentation"
                  name: "Component API Documentation"
                  storage_location: "github://centific-cn/AgenticSDLC/docs/components/"
                  format: "Markdown"

                - artifact_id: "artifact-fe-008"
                  type: "component_architecture"
                  name: "Component Architecture Document"
                  storage_location: "github://centific-cn/AgenticSDLC/docs/frontend/component_architecture.md"
                  format: "Markdown + Mermaid"

      # Step 5: Audit and Governance Decision
      step_5:
        action: "Audit Agents → Generate Audit Report"
        phase_1_parallel_audits:
          - agent: "SecurityAuditAgent"
            scope: "Frontend Security Audit"
            checks:
              - "XSS vulnerability scan (SAST)": "passed — 0 findings"
              - "Input sanitization on form components": "passed"
              - "CSP compatibility": "passed"
              - "npm audit (critical/high CVEs)": "passed — 0 critical, 0 high"
              - "OWASP Top 10 A03 (Injection) compliance": "passed"
            output: "SecurityAuditReport Artifact"
            status: "passed"

          - agent: "QualityAuditAgent"
            scope: "Frontend Quality Audit"
            checks:
              - "TypeScript compilation (tsc --noEmit)": "passed — 0 type errors"
              - "ESLint + Prettier compliance": "passed — 0 lint errors"
              - "Unit test coverage ≥ 90%": "passed"
              - "All Storybook stories compile and render": "passed"
              - "Component architecture follows single responsibility": "passed"
              - "No hardcoded design values (all from tokens)": "passed"
            output: "QualityAuditReport Artifact"
            status: "passed"

          - agent: "ComplianceAuditAgent"
            scope: "Frontend Compliance Audit"
            checks:
              - "WCAG 2.1 AA accessibility compliance": "passed — 0 axe violations"
              - "Design token naming convention": "passed"
              - "Component naming convention (PascalCase)": "passed"
              - "i18n compliance (no hardcoded display strings)": "passed"
              - "Storybook story coverage (all components)": "passed"
            output: "ComplianceAuditReport Artifact"
            status: "passed"

          - agent: "CostAuditAgent"
            scope: "Frontend Cost Audit"
            checks:
              - "Token usage": "52000 ≤ 60000 = passed"
              - "Execution time": "5.75h ≤ 6h = passed"
              - "Bundle size per component": "all ≤ 50KB gzipped = passed"
            output: "CostAuditReport Artifact"
            status: "passed"

        phase_2_governance_decision:
          inputs:
            - "FrontendImplementationReport"
            - "SecurityAuditReport"
            - "QualityAuditReport"
            - "ComplianceAuditReport"
            - "CostAuditReport"

          gates_check:
            quality_gate:
              condition: "tsc_errors == 0 AND lint_errors == 0 AND test_coverage >= 90%"
              actual: "0 type errors, 0 lint errors, 92% coverage"
              status: "passed"

            security_gate:
              condition: "xss_findings == 0 AND npm_audit_critical == 0 AND npm_audit_high == 0"
              actual: "0 XSS findings, 0 critical CVEs, 0 high CVEs"
              status: "passed"

            compliance_gate:
              condition: "wcag_violations == 0 AND i18n_hardcoded == 0 AND story_coverage == 100%"
              actual: "0 axe violations, 0 hardcoded strings, 100% story coverage"
              status: "passed"

            budget_gate:
              condition: "total_tokens ≤ 60000 AND execution_time ≤ 6h"
              actual: "52000 tokens, 5.75h"
              status: "passed"

          final_decision:
            status: "passed"
            reason: "All governance gates passed. Frontend implementation meets quality, security, and compliance standards."
            action: "Allow PR merge after HITL Gate human review (frontend-lead + ux-lead + accessibility-reviewer)"

  # ================================================================
  # 7. Completion Criteria and Output
  # ================================================================
  completion:
    # Acceptance Criteria
    acceptance_criteria:
      implementation:
        - "All components listed in UX spec have been implemented in TypeScript React/Vue"
        - "All interaction states implemented: default, hover, focus, active, disabled, loading, error, empty"
        - "All components consume design tokens exclusively (no hardcoded color/spacing/typography)"
        - "TypeScript strict mode: 0 type errors"
        - "ESLint + Prettier: 0 violations"

      testing:
        - "Unit test coverage ≥ 90% for all generated components"
        - "All component tests pass in CI"
        - "All Storybook stories build and render without error"
        - "Visual regression baseline captured in Chromatic"

      accessibility:
        - "WCAG 2.1 Level AA: 0 axe-core violations"
        - "All interactive elements have accessible names (aria-label or visible label)"
        - "Keyboard navigation verified: Tab, Shift+Tab, Enter, Space, Escape"
        - "Color contrast ratios verified against design tokens"

      security:
        - "0 XSS vulnerability findings from SAST scan"
        - "0 critical or high CVEs in npm audit"
        - "All user inputs validated and sanitized"

      documentation:
        - "All components have Storybook stories (Default + state variants)"
        - "Component API documentation generated (props, events, slots)"
        - "All user-facing strings extracted to i18n locale files"
        - "CHANGELOG.md updated with new component entries"

      process:
        - "Feature branch PR created and linked to parent issue"
        - "All audit reports attached to PR"
        - "Reviewers requested: frontend-lead, ux-lead, accessibility-reviewer"
        - "Awaiting HITL Gate human review"

    # Output Artifacts
    artifacts:
      # Code Artifacts
      code_artifacts:
        - artifact_type: "component_source_code"
          name: "TypeScript React Component Files"
          storage_location: "src/components/{feature}/"
          format: "TypeScript (.tsx)"
          content:
            includes:
              - "Component implementation files (*.tsx / *.vue)"
              - "Component CSS modules (*.module.css) or Tailwind class composition"
              - "Custom hooks extracted from component logic (use*.ts)"
              - "Component index barrel exports (index.ts)"

        - artifact_type: "type_definitions"
          name: "Component TypeScript Interface Definitions"
          storage_location: "src/types/{feature}.types.ts"
          format: "TypeScript"
          content:
            includes:
              - "Prop interface definitions"
              - "Event handler type definitions"
              - "API-derived types (from openapi-typescript)"

        - artifact_type: "i18n_keys"
          name: "Internationalization Locale Additions"
          storage_location: "src/i18n/locales/{locale}.json"
          format: "JSON"

      # Test Artifacts
      test_artifacts:
        - artifact_type: "unit_tests"
          name: "Component Unit Tests (Vitest + React Testing Library)"
          storage_location: "src/components/{feature}/*.test.tsx"
          format: "TypeScript (.test.tsx)"

        - artifact_type: "storybook_stories"
          name: "Storybook Component Stories"
          storage_location: "src/components/{feature}/*.stories.tsx"
          format: "TypeScript (.stories.tsx)"

        - artifact_type: "visual_regression_baseline"
          name: "Chromatic Visual Regression Baseline"
          storage_location: "chromatic://project/builds"
          format: "Chromatic Build"

      # Documentation Artifacts
      documentation_artifacts:
        - artifact_type: "component_architecture"
          name: "Component Architecture Document"
          storage_location: "docs/frontend/component_architecture.md"
          format: "Markdown + Mermaid"
          content:
            sections:
              - "Component tree diagram"
              - "Data flow and state management"
              - "TypeScript interface summary"
              - "Design pattern rationale"
              - "Deviations from UX spec (with justification)"

        - artifact_type: "component_api_docs"
          name: "Component API Documentation"
          storage_location: "docs/components/{ComponentName}.md"
          format: "Markdown"
          content:
            sections:
              - "Component overview and purpose"
              - "Prop table (name, type, default, required, description)"
              - "Event table (name, payload, description)"
              - "Slot / children API"
              - "Usage examples with code snippets"
              - "Accessibility notes"
              - "Design token references"

      # Report Artifacts
      report_artifacts:
        - artifact_type: "accessibility_report"
          name: "axe-core Accessibility Audit Report"
          storage_location: "reports/accessibility_audit.json"
          format: "JSON"

        - artifact_type: "security_scan"
          name: "SAST Scan + npm Audit Report"
          storage_location: "reports/sast_scan.sarif"
          format: "SARIF"

        - artifact_type: "frontend_blueprint_report"
          name: "Frontend Blueprint Execution Report"
          storage_location: "s3://artifacts/blueprint-reports/bp_frontend_feature_ui_design.1.0.0.json"
          format: "JSON"

        - artifact_type: "audit_report"
          name: "Governance Audit Report"
          storage_location: "s3://artifacts/audit-reports/frontend_audit.json"
          format: "JSON"

    # Task Status Update
    status_updates:
      github_issues:
        parent_issue:
          issue_id: "GH-22"
          action: "Update progress"
          status_transition: "In Progress → Done"
          labels:
            remove: ["in-progress"]
            add: ["completed", "ready-for-hitl-gate"]

      git_operations:
        pull_requests:
          - action: "Create Feature PR"
            content: |
              # Frontend UI Design — [Feature Name]

              ## Overview
              This PR contains the frontend implementation for [feature description].
              Generated by FrontendAgent via bp_frontend_feature_ui_design.1.0.0.

              ## Artifacts
              - Component Source: `src/components/{feature}/`
              - Storybook Stories: `src/components/{feature}/*.stories.tsx`
              - Unit Tests: `src/components/{feature}/*.test.tsx`
              - Component Docs: `docs/components/`
              - Component Architecture: `docs/frontend/component_architecture.md`

              ## Quality Summary
              | Check | Status |
              |---|---|
              | TypeScript (tsc) | ✅ 0 errors |
              | ESLint + Prettier | ✅ 0 violations |
              | Unit Tests | ✅ Passing (92% coverage) |
              | WCAG 2.1 AA (axe) | ✅ 0 violations |
              | SAST / XSS Scan | ✅ 0 findings |
              | npm audit | ✅ 0 critical/high |
              | Visual Baseline | ✅ Established |

              ## Next Steps
              - **HITL Gate**: Human review by frontend-lead, ux-lead, accessibility-reviewer
              - Upon approval: integration tests and deployment pipeline proceed

          - action: "Add labels"
            labels: ["frontend", "hitl-gate", "ui-design", "ready-for-review"]

          - action: "Request reviewers"
            reviewers: ["frontend-lead", "ux-lead", "accessibility-reviewer"]

      notifications:
        channels:
          - channel: "slack"
            message: |
              ✅ Frontend UI Design Blueprint Completed

              **Blueprint ID**: bp_frontend_feature_ui_design.1.0.0
