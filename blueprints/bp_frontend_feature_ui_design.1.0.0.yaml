  # ================================================================
  # 9. Risk Management
  # ================================================================
  risk_management:
    # Risk Identification
    risks:
      - risk_id: "R001"
        risk_type: "design_drift"
        description: "Generated components may deviate from UX spec intent when wireframes are ambiguous"
        probability: "medium"
        impact: "medium"
        mitigation: "HITL Gate requires UX Lead review; FrontendAgent documents all ambiguity resolutions in component_architecture.md"
        status: "mitigated"

      - risk_id: "R002"
        risk_type: "design_system_mismatch"
        description: "UX spec may reference design values not yet available in the design token system"
        probability: "medium"
        impact: "low"
        mitigation: "FrontendAgent queries design_token_engine first; any missing tokens are flagged in component_requirements.md before code generation begins"
        status: "mitigated"

      - risk_id: "R003"
        risk_type: "accessibility_regression"
        description: "Complex interactive components (e.g. date pickers, comboboxes) may fail axe audit"
        probability: "medium"
        impact: "high"
        mitigation: "Accessibility audit (B7) runs before PR creation; all violations must be resolved before proceeding to B9"
        status: "mitigated"

      - risk_id: "R004"
        risk_type: "api_contract_mismatch"
        description: "Generated component prop types may drift from backend API contract changes"
        probability: "low"
        impact: "high"
        mitigation: "TypeScript types auto-generated from OpenAPI spec at B3; tsc --noEmit at B4 catches any contract drift"
        status: "mitigated"

      - risk_id: "R005"
        risk_type: "bundle_size_bloat"
        description: "New dependencies introduced for complex UI components may exceed bundle size limits"
        probability: "low"
        impact: "medium"
        mitigation: "npm audit + bundle analyzer run at B8; any component exceeding 50KB triggers mandatory code-splitting review"
        status: "mitigated"

      - risk_id: "R006"
        risk_type: "i18n_coverage_gap"
        description: "Hardcoded display strings may be missed during i18n extraction"
        probability: "low"
        impact: "low"
        mitigation: "ESLint i18n plugin (no-hardcoded-string) enforced at B4; ComplianceAuditAgent verifies 0 hardcoded strings"
        status: "mitigated"

    # Escalation Triggers
    escalation_triggers:
      - trigger: "ux_spec_ambiguity"
        condition: "FrontendAgent cannot resolve UX wireframe intent after 2 interpretation attempts"
        action: "Pause B2; generate EscalationRequiredEvent; request UX Lead clarification via GitHub issue comment"

      - trigger: "accessibility_violation_unresolvable"
        condition: "axe audit violations > 0 after 3 fix attempts"
        action: "Pause B9; escalate to accessibility-reviewer for manual guidance"

      - trigger: "security_gate_failure"
        condition: "xss_findings > 0 OR npm_audit_critical > 0 OR npm_audit_high > 0"
        action: "Block PR creation; require SecurityAgent re-analysis and developer fix"

      - trigger: "design_token_missing"
        condition: "UX spec references token not present in design_token_engine"
        action: "Pause B4; flag missing tokens in issue comment; request design system update"

      - trigger: "budget_exceeded"
        condition: "total_tokens > 60000 OR execution_time > 6h"
        action: "Pause execution; generate EscalationRequiredEvent; request human guidance on scope reduction"

      - trigger: "api_type_mismatch"
        condition: "tsc --noEmit reports errors after openapi-typescript generation"
        action: "Pause B4; flag API contract discrepancy; request BuilderAgent or PlanningAgent to update OpenAPI spec"

    # Escalation Process
    escalation_process:
      step_1: "FrontendAgent pauses automated execution at the failed block"
      step_2: "Generate EscalationRequiredEvent with context: block_id, failure_reason, attempted_mitigations"
      step_3: "Create GitHub issue comment on parent issue with escalation details"
      step_4: "Tag appropriate human reviewer based on escalation type"
      step_5: "Wait for human resolution before resuming"

  # ================================================================
  # 10. Configuration and Parameters
  # ================================================================
  config:
    # Risk Level
    risk_level: "medium"  # UI defects are visible to users; accessibility violations carry compliance risk

    # Requires Security Review
    requires_security_review: true  # XSS risk in user-facing components
    security_review_completed: true

    # Deployment Strategy (for frontend assets)
    deployment_strategy: "blue_green"  # CDN cache invalidation + feature flag

    # Parallelism
    parallelism:
      max_parallel_blocks: 4  # B5 + B6 + B7 + B8 run simultaneously
      max_parallel_agents: 3  # QAAgent + SecurityAgent + DocAgent in parallel
      actual_parallelism: 4

    # Timeouts
    timeouts:
      block_timeout: "2h"       # Longest single block: B4 component code generation
      blueprint_timeout: "6h"   # Full frontend implementation cycle
      agent_timeout: "45m"      # Per-agent action timeout

    # Retry Strategy
    retry:
      max_retries: 2
      retry_delay: "5m"
