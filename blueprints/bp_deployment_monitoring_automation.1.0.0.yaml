# Deployment and Monitoring Agent Blueprint
# Blueprint for automated deployment and monitoring with comprehensive audit trail
# Coordinates deployment pipeline execution with real-time monitoring and logging

blueprint:
  # ================================================================
  # 1. Basic Information
  # ================================================================
  metadata:
    blueprint_id: "bp_deployment_monitoring_automation.1.0.0"
    blueprint_name: "Deployment and Monitoring Automation"
    blueprint_type: "deployment"
    version: "1.0.0"
    created_at: "2026-03-26T20:00:00Z"
    created_by: "SREAgent"
    tags:
      - "deployment"
      - "monitoring"
      - "ci-cd"
      - "sre"
      - "audit"
      - "automation"

  # ================================================================
  # 2. Configuration Loading Declaration
  # ================================================================
  configuration:
    # Profile Reference
    profile:
      name: "default_profile"
      description: "Standard deployment profile with monitoring and audit"

    # Rules Loading
    rules:
      # Load entire rule directories
      load_from:
        - ".agentic/rules/naming/"
        - ".agentic/rules/security/"
        - ".agentic/rules/devops/"
        - ".agentic/rules/monitoring/"
        - ".agentic/rules/workflows/"

      # Specific rule files
      specific:
        - ".agentic/rules/naming/general.yaml"
        - ".agentic/rules/security/owasp_top10.yaml"
        - ".agentic/rules/devops/ci_cd_policies.yaml"
        - ".agentic/rules/devops/deployment_strategies.yaml"
        - ".agentic/rules/monitoring/alerting_rules.yaml"

      # Deployment-specific inline rules
      inline:
        custom_rules:
          - name: "deployment_pipeline_validation"
            rule: "All deployments must have valid pipeline configuration"
            enforcement: "strict"
            validator: "pipeline_validator"

          - name: "monitoring_coverage"
            rule: "All deployments must have monitoring coverage defined"
            enforcement: "strict"
            validator: "monitoring_coverage_checker"

          - name: "audit_trail_completeness"
            rule: "All deployment actions must be logged for audit"
            enforcement: "strict"
            validator: "audit_trail_validator"

          - name: "rollback_readiness"
            rule: "All deployments must have rollback capability"
            enforcement: "strict"
            validator: "rollback_readiness_checker"

    # Constraints Loading
    constraints:
      # Load entire constraint directories
      load_from:
        - ".agentic/constraints/infra/static/"
        - ".agentic/constraints/infra/dynamic/"
        - ".agentic/constraints/devops/ci/"
        - ".agentic/constraints/devops/cd/"

      # Specific constraint files
      specific:
        - ".agentic/constraints/infra/static/technical_stack.yaml"
        - ".agentic/constraints/infra/dynamic/resource_quotas.yaml"
        - ".agentic/constraints/devops/ci/quality_gates.yaml"
        - ".agentic/constraints/devops/cd/strategies.yaml"
        - ".agentic/constraints/devops/cd/environments.yaml"

      # Deployment-specific inline constraints
      inline:
        technical_stack:
          go_version: ">= 1.21"
          typescript_version: ">= 5.0"
          node_version: ">= 20.x"
          docker_version: ">= 24.0"
          kubernetes_version: ">= 1.28"

        deployment_constraints:
          deployment_window: "business_hours | maintenance_window | anytime"
          approval_required: "production = true, staging = false"
          rollback_timeout: "15m"
          health_check_timeout: "10m"
          canary_threshold: "5% error rate"

        monitoring_constraints:
          required_metrics:
            - "cpu_usage"
            - "memory_usage"
            - "request_rate"
            - "error_rate"
            - "latency_p95"
          alerting_enabled: true
          log_retention_days: 30

  # ================================================================
  # 3. Input Definition
  # ================================================================
  input:
    # Trigger Definition
    trigger:
      event_type: "IssueCreatedEvent | DeploymentRequestedEvent | PipelineCompletedEvent"
      event_source: "github"
      event_schema:
        issue_id: "24"
        issue_type: "deployment"
        labels: ["deployment", "release", "monitoring"]
        priority: "high"
        deployment_type: "frontend | backend | multi_tier"
        description: "Deploy and monitor application release"

    # Task Type Mapping
    task_mapping:
      deployment:
        primary_phase: "deployment"
        entry_point: "SREAgent"

      release:
        primary_phase: "deployment_and_monitoring"
        entry_point: "SREAgent"

    # Input Context
    context:
      source_documents:
        - type: "GitHub Issue (Deployment Request)"
          location: "github://centific-cn/AgenticSDLC/issues/24"
          required: true
          description: "Deployment request with type and configuration"

        - type: "Deployment Configuration"
          location: ".github/workflows/deploy*.yaml"
          required: true
          description: "CI/CD pipeline configurations"

        - type: "Infrastructure State"
          location: "terraform/ | k8s/"
          required: true
          description: "Current infrastructure state and configurations"

        - type: "Application Artifacts"
          location: "artifacts/ | docker-registry/"
          required: true
          description: "Build artifacts to be deployed"

        - type: "Monitoring Configuration"
          location: "monitoring/ | dashboards/"
          required: true
          description: "Monitoring and alerting configurations"

      data_sources:
        - "Git Repository (main branch)"
        - "CI/CD Pipeline (GitHub Actions/Jenkins)"
        - "Infrastructure State (Platform Agent)"
        - "Container Registry"
        - "Monitoring System (Prometheus/Grafana)"
        - "Log Aggregation (ELK/Loki)"
        - "Learning Agent (historical deployment patterns)"

  # ================================================================
  # 4. Execution Agent Configuration
  # ================================================================
  execution:
    # Primary Agent Selection
    primary_agent:
      agent_type: "SREAgent"
      selection_logic:
        reasoning: |
          1. Issue type = "deployment" OR label = "deployment" → SREAgent
          2. Task requires deployment execution → SREAgent core competency
          3. Need monitoring and incident response → SREAgent expertise
          4. Need audit trail and rollback capability → SREAgent responsibility
          → Decision: SREAgent as Primary Agent

      responsibilities:
        - "Validate deployment pipeline configuration"
        - "Execute deployment pipeline"
        - "Monitor deployment process"
        - "Handle deployment incidents"
        - "Generate audit trail"
        - "Manage rollback if needed"

    # Sub-Agents Coordination
    sub_agents:
      # 1. DevOps Expert (Platform Agent)
      - agent_type: "PlatformAgent"
        role: "DevOps Expert"
        phase: "pipeline_validation_and_setup"
        responsibilities:
          - "Validate deployment pipeline exists"
          - "Check infrastructure dependencies"
          - "Validate resource quotas"
          - "Configure deployment environment"
          - "Set up monitoring and logging"
        coordination: "sequential_before_deployment"

      # 2. Security Expert (Security Agent)
      - agent_type: "SecurityAgent"
        role: "Security Validator"
        phase: "security_validation"
        responsibilities:
          - "Validate image security scanning"
          - "Check secrets management"
          - "Verify network policies"
          - "Validate access controls"
          - "Review deployment security posture"
        coordination: "parallel_with_validation"

      # 3. QA Expert (QA Agent)
      - agent_type: "QAAgent"
        role: "Quality Validator"
        phase: "pre_deployment_validation"
        responsibilities:
          - "Validate test coverage"
          - "Run smoke tests"
          - "Validate quality gates"
          - "Check performance benchmarks"
          - "Verify acceptance criteria"
        coordination: "parallel_with_validation"

      # 4. Monitoring Expert (SRE Agent sub-function)
      - agent_type: "SREAgent"
        role: "Monitoring Setup"
        phase: "monitoring_configuration"
        responsibilities:
          - "Configure deployment monitoring"
          - "Set up alerting rules"
          - "Configure health checks"
          - "Set up log aggregation"
          - "Configure dashboards"
        coordination: "parallel_with_deployment"

  # ================================================================
  # 5. Capabilities and Tools Configuration
  # ================================================================
  capabilities:
    # Agent Skills
    agent_skills:
      SREAgent:
        - "deployment_execution"
        - "pipeline_validation"
        - "monitoring_configuration"
        - "incident_response"
        - "rollback_management"
        - "audit_trail_generation"
        - "health_check_validation"

      PlatformAgent:
        - "infrastructure_validation"
        - "pipeline_setup"
        - "resource_management"
        - "environment_configuration"
        - "kubernetes_management"
        - "terraform_execution"

      SecurityAgent:
        - "container_security_scanning"
        - "secrets_management"
        - "network_policy_validation"
        - "access_control_validation"
        - "security_posture_assessment"

      QAAgent:
        - "smoke_testing"
        - "quality_gate_validation"
        - "performance_testing"
        - "acceptance_criteria_validation"
        - "test_coverage_analysis"

    # Tool Access Permissions
    tool_access:
      - tool: "github_api"
        permissions:
          - "issues:read/write"
          - "pull_requests:read/write"
          - "commits:read"
          - "workflows:dispatch"
          - "repository:read"

      - tool: "ci_cd_api"
        permissions:
          - "pipeline:trigger"
          - "pipeline:monitor"
          - "pipeline:cancel"
          - "artifacts:read"

      - tool: "kubernetes_api"
        permissions:
          - "deployments:read/write"
          - "services:read/write"
          - "pods:read/write"
          - "configmaps:read"
          - "secrets:read"

      - tool: "docker_registry_api"
        permissions:
          - "images:pull"
          - "images:tag"
          - "manifests:read"

      - tool: "monitoring_api"
        permissions:
          - "metrics:query"
          - "alerts:configure"
          - "dashboards:create"
          - "logs:query"

      - tool: "terraform_api"
        permissions:
          - "state:read"
          - "apply:execute"
          - "plan:execute"
          - "output:read"

      - tool: "bash_execution"
        permissions:
          - "command_execution"
          - "file_operations"
          - "deployment_commands"

      - tool: "learning_agent_query"
        permissions:
          - "knowledge_base:read"
          - "deployment_patterns:query"
          - "incident_history:query"

  # ================================================================
  # 6. Task Execution Workflow
  # ================================================================
  workflow:
    # Ralph Loop 5-Step Execution Process
    ralph_loop:
      # Step 1: Confirm Primary Agent
      step_1:
        action: "PlannerAgent → Confirm SREAgent as Primary"
        input:
          issue_type: "deployment"
          issue_id: "24"
          labels: ["deployment", "release", "monitoring"]
          deployment_type: "frontend | backend | multi_tier"
          priority: "high"
        output: "SREAgent assigned as Primary Agent for deployment and monitoring"
        decision_logic: |
          IF label == "deployment" OR issue_type == "deployment" THEN SREAgent
          ELSE IF label == "infrastructure" THEN PlatformAgent
          ELSE IF label == "incident" THEN SREAgent
          ELSE PlanningAgent (for architecture)

      # Step 2: Load Rules and Context
      step_2:
        action: "Primary Agent → Load Rules + Context"
        input_sources:
          - source: "Infra Dependency Layer (Static)"
            content:
              language_stack: ["Go 1.21+", "TypeScript 5.0+", "Node 20.x"]
              deployment_environments:
                - name: "production"
                  region: "us-east-1"
                  cluster: "production-cluster"
                - name: "staging"
                  region: "us-east-1"
                  cluster: "staging-cluster"
              ci_cd_platform: "github_actions"
              version_control: "github"
              container_registry: "ecr/docker-registry"

          - source: "Infra Dependency Layer (Dynamic)"
            content:
              resource_quotas:
                cpu_usage_percent: 45
                memory_usage_percent: 52
                available_pods: 25
              deployment_status:
                last_deployment: "2026-03-25T15:00:00Z"
                current_version: "v1.2.3"
                healthy_replicas: 3
                total_replicas: 3

          - source: "DevOps Dependencies"
            content:
              deployment_pipelines:
                - name: "frontend-deploy"
                  trigger: ".github/workflows/deploy-frontend.yaml"
                  strategy: "canary"
                - name: "backend-deploy"
                  trigger: ".github/workflows/deploy-backend.yaml"
                  strategy: "blue_green"
                - name: "multi-tier-deploy"
                  trigger: ".github/workflows/deploy-multi-tier.yaml"
                  strategy: "rolling"
              monitoring_stack:
                metrics: "prometheus"
                logs: "elk"
                traces: "jaeger"
                dashboards: "grafana"
                alerts: "alertmanager"

          - source: "Learning Agent"
            content:
              deployment_patterns:
                - "Canary deployment for frontend"
                - "Blue-green for backend services"
                - "Rolling update for stateless services"
              successful_patterns:
                - "Automated rollback on failure"
                - "Health check validation"
                - "Metrics-based canary analysis"
              incident_history:
                - "Recent incidents: 0 (last 7 days)"
                - "Common issues: connectivity, resource limits"

        output: "Deployment strategy formulated with full context and dependencies"

      # Step 3: Coordinate Sub-Agents
      step_3:
        action: "Primary Agent → Coordinate Sub-Agents"
        coordination_model: "sequential_validation_with_parallel_deployment"
        description: |
          Deployment workflow with validation phases and parallel monitoring:
          1. Validate deployment pipeline and infrastructure
          2. Pre-deployment validation (security, quality)
          3. Execute deployment with monitoring
          4. Post-deployment validation
          5. Generate audit trail

        dependency_graph:
          blocks:
            # Phase 1: Pipeline Validation
            - block_id: "B1"
              name: "validate_deployment_request"
              assigned_to: "SREAgent"
              dependencies: []
              skills: ["request_validation", "deployment_type_detection"]
              output: "Deployment request validated and type determined"

            - block_id: "B2"
              name: "check_deployment_pipeline"
              assigned_to: "PlatformAgent (DevOps Expert)"
              dependencies: ["B1"]
              skills: ["pipeline_validation", "infrastructure_check"]
              output: "Deployment pipeline status and readiness report"
              critical_check: "Ensures pipeline exists and is configured"

            # Phase 2: Infrastructure and Resource Validation
            - block_id: "B3"
              name: "validate_infrastructure"
              assigned_to: "PlatformAgent"
              dependencies: ["B2"]
              skills: ["infrastructure_validation", "resource_check"]
              output: "Infrastructure readiness report"

            - block_id: "B4"
              name: "check_resource_quotas"
              assigned_to: "PlatformAgent"
              dependencies: ["B3"]
              skills: ["resource_validation", "quota_management"]
              output: "Resource availability report"

            # Phase 3: Pre-deployment Validation (Parallel)
            - block_id: "B5"
              name: "security_validation"
              assigned_to: "SecurityAgent"
              dependencies: ["B4"]
              skills: ["security_scanning", "vulnerability_check"]
              output: "Security validation report"
              coordination: "parallel"

            - block_id: "B6"
              name: "quality_validation"
              assigned_to: "QAAgent"
              dependencies: ["B4"]
              skills: ["smoke_testing", "quality_gate_check"]
              output: "Quality validation report"
              coordination: "parallel"

            # Phase 4: Monitoring Setup
            - block_id: "B7"
              name: "setup_monitoring"
              assigned_to: "SREAgent (Monitoring Setup)"
              dependencies: ["B4"]
              skills: ["monitoring_configuration", "alerting_setup"]
              output: "Monitoring configured and alerts set up"
              coordination: "parallel"

            # Phase 5: Deployment Execution
            - block_id: "B8"
              name: "execute_deployment"
              assigned_to: "SREAgent"
              dependencies: ["B5", "B6", "B7"]
              skills: ["deployment_execution", "pipeline_trigger"]
              output: "Deployment pipeline triggered and executing"
              execution_mode: "real-time_monitoring"

            # Phase 6: Deployment Monitoring
            - block_id: "B9"
              name: "monitor_deployment"
              assigned_to: "SREAgent"
              dependencies: ["B8"]
              skills: ["real_time_monitoring", "health_check", "log_monitoring"]
              output: "Deployment monitoring data and health status"
              monitoring_metrics:
                - "deployment_progress"
                - "pod_status"
                - "health_checks"
                - "error_rates"
                - "latency_metrics"

            # Phase 7: Post-deployment Validation
            - block_id: "B10"
              name: "validate_deployment"
              assigned_to: "SREAgent"
              dependencies: ["B9"]
              skills: ["deployment_validation", "health_check_validation"]
              output: "Deployment success/failure report"
              success_criteria:
                - "All pods healthy"
                - "Health checks passing"
                - "Error rate < threshold"
                - "Latency within SLA"

            # Phase 8: Rollback (if needed)
            - block_id: "B11"
              name: "handle_failure_or_rollback"
              assigned_to: "SREAgent"
              dependencies: ["B10"]
              skills: ["incident_response", "rollback_execution"]
              output: "Incident report or rollback confirmation"
              condition: "only_if_deployment_failed"

            # Phase 9: Audit Trail Generation
            - block_id: "B12"
              name: "generate_audit_trail"
              assigned_to: "SREAgent"
              dependencies: ["B10", "B11"]
              skills: ["audit_generation", "artifact_tracking", "log_aggregation"]
              output: "Comprehensive audit trail and deployment report"
              audit_components:
                - "Deployment actions"
                - "Monitoring data"
                - "Artifact versions"
                - "Configuration changes"
                - "Incident reports (if any)"
              validators:
                - type: "git_diff_check"
                  min_files_changed: 1
                - type: "file_exists"
                  path: "docs/deployment/*.md"

          execution_order: "B1 → B2 → B3 → B4 → (B5 + B6 + B7 parallel) → B8 → B9 → B10 → B11(if needed) → B12"

      # Step 4: Confirm Completion and Deliver Output
      step_4:
        action: "Confirm Completion + Deliver Output"
        deliverables:
          - type: "github_issue_update"
            content:
              parent_issue: "GH-24"
              status: "In Progress → Done"
              comments:
                - "✅ validate_deployment_request (SREAgent) - Complete"
                - "✅ check_deployment_pipeline (PlatformAgent) - Complete"
                - "✅ validate_infrastructure (PlatformAgent) - Complete"
                - "✅ check_resource_quotas (PlatformAgent) - Complete"
                - "✅ security_validation (SecurityAgent) - Complete"
                - "✅ quality_validation (QAAgent) - Complete"
                - "✅ setup_monitoring (SREAgent) - Complete"
                - "✅ execute_deployment (SREAgent) - Complete"
                - "✅ monitor_deployment (SREAgent) - Complete"
                - "✅ validate_deployment (SREAgent) - Complete"
                - "✅ generate_audit_trail (SREAgent) - Complete"
                - ""
                - "📊 **Deployment Summary:**"
                - "- Status: Success"
                - "- Deployment Type: [frontend/backend/multi-tier]"
                - "- Environment: [production/staging]"
                - "- Duration: [time]"
                - "- Health Checks: All passing"
                - "- Rollback: Not required"
                - "- Audit Trail: Generated"

              labels:
                remove: ["in-progress"]
                add: ["completed", "deployed", "monitored"]

          - type: "artifact"
            artifact_type: "deployment_audit_trail"
            content:
              blueprint_id: "bp_deployment_monitoring_automation.1.0.0"
              blueprint_name: "Deployment and Monitoring Automation"
              execution_start: "2026-03-26T20:00:00Z"
              execution_end: "2026-03-26T22:00:00Z"
              duration_hours: 2.0
              status: "success"

              deployment_info:
                deployment_type: "frontend | backend | multi_tier"
                deployment_strategy: "canary | blue_green | rolling"
                target_environment: "production | staging"
                deployment_id: "DEPLOY-20260326-001"

              blocks_executed:
                - block_id: "B1"
                  name: "validate_deployment_request"
                  agent: "SREAgent"
                  status: "completed"
                  duration_minutes: 5
                  artifacts: ["deployment_request_validation.json"]

                - block_id: "B2"
                  name: "check_deployment_pipeline"
                  agent: "PlatformAgent"
                  status: "completed"
                  duration_minutes: 10
                  artifacts: ["pipeline_status_report.json"]

                - block_id: "B3"
                  name: "validate_infrastructure"
                  agent: "PlatformAgent"
                  status: "completed"
                  duration_minutes: 15
                  artifacts: ["infrastructure_readiness.json"]

                - block_id: "B4"
                  name: "check_resource_quotas"
                  agent: "PlatformAgent"
                  status: "completed"
                  duration_minutes: 5
                  artifacts: ["resource_quota_report.json"]

                - block_id: "B5"
                  name: "security_validation"
                  agent: "SecurityAgent"
                  status: "completed"
                  duration_minutes: 10
                  artifacts: ["security_validation_report.json"]

                - block_id: "B6"
                  name: "quality_validation"
                  agent: "QAAgent"
                  status: "completed"
                  duration_minutes: 10
                  artifacts: ["quality_validation_report.json"]

                - block_id: "B7"
                  name: "setup_monitoring"
                  agent: "SREAgent"
                  status: "completed"
                  duration_minutes: 10
                  artifacts: ["monitoring_config.json"]

                - block_id: "B8"
                  name: "execute_deployment"
                  agent: "SREAgent"
                  status: "completed"
                  duration_minutes: 20
                  artifacts: ["pipeline_execution_log.json"]

                - block_id: "B9"
                  name: "monitor_deployment"
                  agent: "SREAgent"
                  status: "completed"
                  duration_minutes: 15
                  artifacts: ["monitoring_data.json"]

                - block_id: "B10"
                  name: "validate_deployment"
                  agent: "SREAgent"
                  status: "completed"
                  duration_minutes: 10
                  artifacts: ["deployment_validation_report.json"]

                - block_id: "B12"
                  name: "generate_audit_trail"
                  agent: "SREAgent"
                  status: "completed"
                  duration_minutes: 10
                  artifacts: ["audit_trail.json", "deployment_summary.json"]

              output_artifacts:
                - artifact_id: "artifact-deploy-001"
                  type: "deployment_execution_record"
                  name: "Deployment Execution Record"
                  storage_location: "s3://artifacts/deployments/DEPLOY-20260326-001/execution_record.json"
                  format: "JSON"

                - artifact_id: "artifact-deploy-002"
                  type: "monitoring_data"
                  name: "Deployment Monitoring Data"
                  storage_location: "s3://artifacts/deployments/DEPLOY-20260326-001/monitoring_data.json"
                  format: "JSON"

                - artifact_id: "artifact-deploy-003"
                  type: "deployment_artifact"
                  name: "Deployed Artifact Information"
                  storage_location: "s3://artifacts/deployments/DEPLOY-20260326-001/artifact_info.json"
                  format: "JSON"
                  content:
                    image_digest: "sha256:abc123..."
                    image_tag: "v1.2.4"
                    manifest: "deployment manifest"
                    configuration_version: "config-v1"

                - artifact_id: "artifact-deploy-004"
                  type: "audit_trail"
                  name: "Comprehensive Audit Trail"
                  storage_location: "s3://artifacts/deployments/DEPLOY-20260326-001/audit_trail.json"
                  format: "JSON"

                - artifact_id: "artifact-deploy-005"
                  type: "deployment_report"
                  name: "Deployment Summary Report"
                  storage_location: "s3://artifacts/deployments/DEPLOY-20260326-001/deployment_summary.json"
                  format: "JSON"

              metrics:
                total_blocks: 11
                completed_blocks: 11
                failed_blocks: 0
                total_tokens_used: 35000
                total_cost_usd: 1.75
                deployment_success: true
                rollback_required: false
                health_check_pass_rate: "100%"

      # Step 5: Audit and Governance Decision
      step_5:
        action: "Audit Agents → Generate Audit Report"
        phase_1_parallel_audits:
          - agent: "SecurityAuditAgent"
            scope: "安全审计"
            checks:
              - "部署安全扫描": "passed"
              - "镜像安全验证": "passed"
              - "Secrets 管理": "passed"
              - "网络策略合规": "passed"
            output: "SecurityAuditReport Artifact"
            status: "passed"

          - agent: "QualityAuditAgent"
            scope: "质量审计"
            checks:
              - "健康检查通过率": "100%"
              - "错误率 < threshold": "passed"
              - "性能指标达标": "passed"
              - "部署后测试通过": "passed"
            output: "QualityAuditReport Artifact"
            status: "passed"

          - agent: "ComplianceAuditAgent"
            scope: "合规审计"
            checks:
              - "审计日志完整性": "passed"
              - "部署流程合规": "passed"
              - "变更记录完整": "passed"
            output: "ComplianceAuditReport Artifact"
            status: "passed"

          - agent: "DeploymentAuditAgent"
            scope: "部署审计"
            checks:
              - "部署流程记录": "complete"
              - "监控数据记录": "complete"
              - "制品信息记录": "complete"
              - "变更追踪": "complete"
            output: "DeploymentAuditReport Artifact"
            status: "passed"

          - agent: "CostAuditAgent"
            scope: "成本审计"
            checks:
              - "资源使用合理": "passed"
              - "部署时间预期内": "passed"
            output: "CostAuditReport Artifact"
            status: "passed"

        phase_2_governance_decision:
          inputs:
            - "Deployment Execution Report"
            - "SecurityAuditReport"
            - "QualityAuditReport"
            - "ComplianceAuditReport"
            - "DeploymentAuditReport"
            - "CostAuditReport"

          gates_check:
            deployment_gate:
              condition: "deployment_success = true AND health_checks_pass = 100%"
              actual: "deployment successful, all health checks passing"
              status: "passed"

            security_gate:
              condition: "security_validation_passed = true"
              actual: "all security checks passed"
              status: "passed"

            quality_gate:
              condition: "quality_validation_passed = true AND error_rate < threshold"
              actual: "quality validation passed, error rate within threshold"
              status: "passed"

            audit_gate:
              condition: "audit_trail_complete = true"
              actual: "comprehensive audit trail generated"
              status: "passed"

            cost_gate:
              condition: "deployment_time ≤ max_time AND resource_usage ≤ quota"
              actual: "deployment within expected time and resource limits"
              status: "passed"

          final_decision:
            status: "passed"
            reason: "所有 gates 通过，部署成功且审计记录完整"
            action: "部署已成功完成，监控已配置，审计记录已生成"

