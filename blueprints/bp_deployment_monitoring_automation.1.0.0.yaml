  # ================================================================
  # 8. Metrics
  # ================================================================
  metrics:
    # Execution Metrics
    execution:
      - metric_name: "deployment_time"
        description: "部署执行时间"
        unit: "hours"
        target: "≤ 2h"
        actual: 2.0
        status: "passed"

      - metric_name: "token_usage"
        description: "Token 使用量"
        unit: "tokens"
        target: "≤ 50000"
        actual: 35000
        status: "passed"

      - metric_name: "pipeline_validation_time"
        description: "流水线验证时间"
        unit: "minutes"
        target: "≤ 30m"
        actual: 20
        status: "passed"

    # Deployment Metrics
    deployment:
      - metric_name: "deployment_success_rate"
        description: "部署成功率"
        unit: "percentage"
        target: "100%"
        actual: 100
        status: "passed"

      - metric_name: "health_check_pass_rate"
        description: "健康检查通过率"
        unit: "percentage"
        target: "100%"
        actual: 100
        status: "passed"

      - metric_name: "rollback_rate"
        description: "回滚率"
        unit: "percentage"
        target: "0%"
        actual: 0
        status: "passed"

      - metric_name: "deployment_velocity"
        description: "部署速度"
        unit: "deployments_per_day"
        target: "≥ 1"
        actual: 1
        status: "passed"

    # Quality Metrics
    quality:
      - metric_name: "error_rate"
        description: "错误率"
        unit: "percentage"
        target: "< 1%"
        actual: 0.8
        status: "passed"

      - metric_name: "latency_p95"
        description: "P95 延迟"
        unit: "milliseconds"
        target: "< 200ms"
        actual: 180
        status: "passed"

      - metric_name: "availability"
        description: "可用性"
        unit: "percentage"
        target: "≥ 99.9%"
        actual: 99.95
        status: "passed"

    # Audit Metrics
    audit:
      - metric_name: "audit_trail_completeness"
        description: "审计日志完整性"
        unit: "percentage"
        target: "100%"
        actual: 100
        status: "passed"

      - metric_name: "artifact_tracking_coverage"
        description: "制品追踪覆盖率"
        unit: "percentage"
        target: "100%"
        actual: 100
        status: "passed"

    # Summary
    summary:
      total_execution_time: "2.0 hours"
      total_cost_usd: 1.75
      total_blocks_executed: 11
      total_blocks_failed: 0
      deployment_status: "success"
      rollback_required: false
      monitoring_active: true
      audit_complete: true
      overall_status: "completed"

  # ================================================================
  # 9. Risk Management
  # ================================================================
  risk_management:
    # Risk Identification
    risks:
      - risk_id: "R001"
        risk_type: "deployment"
        description: "部署失败导致服务中断"
        probability: "low"
        impact: "critical"
        mitigation: "Canary/blue-green strategy, automated rollback, health checks"
        status: "mitigated"

      - risk_id: "R002"
        risk_type: "resource"
        description: "资源配额不足"
        probability: "low"
        impact: "high"
        mitigation: "Pre-deployment resource quota validation, auto-scaling"
        status: "mitigated"

      - risk_id: "R003"
        risk_type: "security"
        description: "部署引入安全问题"
        probability: "low"
        impact: "critical"
        mitigation: "Security validation, container scanning, network policies"
        status: "mitigated"

      - risk_id: "R004"
        risk_type: "monitoring"
        description: "监控配置失败"
        probability: "low"
        impact: "medium"
        mitigation: "Monitoring validation, backup alerting, manual oversight"
        status: "mitigated"

      - risk_id: "R005"
        risk_type: "rollback"
        description: "回滚失败"
        probability: "very_low"
        impact: "critical"
        mitigation: "Rollback testing, backup strategy, manual rollback procedures"
        status: "mitigated"

    # Escalation Triggers
    escalation_triggers:
      - trigger: "deployment_failure"
        condition: "health_check_failure_rate > 50% OR error_rate > threshold"
        action: "自动触发回滚流程"

      - trigger: "rollback_timeout"
        condition: "rollback_duration > 15m"
        action: "升级到人工处理，创建紧急事件"

      - trigger: "monitoring_failure"
        condition: "monitoring_unavailable > 5m"
        action: "暂停部署，修复监控系统"

      - trigger: "resource_exhaustion"
        condition: "resource_usage > 95%"
        action: "暂停部署，扩展资源或优化配置"

    # Escalation Process
    escalation_process:
      step_1: "系统检测到触发条件"
      step_2: "执行自动缓解措施（如回滚）"
      step_3: "生成 EscalationRequiredEvent"
      step_4: "创建紧急 Issue 用于人工干预"
      step_5: "通知相关人员（Slack, Email, PagerDuty）"
      step_6: "提供上下文和建议"
      step_7: "等待人工解决"

    # Rollback Strategy
    rollback_strategy:
      automatic: true
      rollback_conditions:
        - "health_check_failure_rate > 50%"
        - "error_rate > 5%"
        - "latency_p95 > 500ms"
        - "manual_trigger"
      rollback_timeout: "15m"
      rollback_validation:
        - "验证回滚后健康状态"
        - "验证回滚后性能指标"
        - "生成回滚报告"

  # ================================================================
  # 10. Configuration and Parameters
  # ================================================================
  config:
    # Risk Level
    risk_level: "medium"

    # Deployment Configuration
    deployment:
      requires_approval: true
      approval_required_for:
        - "production"
      approval_not_required_for:
        - "staging"
        - "development"

      deployment_strategies:
        frontend: "canary"
        backend: "blue_green"
        multi_tier: "rolling"

      deployment_windows:
        production: "maintenance_window | business_hours | anytime"
        staging: "anytime"
        development: "anytime"

    # Monitoring Configuration
    monitoring:
      required: true
      monitoring_tools:
        - "prometheus"
        - "grafana"
        - "alertmanager"
      log_retention_days: 30
      metrics_retention_days: 90

    # Parallelism
    parallelism:
      max_parallel_blocks: 3  # For parallel validation
      max_parallel_agents: 3
      actual_parallelism: 3

    # Timeouts
    timeouts:
      block_timeout: "30m"
      blueprint_timeout: "4h"
      deployment_timeout: "2h"
      health_check_timeout: "10m"
      rollback_timeout: "15m"
      actual_execution_time: "2.0h"

    # Retry Strategy
    retry:
      max_retries: 3
      retry_delay: "5m"
      backoff_multiplier: 2
      actual_retries: 0

    # Notification Configuration
    notifications:
      on_start: true
      on_complete: true
      on_failure: true
      on_rollback: true
      channels: ["slack", "email", "pagerduty"]
      notification_urgency:
        production: "high"
        staging: "medium"
        development: "low"

# ================================================================
# Deployment and Monitoring Agent Blueprint End
# ================================================================
