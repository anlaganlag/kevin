        - artifact_type: "audit_trail"
          name: "Comprehensive Audit Trail"
          storage_location: "s3://artifacts/deployments/DEPLOY-[timestamp]/audit_trail.json"
          format: "JSON"
          content:
            audit_events:
              - timestamp: "2026-03-26T20:00:00Z"
                event_type: "deployment_started"
                actor: "SREAgent"
                details: "Deployment initiated by issue GH-24"
              - timestamp: "2026-03-26T20:05:00Z"
                event_type: "pipeline_triggered"
                actor: "SREAgent"
