          content:
            deployment_id: "DEPLOY-20260326-001"
            deployment_type: "frontend | backend | multi_tier"
            strategy: "canary | blue_green | rolling"
            environment: "production | staging"
            trigger_issue: "GH-24"
            execution_time:
              start: "2026-03-26T20:00:00Z"
              end: "2026-03-26T22:00:00Z"
              duration: "2h"
            executor: "SREAgent"
            status: "success | failed | rolled_back"

        - artifact_type: "monitoring_data"
          name: "Deployment Monitoring Data"
          storage_location: "s3://artifacts/deployments/DEPLOY-[timestamp]/monitoring_data.json"
          format: "JSON"
          content:
            metrics:
              - "cpu_usage"
              - "memory_usage"
              - "request_rate"
              - "error_rate"
              - "latency_p50"
              - "latency_p95"
              - "latency_p99"
            health_checks:
              - "liveness_checks"
              - "readiness_checks"
              - "custom_health_checks"
            alerts:
              - "alert_configurations"
