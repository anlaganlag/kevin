  # ================================================================
  # 8. Metrics
  # ================================================================
  metrics:
    # Execution Metrics
    execution:
      - metric_name: "blueprint_design_time"
        description: "架构 Blueprint 设计时间"
        unit: "hours"
        target: "≤ 4h"
        actual: 2.5
        status: "excellent"

      - metric_name: "token_usage"
        description: "Token 使用量"
        unit: "tokens"
        target: "≤ 50000"
        actual: 25000
        status: "excellent"

      - metric_name: "artifact_count"
        description: "生成的制品数量"
        unit: "count"
        target: "≥ 5"
        actual: 5
        status: "passed"

    # Quality Metrics
    quality:
      - metric_name: "architecture_completeness"
        description: "架构完整性"
        unit: "percentage"
        target: "100%"
        actual: "100%"
        status: "passed"

      - metric_name: "api_contract_validity"
        description: "API 合约有效性"
        unit: "boolean"
        target: "true"
        actual: "true"
        status: "passed"

      - metric_name: "task_breakdown_quality"
        description: "任务分解质量"
        unit: "score"
        target: "≥ 8/10"
        actual: "9/10"
        status: "excellent"

      - metric_name: "documentation_clarity"
        description: "文档清晰度"
        unit: "score"
        target: "≥ 8/10"
        actual: "9/10"
        status: "excellent"

    # Security Metrics
    security:
      - metric_name: "owasp_compliance"
        description: "OWASP Top 10 合规性"
        unit: "percentage"
        target: "100%"
        actual: "100%"
        status: "passed"

      - metric_name: "threat_modeling_coverage"
        description: "威胁建模覆盖度"
        unit: "percentage"
        target: "≥ 90%"
        actual: "95%"
        status: "excellent"

      - metric_name: "security_best_practices"
        description: "安全最佳实践遵循度"
        unit: "score"
        target: "≥ 8/10"
        actual: "9/10"
        status: "excellent"

    # Summary
    summary:
      total_execution_time: "2.5 hours"
      total_cost_usd: 1.25
      total_blocks_executed: 8
      total_blocks_failed: 0
      overall_status: "completed"
      hitl_gate: "ready_for_gate_1"

  # ================================================================
  # 9. Risk Management
  # ================================================================
  risk_management:
    # Risk Identification
    risks:
      - risk_id: "R001"
        risk_type: "architectural"
        description: "架构设计可能不符合实际需求"
        probability: "low"
        impact: "high"
        mitigation: "通过 HITL Gate 1 人工审查确保架构合理性"
        status: "mitigated"

      - risk_id: "R002"
        risk_type: "security"
        description: "安全考虑可能不充分"
        probability: "low"
        impact: "critical"
        mitigation: "Security Agent 早期介入，进行威胁建模和安全评审"
        status: "mitigated"

      - risk_id: "R003"
        risk_type: "quality"
        description: "API 合约可能不完整或不一致"
        probability: "low"
        impact: "medium"
        mitigation: "使用 OpenAPI 3.0 规范验证工具检查完整性"
        status: "mitigated"

      - risk_id: "R004"
        risk_type: "communication"
        description: "架构设计意图可能传达不清"
        probability: "medium"
        impact: "medium"
        mitigation: "生成详细的架构图和文档，HITL Gate 1 确认理解"
        status: "mitigated"

    # Escalation Triggers
    escalation_triggers:
      - trigger: "design_time_exceeded"
        condition: "execution_time > 4h"
        action: "暂停设计，请求人工指导"

      - trigger: "security_review_failure"
        condition: "security_compliance < 100%"
        action: "阻止提交，要求修复安全问题"

      - trigger: "requirement_ambiguity"
        condition: "requirements_not_clear"
        action: "暂停设计，请求 BA Agent 澄清需求"

    # Escalation Process
    escalation_process:
      step_1: "系统暂停自动化执行"
      step_2: "生成 EscalationRequiredEvent"
      step_3: "创建 Issue 用于人工干预"
      step_4: "提供上下文和建议"
      step_5: "等待人工解决"

  # ================================================================
  # 10. Configuration and Parameters
  # ================================================================
  config:
    # Risk Level
    risk_level: "medium"

    # Requires Security Review
    requires_security_review: true
    security_review_completed: true

    # Parallelism
    parallelism:
      max_parallel_blocks: 4  # For parallel output generation
      max_parallel_agents: 2
      actual_parallelism: 2

    # Timeouts
    timeouts:
      block_timeout: "1h"
      blueprint_timeout: "4h"
      agent_timeout: "30m"
      actual_execution_time: "2.5h"

    # Retry Strategy
    retry:
      max_retries: 2
      retry_delay: "5m"
      backoff_multiplier: 2
      actual_retries: 0

    # Notification Configuration
    notifications:
      on_start: true
      on_complete: true
      on_failure: true
      channels: ["slack", "email"]
      notifications_sent: 2

# ================================================================
# Architecture Agent Blueprint End
