# Architecture Agent Blueprint
# Blueprint for Planning Agent to design architecture from approved requirements
# Based on AgenticSDLC v2.0 Architecture

blueprint:
  # ================================================================
  # 1. Basic Information
  # ================================================================
  metadata:
    blueprint_id: "bp_architecture_blueprint_design.1.0.0"
    blueprint_name: "Architecture Design Blueprint"
    blueprint_type: "architecture"
    version: "1.0.0"
    created_at: "2026-03-26T12:00:00Z"
    created_by: "PlanningAgent"
    tags:
      - "architecture"
      - "design"
      - "api-contract"
      - "task-breakdown"
      - "hitl-gate-1"

  # ================================================================
  # 2. Configuration Loading Declaration
  # ================================================================
  configuration:
    # Profile Reference
    profile:
      name: "default_profile"
      description: "Balanced quality and speed for architecture design"

    # Rules Loading
    rules:
      # Load entire rule directories
      load_from:
        - ".agentic/rules/naming/"
        - ".agentic/rules/security/"
        - ".agentic/rules/architecture/"
        - ".agentic/rules/documentation/"

      # Specific rule files
      specific:
        - ".agentic/rules/naming/general.yaml"
        - ".agentic/rules/security/owasp_top10.yaml"
        - ".agentic/rules/architecture/api_standards.yaml"
        - ".agentic/rules/documentation/api_docs.yaml"

      # Architecture-specific inline rules
      inline:
        custom_rules:
          - name: "api_consistency_check"
            rule: "All API endpoints must follow established patterns from Learning Agent"
            enforcement: "strict"
            validator: "api_consistency_validator"

          - name: "architecture_modularity"
            rule: "Architecture must be modular with clear separation of concerns"
            enforcement: "strict"
            validator: "modularity_checker"

          - name: "blueprint_completeness"
            rule: "Blueprint must include all required sections and artifacts"
            enforcement: "strict"
            validator: "blueprint_validator"

    # Constraints Loading
    constraints:
      # Load entire constraint directories
      load_from:
        - ".agentic/constraints/infra/static/"
        - ".agentic/constraints/business/"

      # Specific constraint files
      specific:
        - ".agentic/constraints/infra/static/technical_stack.yaml"
        - ".agentic/constraints/business/api_standards.yaml"

      # Architecture-specific inline constraints
      inline:
        technical_stack:
          go_version: ">= 1.21"
          typescript_version: ">= 5.0"
          node_version: ">= 20.x"

        architecture_constraints:
          max_service_complexity: "medium"
          preferred_pattern: "microservices_with_event_bus"
          max_api_depth: 3

        resource_quotas:
          max_design_time: "4h"
          max_blueprint_size: "2MB"

  # ================================================================
  # 3. Input Definition
  # ================================================================
  input:
    # Trigger Definition
    trigger:
      event_type: "IssueCreatedEvent | RequirementApprovedEvent"
      event_source: "github"
      event_schema:
        issue_id: "17"
        issue_type: "task"
        labels: ["architecture", "design", "documentation"]
        priority: "high"
        description: "Create Architecture Agent Blueprint for designing architecture from approved requirements"

    # Task Type Mapping
    task_mapping:
      requirement:
        primary_phase: "analysis"
        entry_point: "BA_Agent"
      task:
        primary_phase: "planning"
        entry_point: "PlanningAgent"

    # Input Context
    context:
      source_documents:
        - type: "Approved Requirements"
          location: "github://centific-cn/AgenticSDLC/issues/17"
          required: true
          description: "Issue containing architecture blueprint task"

        - type: "Business Requirement Document"
          location: "requirements/brd_*.md"
          required: true
          description: "BRD generated by BA Agent from requirement analysis"

        - type: "User Stories"
          location: "requirements/user_stories_*.md"
          required: true
          description: "Structured user stories with acceptance criteria"

        - type: "Agent Specification"
          location: "agents/agent_02_planner.md"
          required: true
          description: "Planning Agent capabilities and responsibilities"

      data_sources:
        - "Git Repository (main branch)"
        - "Learning Agent Knowledge Base"
        - "Infrastructure State (Platform Agent)"
        - "Historical Architecture Patterns (Learning Agent)"

  # ================================================================
  # 4. Execution Agent Configuration
  # ================================================================
  execution:
    # Primary Agent Selection
    primary_agent:
      agent_type: "PlanningAgent"
      selection_logic:
        reasoning: |
          1. Issue type = "task" with label "architecture" → Default: PlanningAgent
          2. Issue is about creating architecture blueprint → PlanningAgent is expert
          3. Task requires technical design and API contract definition → PlanningAgent core competency
          → Decision: PlanningAgent as Primary Agent

      responsibilities:
        - "Architecture design and documentation"
        - "API contract definition (OpenAPI specification)"
        - "Task breakdown for implementation"
        - "Blueprint PR creation for HITL Gate 1 review"

    # Sub-Agents Coordination
    sub_agents:
      - agent_type: "LearningAgent"
        phase: "context_loading"
        responsibilities:
          - "Retrieve historical architecture patterns"
          - "Identify successful implementation patterns"
          - "Provide lessons learned from past failures"
          - "Suggest best practices for current requirements"
        coordination: "sequential_before_design"

      - agent_type: "SecurityAgent"
        phase: "architecture_review"
        responsibilities:
          - "Review security architecture requirements"
          - "Identify security considerations early"
          - "Ensure OWASP Top 10 compliance"
        coordination: "consultative"

      - agent_type: "DocAgent"
        phase: "documentation"
        responsibilities:
          - "Generate API documentation"
          - "Create architecture diagrams"
          - "Document design decisions"
        coordination: "parallel_with_output"

  # ================================================================
  # 5. Capabilities and Tools Configuration
  # ================================================================
  capabilities:
    # Agent Skills
    agent_skills:
      PlanningAgent:
        - "blueprint_design"
        - "api_contract_design"
        - "architecture_consistency_check"
        - "task_decomposition"
        - "security_architecture_design"
        - "technology_stack_selection"
        - "integration_pattern_design"

      LearningAgent:
        - "pattern_matching"
        - "historical_context_retrieval"
        - "best_practice_recommendation"
        - "lesson_learned_extraction"

      SecurityAgent:
        - "threat_modeling"
        - "security_architecture_review"
        - "owasp_compliance_check"
        - "security_pattern_recommendation"

      DocAgent:
        - "api_documentation_generation"
        - "architecture_diagram_creation"
        - "design_decision_documentation"
        - "openapi_specification_generation"

    # Tool Access Permissions
    tool_access:
      - tool: "github_api"
        permissions:
          - "issues:read/write"
          - "pull_requests:read/write"
          - "commits:read"
          - "repository:read"

      - tool: "bash_execution"
        permissions:
          - "command_execution"
          - "file_operations"
          - "directory_operations"

      - tool: "learning_agent_query"
        permissions:
          - "knowledge_base:read"
          - "pattern_matching"
          - "architecture_patterns:query"

      - tool: "platform_agent_api"
        permissions:
          - "infra_state:read"
          - "technical_constraints:read"
          - "resource_quotas:read"

      - tool: "openapi_generator"
        permissions:
          - "openapi_spec:generate"
          - "api_contract:validate"

      - tool: "diagram_generator"
        permissions:
          - "mermaid_diagrams:create"
          - "architecture_visuals:generate"

  # ================================================================
  # 6. Task Execution Workflow
  # ================================================================
  workflow:
    # Ralph Loop 5-Step Execution Process
    ralph_loop:
      # Step 1: Confirm Primary Agent
      step_1:
        action: "PlannerAgent → Confirm PlanningAgent as Primary"
        input:
          issue_type: "task"
          issue_id: "17"
          labels: ["architecture", "design", "documentation"]
          priority: "high"
        output: "PlanningAgent assigned as Primary Agent"
        decision_logic: |
          IF label == "architecture" THEN PlanningAgent
          ELSE IF issue_type == "task" THEN PlanningAgent
          ELSE BA_Agent (for requirements)

      # Step 2: Load Rules and Context
      step_2:
        action: "Primary Agent → Load Rules + Context"
        input_sources:
          - source: "Infra Dependency Layer (Static)"
            content:
              language_stack: ["Go 1.21+", "TypeScript 5.0+", "Node 20.x"]
              framework_versions:
                go: ">= 1.21"
                node: ">= 20.x"
              security_policies: "OWASP Top 10 compliance"
              network_topology: "Multi-AZ VPC"
              architecture_patterns:
                - "Event-driven architecture"
                - "Microservices with service mesh"
                - "API Gateway pattern"

          - source: "Infra Dependency Layer (Dynamic)"
            content:
              resource_quotas:
                cpu_usage_percent: 45
                memory_usage_percent: 52
              deployment_status:
                environment: "staging"
                healthy_services: 12

          - source: "Learning Agent"
            content:
              architecture_patterns:
                - "Ralph Loop event processing framework"
                - "5-layer EDA architecture"
                - "Hybrid coordination model"
              successful_patterns:
                - "OpenAPI 3.0 for API contracts"
                - "Mermaid for architecture diagrams"
                - "YAML for blueprint definitions"
              lessons_learned:
                - "Always include HITL gates"
                - "Maintain separation of concerns"
                - "Document all design decisions"

          - source: "Approved Requirements (from BA Agent)"
            content:
              brd_location: "requirements/brd_*.md"
              user_stories_location: "requirements/user_stories_*.md"
              acceptance_criteria_location: "requirements/acceptance_criteria_*.md"

        output: "Execution strategy formulated with full context"

      # Step 3: Coordinate Sub-Agents
      step_3:
        action: "Primary Agent → Coordinate Sub-Agents"
        coordination_model: "sequential_with_parallel_output"
        description: |
          Architecture design process with sequential phases and parallel output generation:
          1. Load context from Learning Agent (historical patterns)
          2. Analyze requirements and design architecture
          3. Generate outputs in parallel (API contract, diagrams, tasks)
          4. Review with Security Agent
          5. Create Blueprint PR for HITL Gate 1

        dependency_graph:
          blocks:
            # Phase 1: Context Loading
            - block_id: "B1"
              name: "load_context"
              assigned_to: "PlanningAgent + LearningAgent"
              dependencies: []
              skills: ["knowledge_base:read", "pattern_matching"]
              output: "Historical patterns and best practices loaded"

            # Phase 2: Requirements Analysis
            - block_id: "B2"
              name: "analyze_requirements"
              assigned_to: "PlanningAgent"
              dependencies: ["B1"]
              skills: ["requirement_analysis", "architecture_analysis"]
              output: "Requirements understanding and constraints identification"

            # Phase 3: Architecture Design
            - block_id: "B3"
              name: "design_architecture"
              assigned_to: "PlanningAgent"
              dependencies: ["B2"]
              skills: ["blueprint_design", "architecture_consistency_check"]
              output: "System architecture design"

            # Phase 4: Parallel Output Generation
            - block_id: "B4"
              name: "create_api_contract"
              assigned_to: "PlanningAgent + DocAgent"
              dependencies: ["B3"]
              skills: ["api_contract_design", "openapi_specification"]
              output: "OpenAPI 3.0 specification"

            - block_id: "B5"
              name: "create_architecture_diagrams"
              assigned_to: "PlanningAgent + DocAgent"
              dependencies: ["B3"]
              skills: ["architecture_visualization", "mermaid_diagrams"]
              output: "Mermaid architecture diagrams"

            - block_id: "B6"
              name: "breakdown_tasks"
              assigned_to: "PlanningAgent"
              dependencies: ["B3"]
              skills: ["task_decomposition", "dependency_analysis"]
              output: "Hierarchical task list (task.md)"

            # Phase 5: Security Review
            - block_id: "B7"
              name: "security_review"
              assigned_to: "SecurityAgent"
              dependencies: ["B3"]
              skills: ["threat_modeling", "security_architecture_review"]
              output: "Security architecture review comments"

            # Phase 6: Blueprint PR Creation
            - block_id: "B8"
              name: "create_blueprint_pr"
              assigned_to: "PlanningAgent"
              dependencies: ["B4", "B5", "B6", "B7"]
              skills: ["git_operations", "documentation_generation"]
              output: "Blueprint PR for HITL Gate 1"
              validators:
                - type: "git_diff_check"
                  min_files_changed: 3
                - type: "file_exists"
                  path: "docs/architecture/*.md"

          execution_order: "B1 → B2 → B3 → (B4 + B5 + B6 parallel) + B7 → B8"

      # Step 4: Confirm Completion and Deliver Output
      step_4:
        action: "Confirm Completion + Deliver Output"
        deliverables:
          - type: "github_issue_update"
            content:
              parent_issue: "GH-17"
              status: "In Progress → Done"
              comments:
                - "✅ load_context (PlanningAgent + LearningAgent) - Complete"
                - "✅ analyze_requirements (PlanningAgent) - Complete"
                - "✅ design_architecture (PlanningAgent) - Complete"
                - "✅ create_api_contract (PlanningAgent + DocAgent) - Complete"
                - "✅ create_architecture_diagrams (PlanningAgent + DocAgent) - Complete"
                - "✅ breakdown_tasks (PlanningAgent) - Complete"
                - "✅ security_review (SecurityAgent) - Complete"
                - "✅ create_blueprint_pr (PlanningAgent) - Complete"
                - ""
                - "📊 **Summary:**"
                - "- Architecture design completed"
                - "- API contract defined (OpenAPI 3.0)"
                - "- Task breakdown generated"
                - "- Security review completed"
                - "- Blueprint PR created"
                - "- **Ready for HITL Gate 1 review**"
              labels:
                remove: ["in-progress"]
                add: ["completed", "ready-for-hitl-gate-1"]

          - type: "artifact"
            artifact_type: "architecture_blueprint"
            content:
              blueprint_id: "bp_architecture_blueprint_design.1.0.0"
              blueprint_name: "Architecture Design Blueprint"
              execution_start: "2026-03-26T12:00:00Z"
              execution_end: "2026-03-26T14:30:00Z"
              duration_hours: 2.5
              status: "success"

              blocks_executed:
                - block_id: "B1"
                  name: "load_context"
                  agents: ["PlanningAgent", "LearningAgent"]
                  status: "completed"
                  duration_minutes: 15
                  artifacts: ["context_report.md"]

                - block_id: "B2"
                  name: "analyze_requirements"
                  agent: "PlanningAgent"
                  status: "completed"
                  duration_minutes: 20
                  artifacts: ["requirements_analysis.md"]

                - block_id: "B3"
                  name: "design_architecture"
                  agent: "PlanningAgent"
                  status: "completed"
                  duration_minutes: 45
                  artifacts: ["architecture_design.md"]

                - block_id: "B4"
                  name: "create_api_contract"
                  agents: ["PlanningAgent", "DocAgent"]
                  status: "completed"
                  duration_minutes: 30
                  artifacts: ["api_contract_openapi.yaml"]

                - block_id: "B5"
                  name: "create_architecture_diagrams"
                  agents: ["PlanningAgent", "DocAgent"]
                  status: "completed"
                  duration_minutes: 25
                  artifacts: ["architecture_diagrams.mmd"]

                - block_id: "B6"
                  name: "breakdown_tasks"
                  agent: "PlanningAgent"
                  status: "completed"
                  duration_minutes: 20
                  artifacts: ["task.md"]

                - block_id: "B7"
                  name: "security_review"
                  agent: "SecurityAgent"
                  status: "completed"
                  duration_minutes: 15
                  artifacts: ["security_review_comments.md"]

                - block_id: "B8"
                  name: "create_blueprint_pr"
                  agent: "PlanningAgent"
                  status: "completed"
                  duration_minutes: 10
                  artifacts: ["Blueprint PR #XX"]

              output_artifacts:
                - artifact_id: "artifact-arch-001"
                  type: "architecture_design"
                  name: "Architecture Design Document"
                  storage_location: "github://centific-cn/AgenticSDLC/docs/architecture/architecture_design.md"

                - artifact_id: "artifact-arch-002"
                  type: "api_contract"
                  name: "API Contract (OpenAPI 3.0)"
                  storage_location: "github://centific-cn/AgenticSDLC/docs/api/api_contract_openapi.yaml"

                - artifact_id: "artifact-arch-003"
                  type: "task_breakdown"
                  name: "Task List"
                  storage_location: "github://centific-cn/AgenticSDLC/docs/tasks/task.md"

                - artifact_id: "artifact-arch-004"
                  type: "architecture_diagrams"
                  name: "Architecture Diagrams (Mermaid)"
                  storage_location: "github://centific-cn/AgenticSDLC/docs/diagrams/architecture_diagrams.mmd"

                - artifact_id: "artifact-arch-005"
                  type: "security_review"
                  name: "Security Review Comments"
                  storage_location: "github://centific-cn/AgenticSDLC/docs/reviews/security_review.md"

              metrics:
                total_blocks: 8
                completed_blocks: 8
                failed_blocks: 0
                total_tokens_used: 25000
                total_cost_usd: 1.25
                design_quality_score: "excellent"
                security_compliance: "OWASP Top 10 compliant"

      # Step 5: Audit and Governance Decision (Pre-HITL Gate 1)
      step_5:
        action: "Audit Agents → Generate Audit Report"
        phase_1_parallel_audits:
          - agent: "SecurityAuditAgent"
            scope: "安全审计"
            checks:
              - "架构安全设计": "passed"
              - "威胁建模": "passed"
              - "OWASP Top 10 合规": "passed"
              - "安全最佳实践": "passed"
            output: "SecurityAuditReport Artifact"
            status: "passed"

          - agent: "QualityAuditAgent"
            scope: "质量审计"
            checks:
              - "架构一致性": "passed"
              - "API 合约完整性": "passed"
              - "任务分解合理性": "passed"
              - "文档完整性": "passed"
            output: "QualityAuditReport Artifact"
            status: "passed"

          - agent: "ComplianceAuditAgent"
            scope: "合规审计"
            checks:
              - "架构标准合规": "passed"
              - "命名规范合规": "passed"
              - "文档标准合规": "passed"
            output: "ComplianceAuditReport Artifact"
            status: "passed"

          - agent: "CostAuditAgent"
            scope: "成本审计"
            checks:
              - "Token 使用": "25000 ≤ 50000 = passed"
              - "执行时间": "2.5h ≤ 4h = passed"
            output: "CostAuditReport Artifact"
            status: "passed"

        phase_2_governance_decision:
          inputs:
            - "Architecture Blueprint Report"
            - "SecurityAuditReport"
            - "QualityAuditReport"
            - "ComplianceAuditReport"
            - "CostAuditReport"

          gates_check:
            quality_gate:
              condition: "all_quality_checks_passed"
              actual: "all checks passed"
              status: "passed"

            security_gate:
              condition: "security_compliance = OWASP Top 10"
              actual: "fully compliant"
              status: "passed"

            compliance_gate:
              condition: "all_compliance_checks_passed"
              actual: "all checks passed"
              status: "passed"

            budget_gate:
              condition: "total_cost_usd ≤ budget_usd"
              actual: "$1.25 ≤ $5.00"
              status: "passed"

          final_decision:
            status: "passed"
            reason: "所有 gates 通过，Architecture Blueprint 创建成功"
            action: "允许进入 HITL Gate 1（人类审查架构设计）"

  # ================================================================
  # 7. Completion Criteria and Output
  # ================================================================
  completion:
    # Acceptance Criteria
    acceptance_criteria:
      architectural:
        - "架构设计完整且符合需求"
        - "系统组件定义清晰"
        - "数据模型完整"
        - "接口定义明确"
        - "安全考虑充分"

      api_contract:
        - "OpenAPI 3.0 规范完整"
        - "所有端点已定义"
        - "数据模型已定义"
        - "错误处理已定义"
        - "认证/授权已定义"

      task_breakdown:
        - "任务分解可执行"
        - "任务依赖关系清晰"
        - "任务粒度适中"
        - "优先级合理"

      documentation:
        - "架构图清晰展示组件关系"
        - "设计决策有理有据"
        - "文档结构完整"

      process:
        - "Blueprint PR 已创建"
        - "所有制品已提交到仓库"
        - "等待 HITL Gate 1 审查"

    # Output Artifacts
    artifacts:
      # Documentation Artifacts
      documentation_artifacts:
        - artifact_type: "architecture_design"
          name: "架构设计文档"
          storage_location: "docs/architecture/architecture_design.md"
          format: "Markdown"
          content:
            sections:
              - "系统架构概述"
              - "组件设计"
              - "数据模型"
              - "接口定义"
              - "安全考虑"
              - "技术栈选择"
              - "设计决策记录"

        - artifact_type: "api_contract"
          name: "API 合约 (OpenAPI)"
          storage_location: "docs/api/api_contract_openapi.yaml"
          format: "OpenAPI 3.0"
          content:
            endpoints:
              - "所有业务 API 端点"
              - "认证端点"
              - "管理端点"
            schemas:
              - "请求 schema"
              - "响应 schema"
              - "错误 schema"
            security:
              - "认证方案"
              - "授权方案"

        - artifact_type: "task_breakdown"
          name: "任务分解列表"
          storage_location: "docs/tasks/task.md"
          format: "Markdown"
          content:
            structure:
              - "阶段划分"
              - "任务列表"
              - "依赖关系"
              - "优先级"
              - "估算"

        - artifact_type: "architecture_diagram"
          name: "架构图"
          storage_location: "docs/diagrams/architecture_diagrams.mmd"
          format: "Mermaid"
          content:
            diagrams:
              - "系统架构图"
              - "组件交互图"
              - "数据流图"
              - "部署架构图"

        - artifact_type: "security_review"
          name: "安全评审意见"
          storage_location: "docs/reviews/security_review.md"
          format: "Markdown"
          content:
            sections:
              - "威胁建模"
              - "安全考虑"
              - "OWASP Top 10 合规检查"
              - "安全建议"

      # Report Artifacts
      report_artifacts:
        - artifact_type: "architecture_blueprint_report"
          name: "架构 Blueprint 执行报告"
          storage_location: "s3://artifacts/blueprint-reports/bp_architecture_blueprint_design.1.0.0.json"
          format: "JSON"

        - artifact_type: "audit_report"
          name: "审计报告"
          storage_location: "s3://artifacts/audit-reports/architecture_audit.json"
          format: "JSON"

    # Task Status Update
    status_updates:
      github_issues:
        parent_issue:
          issue_id: "GH-17"
          action: "Update progress"
          status_transition: "In Progress → Done"
          comments:
            - "✅ Architecture Blueprint completed"
            - "✅ All artifacts generated"
            - "✅ Ready for HITL Gate 1 review"
            - ""
            - "📊 **Summary:**"
            - "- Duration: 2.5 hours"
            - "- Artifacts: 5 documents generated"
            - "- Security: OWASP Top 10 compliant"
            - "- Quality: Excellent"
            - "- Next: Human review at HITL Gate 1"
          labels:
            remove: ["in-progress"]
            add: ["completed", "ready-for-hitl-gate-1"]

      git_operations:
        pull_requests:
          - pr_id: "PR-XX"
            action: "Create Blueprint PR"
            content: |
              # Architecture Blueprint for [Feature Name]

              ## Overview
              This PR contains the architecture design blueprint for [feature description].

              ## Artifacts
              - Architecture Design: `docs/architecture/architecture_design.md`
              - API Contract: `docs/api/api_contract_openapi.yaml`
              - Task Breakdown: `docs/tasks/task.md`
              - Architecture Diagrams: `docs/diagrams/architecture_diagrams.mmd`
              - Security Review: `docs/reviews/security_review.md`

              ## Blueprint Information
              - Blueprint ID: bp_architecture_blueprint_design.1.0.0
              - Execution Time: 2.5 hours
              - Quality Score: Excellent
              - Security: OWASP Top 10 compliant

              ## Next Steps
              - **HITL Gate 1**: Human review required before implementation
              - Upon approval, implementation agents will proceed with task breakdown

          - action: "Add labels"
            pr_id: "PR-XX"
            labels: ["blueprint", "hitl-gate-1", "architecture"]

          - action: "Request reviewers"
            pr_id: "PR-XX"
            reviewers: ["tech-lead", "architect-lead", "security-lead"]

      notifications:
