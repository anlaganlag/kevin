# Function Implementation Agent Blueprint
# Blueprint for generating FIP (Function Implementation Proposal) documents
# Coordinates multiple expert agents to create comprehensive implementation proposals

blueprint:
  # ================================================================
  # 1. Basic Information
  # ================================================================
  metadata:
    blueprint_id: "bp_function_implementation_fip_blueprint.1.0.0"
    blueprint_name: "Function Implementation Proposal (FIP) Generator"
    blueprint_type: "implementation"
    version: "1.0.0"
    created_at: "2026-03-26T17:30:00Z"
    created_by: "PlanningAgent"
    tags:
      - "implementation"
      - "fip"
      - "multi-agent"
      - "task-breakdown"
      - "coordination"

  # ================================================================
  # 2. Configuration Loading Declaration
  # ================================================================
  configuration:
    # Profile Reference
    profile:
      name: "default_profile"
      description: "Standard quality profile for FIP generation"

    # Rules Loading
    rules:
      # Load entire rule directories
      load_from:
        - ".agentic/rules/naming/"
        - ".agentic/rules/security/"
        - ".agentic/rules/architecture/"
        - ".agentic/rules/code_style/"
        - ".agentic/rules/testing/"

      # Specific rule files
      specific:
        - ".agentic/rules/naming/general.yaml"
        - ".agentic/rules/naming/go.yaml"
        - ".agentic/rules/security/owasp_top10.yaml"
        - ".agentic/rules/architecture/api_standards.yaml"
        - ".agentic/rules/testing/test_coverage.yaml"

      # FIP-specific inline rules
      inline:
        custom_rules:
          - name: "architecture_compliance"
            rule: "FIP must not break existing architecture rules and patterns"
            enforcement: "strict"
            validator: "architecture_compliance_checker"

          - name: "implementation_feasibility"
            rule: "All implementation proposals must be technically feasible"
            enforcement: "strict"
            validator: "feasibility_validator"

          - name: "task_breakdown_validity"
            rule: "Task breakdown must be complete, executable, and properly sequenced"
            enforcement: "strict"
            validator: "task_breakdown_validator"

          - name: "fip_completeness"
            rule: "FIP must contain all required sections and artifacts"
            enforcement: "strict"
            validator: "fip_completeness_checker"

    # Constraints Loading
    constraints:
      # Load entire constraint directories
      load_from:
        - ".agentic/constraints/infra/static/"
        - ".agentic/constraints/business/"

      # Specific constraint files
      specific:
        - ".agentic/constraints/infra/static/technical_stack.yaml"
        - ".agentic/constraints/business/api_standards.yaml"

      # FIP-specific inline constraints
      inline:
        technical_stack:
          go_version: ">= 1.21"
          typescript_version: ">= 5.0"
          node_version: ">= 20.x"

        architecture_constraints:
          must_follow_existing_patterns: true
          no_breaking_changes: true
          backward_compatibility: "required"

        fip_constraints:
          max_fip_sections: 15
          min_task_breakdown_depth: 3
          required_reviewers: ["architect", "tech_lead", "security"]

  # ================================================================
  # 3. Input Definition
  # ================================================================
  input:
    # Trigger Definition
    trigger:
      event_type: "IssueCreatedEvent | ArchitectureApprovedEvent"
      event_source: "github"
      event_schema:
        issue_id: "18"
        issue_type: "task"
        labels: ["implementation", "fip", "documentation"]
        priority: "high"
        description: "Create Function Implementation Proposal (FIP) Blueprint"

    # Task Type Mapping
    task_mapping:
      implementation:
        primary_phase: "design_and_breakdown"
        entry_point: "PlanningAgent"

    # Input Context
    context:
      source_documents:
        - type: "GitHub Issue"
          location: "github://centific-cn/AgenticSDLC/issues/18"
          required: true
          description: "Issue containing FIP generation request"

        - type: "Business Requirements"
          location: "requirements/brd_*.md"
          required: true
          description: "Approved business requirements and user stories"

        - type: "Architecture Design"
          location: "docs/architecture/architecture_design.md"
          required: true
          description: "System architecture design and constraints"

        - type: "API Contracts"
          location: "docs/api/api_contract_openapi.yaml"
          required: true
          description: "API specifications and contracts"

        - type: "Existing Codebase"
          location: "github://centific-cn/AgenticSDLC/tree/main/src"
          required: true
          description: "Current implementation for context and consistency"

      data_sources:
        - "Git Repository (main branch)"
        - "Learning Agent Knowledge Base"
        - "Infrastructure State (Platform Agent)"
        - "Historical Implementation Patterns (Learning Agent)"

  # ================================================================
  # 4. Execution Agent Configuration
  # ================================================================
  execution:
    # Primary Agent Selection
    primary_agent:
      agent_type: "PlanningAgent"
      selection_logic:
        reasoning: |
          1. Issue type = "task" with label "implementation" → PlanningAgent
          2. Task requires multi-agent coordination → PlanningAgent as orchestrator
          3. Need architecture compliance check → PlanningAgent ensures rules not broken
          4. Output is implementation proposal → PlanningAgent's core competency
          → Decision: PlanningAgent as Primary Agent coordinating expert sub-agents

      responsibilities:
        - "Coordinate multi-agent FIP generation"
        - "Ensure architecture compliance"
        - "Validate technical feasibility"
        - "Consolidate expert inputs into cohesive FIP"
        - "Generate task breakdown for implementation"

    # Sub-Agents Coordination (Expert Panel)
    sub_agents:
      # 1. Architecture Expert
      - agent_type: "PlanningAgent"
        role: "Architecture Expert"
        phase: "architecture_design"
        responsibilities:
          - "Review existing architecture patterns"
          - "Ensure FIP doesn't break architecture rules"
          - "Design technical architecture for feature"
          - "Define component interfaces and interactions"
          - "Validate architectural consistency"
        coordination: "lead_and_review"

      # 2. R&D Leader
      - agent_type: "BuilderAgent"
        role: "R&D Leader"
        phase: "technical_leadership"
        responsibilities:
          - "Review technical approach and feasibility"
          - "Validate implementation strategy"
          - "Assess technical risks and dependencies"
          - "Provide development effort estimates"
          - "Review task breakdown for completeness"
        coordination: "consult_and_validate"

      # 3. Backend Expert
      - agent_type: "BuilderAgent"
        role: "Backend Development Expert"
        phase: "backend_design"
        responsibilities:
          - "Design backend API endpoints"
          - "Define data models and schemas"
          - "Specify business logic implementation"
          - "Design database interactions"
          - "Identify backend dependencies and services"
        coordination: "parallel_expert_input"

      # 4. Frontend Expert
      - agent_type: "BuilderAgent"
        role: "Frontend Development Expert"
        phase: "frontend_design"
        responsibilities:
          - "Design user interface components"
          - "Define frontend state management"
          - "Specify user interactions and flows"
          - "Design API integration patterns"
          - "Identify frontend dependencies and libraries"
        coordination: "parallel_expert_input"

      # 5. DevOps Expert
      - agent_type: "PlatformAgent"
        role: "DevOps Expert"
        phase: "infrastructure_design"
        responsibilities:
          - "Design deployment strategy"
          - "Define infrastructure requirements"
          - "Specify monitoring and logging needs"
          - "Design CI/CD pipeline modifications"
          - "Identify operational considerations"
        coordination: "parallel_expert_input"

      # 6. QA Expert
      - agent_type: "QAAgent"
        role: "Quality Assurance Expert"
        phase: "testing_strategy"
        responsibilities:
          - "Design comprehensive test strategy"
          - "Define test cases and coverage requirements"
          - "Specify testing tools and frameworks"
          - "Identify edge cases and boundary conditions"
          - "Design acceptance criteria validation"
        coordination: "parallel_expert_input"

  # ================================================================
  # 5. Capabilities and Tools Configuration
  # ================================================================
  capabilities:
    # Agent Skills
    agent_skills:
      PlanningAgent:
        - "architecture_design"
        - "multi_agent_coordination"
        - "architecture_compliance_check"
        - "technical_feasibility_analysis"
        - "fip_generation"
        - "task_breakdown"

      BuilderAgent:
        - "backend_api_design"
        - "frontend_ui_design"
        - "data_modeling"
        - "technical_leadership"
        - "effort_estimation"
        - "dependency_analysis"

      PlatformAgent:
        - "infrastructure_design"
        - "deployment_strategy"
        - "ci_cd_design"
        - "monitoring_design"
        - "operational_considerations"

      QAAgent:
        - "test_strategy_design"
        - "test_case_generation"
        - "coverage_analysis"
        - "edge_case_identification"
        - "acceptance_criteria_validation"

    # Tool Access Permissions
    tool_access:
      - tool: "github_api"
        permissions:
          - "issues:read/write"
          - "pull_requests:read/write"
          - "commits:read"
          - "repository:read"
          - "code:read"

      - tool: "bash_execution"
        permissions:
          - "command_execution"
          - "file_operations"
          - "directory_operations"

      - tool: "learning_agent_query"
        permissions:
          - "knowledge_base:read"
          - "pattern_matching"
          - "implementation_patterns:query"
          - "best_practices:query"

      - tool: "platform_agent_api"
        permissions:
          - "infra_state:read"
          - "technical_constraints:read"
          - "resource_quotas:read"

      - tool: "code_analysis"
        permissions:
          - "code_structure:analyze"
          - "dependencies:extract"
          - "patterns:identify"

      - tool: "documentation_generator"
        permissions:
          - "fip:generate"
          - "markdown:create"
          - "diagrams:generate"

  # ================================================================
  # 6. Task Execution Workflow
  # ================================================================
  workflow:
    # Ralph Loop 5-Step Execution Process
    ralph_loop:
      # Step 1: Confirm Primary Agent
      step_1:
        action: "PlannerAgent → Confirm PlanningAgent as Primary"
        input:
          issue_type: "task"
          issue_id: "18"
          labels: ["implementation", "fip", "documentation"]
          priority: "high"
        output: "PlanningAgent assigned as Primary Agent with multi-agent coordination role"
        decision_logic: |
          IF label == "implementation" AND label == "fip" THEN PlanningAgent
          ELSE IF issue_type == "task" THEN PlanningAgent
          ELSE BA_Agent (for requirements)

      # Step 2: Load Rules and Context
      step_2:
        action: "Primary Agent → Load Rules + Context"
        input_sources:
          - source: "Infra Dependency Layer (Static)"
            content:
              language_stack: ["Go 1.21+", "TypeScript 5.0+", "Node 20.x"]
              framework_versions:
                go: ">= 1.21"
                node: ">= 20.x"
              security_policies: "OWASP Top 10 compliance"
              architecture_patterns:
                - "Event-driven architecture"
                - "Microservices with service mesh"
                - "API Gateway pattern"
                - "5-layer EDA architecture"
                - "Ralph Loop event processing"

          - source: "Infra Dependency Layer (Dynamic)"
            content:
              resource_quotas:
                cpu_usage_percent: 45
                memory_usage_percent: 52
              deployment_status:
                environment: "staging"
                healthy_services: 12

          - source: "Learning Agent"
            content:
              implementation_patterns:
                - "Ralph Loop implementation"
                - "Multi-agent coordination"
                - "Event-driven workflows"
              successful_patterns:
                - "Blueprint-based implementation"
                - "HITL gate checkpoints"
                - "Parallel agent execution"
              lessons_learned:
                - "Never break architecture rules"
                - "Always validate architectural consistency"
                - "Document all technical decisions"

          - source: "Input Documents"
            content:
              issue_location: "github://centific-cn/AgenticSDLC/issues/18"
              requirements_location: "requirements/brd_*.md"
              architecture_location: "docs/architecture/architecture_design.md"
              api_contracts_location: "docs/api/api_contract_openapi.yaml"

        output: "Execution strategy formulated with full context and architecture constraints"

      # Step 3: Coordinate Sub-Agents (Expert Panel)
      step_3:
        action: "Primary Agent → Coordinate Expert Sub-Agents"
        coordination_model: "expert_panel_with_parallel_inputs"
        description: |
          Multi-agent coordination for FIP generation with expert panel approach:
          1. Architecture Expert leads and validates architectural consistency
          2. Parallel expert inputs from R&D, Backend, Frontend, DevOps, QA
          3. PlanningAgent consolidates all inputs into cohesive FIP
          4. Architecture compliance check at multiple stages
          5. Generate task breakdown from FIP

        dependency_graph:
          blocks:
            # --------------------------------------------------------
            # B1: Analyze Requirements + Load Architecture Context
            # --------------------------------------------------------
            - block_id: "B1"
              name: "analyze_requirements"
              assigned_to: "BuilderAgent"
              dependencies: []
              runner: "claude_cli"
              runner_config:
                cwd: "{{target_repo}}"
                model: ""
              timeout: 300
              max_retries: 1
              pre_check: "rm -f .kevin/analysis.md"
              prompt_template: |
                You are a Planning Agent / Architecture Expert creating a Function Implementation Proposal (FIP).
                You MUST create files as instructed. Do NOT ask questions. Just execute.

                {{learning_context}}

                ## Issue #{{issue_number}}: {{issue_title}}

                {{issue_body}}

                ## Instructions (execute ALL steps)

                1. Read the issue carefully and understand the feature/function requirements
                2. Create directory `.kevin/` if it does not exist: `mkdir -p .kevin`
                3. Explore the existing codebase to understand:
                   - Project architecture (monolith, microservices, modules)
                   - Tech stack (languages, frameworks, databases)
                   - Existing patterns (API design, data models, error handling)
                   - Deployment approach (Docker, K8s, serverless)
                   - Test setup and conventions
                4. Write an analysis to `.kevin/analysis.md` containing:
                   - Summary of what needs to be implemented
                   - Architecture context: how this fits into existing system
                   - Affected components / services / modules
                   - API design (endpoints, request/response schemas) if applicable
                   - Data model changes if applicable
                   - Security considerations
                   - Risk assessment (complexity, dependencies, breaking changes)
                5. Create a feature branch: `git checkout -b kevin/issue-{{issue_number}}`

                IMPORTANT: You MUST write `.kevin/analysis.md` before finishing.
                Do NOT implement anything yet. Only analyze.
              output: "Architecture analysis in .kevin/analysis.md + feature branch"
              validators:
                - type: "file_exists"
                  path: ".kevin/analysis.md"
              acceptance_criteria:
                - "Requirements understood and architecture context loaded"
                - "Feature branch created"

            # --------------------------------------------------------
            # B2: Generate FIP Document + Task Breakdown + Implement
            # --------------------------------------------------------
            - block_id: "B2"
              name: "generate_fip_and_implement"
              assigned_to: "BuilderAgent"
              dependencies: ["B1"]
              runner: "claude_cli"
              runner_config:
                cwd: "{{target_repo}}"
                model: ""
              timeout: 600
              max_retries: 2
              pre_check: "git diff --quiet HEAD -- . 2>/dev/null || git checkout -- . 2>/dev/null; git clean -fd --exclude=.kevin/ 2>/dev/null; true"
              prompt_template: |
                You are implementing a feature based on the architecture analysis on branch `kevin/issue-{{issue_number}}`.

                {{learning_context}}

                ## Context

                Read the analysis from `.kevin/analysis.md`.

                ## Instructions

                1. Read `.kevin/analysis.md` for architecture context and requirements
                2. Create `.kevin/fip.md` — the Function Implementation Proposal containing:
                   - Architecture design decisions
                   - Backend design: API endpoints, data models, service layer
                   - Frontend design (if applicable): components, state management
                   - Infrastructure considerations: deployment, monitoring
                   - QA strategy: test types needed, coverage targets
                   - Task breakdown: ordered list of implementation tasks with dependencies
                3. Implement the solution following the FIP:
                   - Write tests first for core functionality
                   - Implement the feature
                   - Ensure all tests pass
                   - Follow existing code patterns and conventions
                4. Commit with message: `feat: {{issue_title}} (resolves #{{issue_number}})`

                Follow existing code style and patterns in the repo.
              output: "FIP document + implementation committed to feature branch"
              validators:
                - type: "file_exists"
                  path: ".kevin/fip.md"
                - type: "git_diff_check"
                  min_files_changed: 1
                - type: "command"
                  run: "git log --oneline -1 | grep -q 'feat:'"
              acceptance_criteria:
                - "FIP document generated"
                - "Feature implemented with tests"
                - "Code committed to feature branch"

            # --------------------------------------------------------
            # B3: Create Pull Request
            # --------------------------------------------------------
            - block_id: "B3"
              name: "create_pull_request"
              assigned_to: "BuilderAgent"
              dependencies: ["B2"]
              runner: "shell"
              pre_check: ""
              runner_config:
                cwd: "{{target_repo}}"
                command: |
                  BRANCH="kevin/issue-{{issue_number}}"

                  # Check if PR is already merged → skip entirely
                  MERGED_PR=$(gh pr list --head "$BRANCH" --state merged --json number --jq '.[0].number' 2>/dev/null)
                  if [ -n "$MERGED_PR" ]; then echo "PR #$MERGED_PR already merged — skipping B3"; exit 0; fi

                  # Fetch remote refs
                  git fetch origin "$BRANCH" 2>/dev/null || true

                  # Push
                  git push --force-with-lease -u origin "$BRANCH"

                  # If open PR exists → just update it
                  EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null)
                  if [ -n "$EXISTING_PR" ]; then echo "PR #$EXISTING_PR updated"; exit 0; fi

                  # Create new PR
                  gh pr create \
                    --title "{{issue_title}}" \
                    --body "## Summary

                  Resolves {{repo_full}}#{{issue_number}}

                  ## Function Implementation Proposal

                  $(cat .kevin/fip.md 2>/dev/null | head -40)

                  ## Changes

                  $(git diff main...HEAD --stat)

                  ---
                  _Automated by Kevin via bp_function_implementation_fip_blueprint.1.0.0_"
              timeout: 120
              max_retries: 1
              validators:
                - type: "command"
                  run: "gh pr list --head kevin/issue-{{issue_number}} --json number --jq '.[0].number'"
              acceptance_criteria:
                - "PR created with FIP summary"
                - "PR linked to original issue"

          execution_order: "B1 → B2 → B3"

      # Step 4: Confirm Completion and Deliver Output
      step_4:
        action: "Confirm Completion + Deliver Output"
        deliverables:
          - type: "github_issue_update"
            content:
              parent_issue: "GH-18"
              status: "In Progress → Done"
              comments:
                - "✅ load_context_and_architecture (PlanningAgent) - Complete"
                - "✅ analyze_requirements (PlanningAgent) - Complete"
                - "✅ architecture_design (PlanningAgent - Architecture Expert) - Complete"
                - "✅ rnd_leadership_review (BuilderAgent - R&D Leader) - Complete"
                - "✅ backend_design (BuilderAgent - Backend Expert) - Complete"
                - "✅ frontend_design (BuilderAgent - Frontend Expert) - Complete"
                - "✅ devops_design (PlatformAgent - DevOps Expert) - Complete"
                - "✅ qa_strategy (QAAgent - QA Expert) - Complete"
                - "✅ architecture_compliance_check (PlanningAgent) - Complete"
                - "✅ consolidate_fip (PlanningAgent) - Complete"
                - "✅ generate_task_breakdown (PlanningAgent) - Complete"
                - "✅ final_review_and_output (PlanningAgent) - Complete"
                - ""
                - "📊 **Summary:**"
                - "- Multi-agent FIP generation completed"
                - "- 6 expert agents coordinated"
                - "- Architecture compliance validated"
                - "- Task breakdown generated"
                - "- Ready for implementation"

              labels:
                remove: ["in-progress"]
                add: ["completed", "fip-generated", "ready-for-implementation"]

          - type: "artifact"
            artifact_type: "fip_document"
            content:
              blueprint_id: "bp_function_implementation_fip_blueprint.1.0.0"
              blueprint_name: "Function Implementation Proposal Generator"
              execution_start: "2026-03-26T17:30:00Z"
              execution_end: "2026-03-26T20:00:00Z"
              duration_hours: 2.5
              status: "success"

              blocks_executed:
                - block_id: "B1"
                  name: "load_context_and_architecture"
                  agent: "PlanningAgent (Architecture Expert)"
                  role: "Lead"
                  status: "completed"
                  duration_minutes: 15
                  artifacts: ["architecture_constraints.md"]

                - block_id: "B2"
                  name: "analyze_requirements"
                  agent: "PlanningAgent"
                  status: "completed"
                  duration_minutes: 15
                  artifacts: ["requirements_analysis.md"]

                - block_id: "B3"
                  name: "architecture_design"
                  agent: "PlanningAgent (Architecture Expert)"
                  role: "Lead"
                  status: "completed"
                  duration_minutes: 30
                  artifacts: ["technical_architecture.md"]

                - block_id: "B4"
                  name: "rnd_leadership_review"
                  agent: "BuilderAgent (R&D Leader)"
                  role: "Consult"
                  status: "completed"
                  duration_minutes: 20
                  artifacts: ["tech_leadership_review.md"]

                - block_id: "B5"
                  name: "backend_design"
                  agent: "BuilderAgent (Backend Expert)"
                  role: "Parallel"
                  status: "completed"
                  duration_minutes: 25
                  artifacts: ["backend_design.md"]

                - block_id: "B6"
                  name: "frontend_design"
                  agent: "BuilderAgent (Frontend Expert)"
                  role: "Parallel"
                  status: "completed"
                  duration_minutes: 25
                  artifacts: ["frontend_design.md"]

                - block_id: "B7"
                  name: "devops_design"
                  agent: "PlatformAgent (DevOps Expert)"
                  role: "Parallel"
                  status: "completed"
                  duration_minutes: 20
                  artifacts: ["devops_design.md"]

                - block_id: "B8"
                  name: "qa_strategy"
                  agent: "QAAgent (QA Expert)"
                  role: "Parallel"
                  status: "completed"
                  duration_minutes: 20
                  artifacts: ["qa_strategy.md"]

                - block_id: "B9"
                  name: "architecture_compliance_check"
                  agent: "PlanningAgent (Architecture Expert)"
                  status: "completed"
                  duration_minutes: 10
                  artifacts: ["compliance_report.md"]

                - block_id: "B10"
                  name: "consolidate_fip"
                  agent: "PlanningAgent"
                  status: "completed"
                  duration_minutes: 20
                  artifacts: ["FIP.md"]

                - block_id: "B11"
                  name: "generate_task_breakdown"
                  agent: "PlanningAgent"
                  status: "completed"
                  duration_minutes: 15
                  artifacts: ["task_breakdown.md"]

                - block_id: "B12"
                  name: "final_review_and_output"
                  agent: "PlanningAgent"
                  status: "completed"
                  duration_minutes: 5
                  artifacts: ["final_fip_document.md"]

              output_artifacts:
                - artifact_id: "artifact-fip-001"
                  type: "fip_document"
                  name: "Function Implementation Proposal (FIP)"
                  storage_location: "docs/fips/FIP_[feature_name].md"
                  format: "Markdown"

                - artifact_id: "artifact-fip-002"
                  type: "task_breakdown"
                  name: "Implementation Task Breakdown"
                  storage_location: "docs/tasks/task_breakdown_[feature_name].md"
                  format: "Markdown"

                - artifact_id: "artifact-fip-003"
                  type: "architecture_design"
                  name: "Technical Architecture Design"
                  storage_location: "docs/architecture/technical_architecture_[feature_name].md"
                  format: "Markdown"

                - artifact_id: "artifact-fip-004"
                  type: "compliance_report"
                  name: "Architecture Compliance Report"
                  storage_location: "docs/reviews/compliance_report_[feature_name].md"
                  format: "Markdown"

              metrics:
                total_blocks: 12
                completed_blocks: 12
                failed_blocks: 0
                total_tokens_used: 45000
                total_cost_usd: 2.25
                agents_coordinated: 6
                architecture_compliance: "100% compliant"
                fip_quality_score: "excellent"

      # Step 5: Audit and Governance Decision
      step_5:
        action: "Audit Agents → Generate Audit Report"
        phase_1_parallel_audits:
          - agent: "SecurityAuditAgent"
            scope: "安全审计"
            checks:
              - "FIP 安全考虑": "passed"
              - "OWASP Top 10 合规": "passed"
              - "安全最佳实践": "passed"
            output: "SecurityAuditReport Artifact"
            status: "passed"

          - agent: "QualityAuditAgent"
            scope: "质量审计"
            checks:
              - "FIP 完整性": "passed"
              - "任务分解合理性": "passed"
              - "技术可行性": "passed"
              - "架构一致性": "passed"
            output: "QualityAuditReport Artifact"
            status: "passed"

          - agent: "ComplianceAuditAgent"
            scope: "合规审计"
            checks:
              - "架构规则合规": "passed"
              - "命名规范合规": "passed"
              - "文档标准合规": "passed"
            output: "ComplianceAuditReport Artifact"
            status: "passed"

          - agent: "ArchitectureAuditAgent"
            scope: "架构审计"
            checks:
              - "架构规则遵循": "passed"
              - "无破坏性变更": "passed"
              - "向后兼容性": "passed"
              - "一致性检查": "passed"
            output: "ArchitectureAuditReport Artifact"
            status: "passed"

          - agent: "CostAuditAgent"
            scope: "成本审计"
            checks:
              - "Token 使用": "45000 ≤ 60000 = passed"
              - "执行时间": "2.5h ≤ 4h = passed"
            output: "CostAuditReport Artifact"
            status: "passed"

        phase_2_governance_decision:
          inputs:
            - "FIP Generation Report"
            - "SecurityAuditReport"
            - "QualityAuditReport"
            - "ComplianceAuditReport"
            - "ArchitectureAuditReport"
            - "CostAuditReport"

          gates_check:
            quality_gate:
              condition: "all_quality_checks_passed AND fip_complete"
              actual: "all checks passed, FIP complete"
              status: "passed"

            security_gate:
              condition: "security_compliance = OWASP Top 10"
              actual: "fully compliant"
              status: "passed"

            architecture_gate:
              condition: "architecture_rules_followed AND no_breaking_changes"
              actual: "all rules followed, no breaking changes"
              status: "passed"

            compliance_gate:
              condition: "all_compliance_checks_passed"
              actual: "all checks passed"
              status: "passed"

            budget_gate:
              condition: "total_cost_usd ≤ budget_usd"
              actual: "$2.25 ≤ $8.00"
              status: "passed"

          final_decision:
            status: "passed"
            reason: "所有 gates 通过，FIP 生成成功且架构合规"
            action: "FIP 文档已生成，可用于开发任务拆解和实施"

  # ================================================================
  # 7. Completion Criteria and Output
  # ================================================================
  completion:
    # Acceptance Criteria
    acceptance_criteria:
      fip_completeness:
        - "FIP 文档包含所有必需章节"
        - "功能概述清晰完整"
        - "技术方案详细可行"
        - "架构设计符合现有规则"
        - "API 设计完整"
        - "数据模型定义清晰"
        - "前端设计明确"
        - "后端实现方案详细"
        - "测试策略全面"
        - "部署方案可行"

      task_breakdown:
        - "任务分解完整可执行"
        - "任务依赖关系清晰"
        - "任务粒度适中"
        - "优先级合理"
        - "估算准确"
        - "资源需求明确"

      architecture_compliance:
        - "不破坏现有架构规则"
        - "遵循现有模式"
        - "保持向后兼容"
        - "一致性检查通过"

      multi_agent_coordination:
        - "所有专家 Agent 参与贡献"
        - "架构师 Agent 领导和审查"
        - "R&D Leader 验证可行性"
        - "各专家输入已整合"
        - "输出一致连贯"

      process:
        - "FIP 文档已生成"
        - "任务拆解已完成"
        - "架构合规报告已生成"
        - "所有制品已提交到仓库"
        - "可用于实施阶段"

    # Output Artifacts
    artifacts:
      # Documentation Artifacts
      documentation_artifacts:
        - artifact_type: "fip_document"
          name: "Function Implementation Proposal (FIP)"
          storage_location: "docs/fips/FIP_[feature_name].md"
          format: "Markdown"
          content:
            sections:
              - "1. Executive Summary"
              - "2. Function Overview"
              - "3. Business Requirements"
              - "4. Technical Architecture"
              - "5. API Design"
              - "6. Data Models"
              - "7. Frontend Design"
              - "8. Backend Implementation"
              - "9. Testing Strategy"
              - "10. Deployment Plan"
              - "11. Risk Assessment"
              - "12. Resource Requirements"
              - "13. Timeline and Milestones"
              - "14. Success Criteria"
              - "15. Appendices"

        - artifact_type: "task_breakdown"
          name: "Implementation Task Breakdown"
          storage_location: "docs/tasks/task_breakdown_[feature_name].md"
          format: "Markdown"
          content:
            structure:
              - "Phase 1: Preparation"
              - "Phase 2: Backend Implementation"
              - "Phase 3: Frontend Implementation"
              - "Phase 4: Integration"
              - "Phase 5: Testing"
              - "Phase 6: Deployment"
            task_details:
              - "Task ID"
              - "Task Name"
              - "Description"
              - "Dependencies"
              - "Assigned Agent"
              - "Estimated Hours"
              - "Priority"

        - artifact_type: "architecture_design"
          name: "Technical Architecture Design"
          storage_location: "docs/architecture/technical_architecture_[feature_name].md"
          format: "Markdown"
          content:
            sections:
              - "System Architecture"
              - "Component Design"
              - "Interface Definitions"
              - "Data Flow"
              - "Security Considerations"
              - "Performance Considerations"

        - artifact_type: "compliance_report"
          name: "Architecture Compliance Report"
          storage_location: "docs/reviews/compliance_report_[feature_name].md"
          format: "Markdown"
          content:
            sections:
              - "Architecture Rules Check"
              - "Pattern Consistency"
              - "Breaking Changes Analysis"
              - "Backward Compatibility"
              - "Recommendations"

      # Expert Input Artifacts
      expert_artifacts:
        - artifact_type: "backend_design"
          name: "Backend Design Document"
          storage_location: "docs/design/backend_[feature_name].md"
          format: "Markdown"
          author: "Backend Expert"

        - artifact_type: "frontend_design"
          name: "Frontend Design Document"
          storage_location: "docs/design/frontend_[feature_name].md"
          format: "Markdown"
          author: "Frontend Expert"

        - artifact_type: "devops_design"
          name: "DevOps Design Document"
          storage_location: "docs/design/devops_[feature_name].md"
          format: "Markdown"
          author: "DevOps Expert"

        - artifact_type: "qa_strategy"
          name: "QA Strategy Document"
          storage_location: "docs/qa/strategy_[feature_name].md"
          format: "Markdown"
          author: "QA Expert"

        - artifact_type: "tech_leadership_review"
          name: "Technical Leadership Review"
          storage_location: "docs/reviews/tech_leadership_[feature_name].md"
          format: "Markdown"
          author: "R&D Leader"

      # Report Artifacts
      report_artifacts:
        - artifact_type: "fip_generation_report"
          name: "FIP 生成报告"
          storage_location: "s3://artifacts/fip-reports/bp_function_implementation_fip_blueprint.1.0.0.json"
          format: "JSON"

        - artifact_type: "audit_report"
          name: "审计报告"
          storage_location: "s3://artifacts/audit-reports/fip_generation_audit.json"
          format: "JSON"

    # Task Status Update
    status_updates:
      github_issues:
        parent_issue:
          issue_id: "GH-18"
          action: "Update progress"
          status_transition: "In Progress → Done"
          comments:
            - "✅ FIP 生成完成"
            - "✅ 多 Agent 协调成功"
            - "✅ 架构合规验证通过"
            - "✅ 任务拆解已生成"
            - ""
            - "📊 **Summary:**"
            - "- Duration: 2.5 hours"
            - "- Experts coordinated: 6"
            - "- Architecture compliance: 100%"
            - "- FIP quality: Excellent"
            - "- Ready for implementation"

          labels:
            remove: ["in-progress"]
            add: ["completed", "fip-generated", "ready-for-implementation"]

      git_operations:
        pull_requests:
          - pr_id: "PR-XX"
            action: "Create FIP PR"
            content: |
              # Function Implementation Proposal (FIP)

              ## Overview
              This PR contains the Function Implementation Proposal (FIP) for [feature description].

              ## FIP Document
              - **FIP**: `docs/fips/FIP_[feature_name].md`
              - **Task Breakdown**: `docs/tasks/task_breakdown_[feature_name].md`
              - **Architecture**: `docs/architecture/technical_architecture_[feature_name].md`
              - **Compliance**: `docs/reviews/compliance_report_[feature_name].md`

              ## Expert Inputs
              - **Backend**: `docs/design/backend_[feature_name].md`
              - **Frontend**: `docs/design/frontend_[feature_name].md`
              - **DevOps**: `docs/design/devops_[feature_name].md`
              - **QA**: `docs/qa/strategy_[feature_name].md`
              - **Tech Leadership**: `docs/reviews/tech_leadership_[feature_name].md`

              ## Blueprint Information
              - Blueprint ID: bp_function_implementation_fip_blueprint.1.0.0
              - Execution Time: 2.5 hours
              - Agents Coordinated: 6
              - Architecture Compliance: 100%
              - Quality Score: Excellent

              ## Next Steps
              - Review FIP document
              - Validate task breakdown
              - Begin implementation phase

          - action: "Add labels"
            pr_id: "PR-XX"
            labels: ["fip", "multi-agent", "architecture-compliant"]

          - action: "Request reviewers"
            pr_id: "PR-XX"
            reviewers: ["architect", "tech-lead", "security-lead"]

      notifications:
        channels:
          - channel: "slack"
            message: |
              ✅ FIP 生成完成

              **Blueprint ID**: bp_function_implementation_fip_blueprint.1.0.0
              **Status**: Ready for implementation
              **Duration**: 2.5 hours
              **Experts**: 6 agents coordinated
              **Architecture Compliance**: 100%

              **PR**: #XX
              **Review**: [Link to PR]

          - channel: "email"
            recipients: ["stakeholders@centific.com", "dev-team@centific.com"]
            subject: "[FIP Generated] Function Implementation Proposal Ready"
            body: |
              Function Implementation Proposal has been generated and is ready for implementation.

              Details:
              - Blueprint: bp_function_implementation_fip_blueprint.1.0.0
              - PR: #XX
              - Status: Ready for implementation
              - Architecture: 100% compliant

  # ================================================================
  # 8. Metrics
  # ================================================================
  metrics:
    # Execution Metrics
    execution:
