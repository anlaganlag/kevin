  # ================================================================
  # 9. Risk Management
  # ================================================================
  risk_management:
    # Risk Identification
    risks:
      - risk_id: "R001"
        risk_type: "coordination"
        description: "多 Agent 协调可能出现冲突"
        probability: "low"
        impact: "medium"
        mitigation: "Architecture Agent 作为 leader 统一协调，R&D Leader 咨询验证"
        status: "mitigated"

      - risk_id: "R002"
        risk_type: "architecture"
        description: "可能破坏现有架构规则"
        probability: "low"
        impact: "critical"
        mitigation: "多层架构合规检查，Architecture Agent 领导和审查"
        status: "mitigated"

      - risk_id: "R003"
        risk_type: "quality"
        description: "专家输入可能不一致"
        probability: "medium"
        impact: "medium"
        mitigation: "PlanningAgent 整合所有输入，确保一致性和连贯性"
        status: "mitigated"

      - risk_id: "R004"
        risk_type: "feasibility"
        description: "技术方案可能不可行"
        probability: "low"
        impact: "high"
        mitigation: "R&D Leader 进行可行性审查和风险评估"
        status: "mitigated"

    # Escalation Triggers
    escalation_triggers:
      - trigger: "architecture_violation"
        condition: "architecture_compliance < 100%"
        action: "阻止生成，要求修复架构违规"

      - trigger: "expert_conflict"
        condition: "expert_inputs_not_reconcilable"
        action: "请求人工协调和决策"

      - trigger: "feasibility_failure"
        condition: "technical_feasibility = false"
        action: "重新设计技术方案"

    # Escalation Process
    escalation_process:
      step_1: "系统暂停自动化执行"
      step_2: "生成 EscalationRequiredEvent"
      step_3: "创建 Issue 用于人工干预"
      step_4: "提供上下文和建议"
      step_5: "等待人工解决"

  # ================================================================
  # 10. Configuration and Parameters
  # ================================================================
  config:
    # Risk Level
    risk_level: "medium"

    # Requires Architecture Compliance
    requires_architecture_compliance: true
    architecture_compliance_verified: true

    # Multi-Agent Configuration
    multi_agent:
      coordinator: "PlanningAgent (Architecture Expert)"
      consultants: ["BuilderAgent (R&D Leader)"]
      parallel_experts: ["Backend", "Frontend", "DevOps", "QA"]
      total_agents: 6

    # Parallelism
    parallelism:
      max_parallel_blocks: 5  # For parallel expert inputs
      max_parallel_agents: 4  # Backend, Frontend, DevOps, QA
      actual_parallelism: 4

    # Timeouts
    timeouts:
      block_timeout: "1h"
      blueprint_timeout: "4h"
      agent_timeout: "45m"
      actual_execution_time: "2.5h"

    # Retry Strategy
    retry:
      max_retries: 2
      retry_delay: "5m"
      backoff_multiplier: 2
      actual_retries: 0

    # Notification Configuration
    notifications:
      on_start: true
      on_complete: true
      on_failure: true
      channels: ["slack", "email"]
      notifications_sent: 2

