# Blueprint Block Template
# Blueprint 由可重用的 Blocks 组成
# 每个 Block 定义了一个独立的执行单元

block:
  # ================================================================
  # 1. 基本信息
  # ================================================================
  metadata:
    # Block ID 命名格式: BLOCK-{domain}-{agent_type}-{action}-{sequence}
    # 示例: BLOCK-AUTH-PLANNING-ARCHITECTURE-DESIGN-001
    block_id: "BLOCK-{domain}-{agent_type}-{action}-{sequence}"
    block_name: "Block 名称"
    block_type: "development | verification | deployment | documentation | operations"
    version: "1.0.0"
    created_by: "agent_id"
    tags:
      - "tag1"
      - "tag2"

  # ================================================================
  # 2. 执行配置
  # ================================================================
  execution:
    # 负责执行的 Agent
    assigned_to: "BA_Agent | PlanningAgent | BuilderAgent | QAAgent | SecurityAgent | PlatformAgent | SREAgent | DocAgent | LearningAgent"

    # 执行阶段
    phase: "analysis | design | implementation | verification | deployment | documentation"

    # 依赖的 Blocks
    dependencies:
      - "BLOCK-B1"
      - "BLOCK-B2"

    # 超时设置 (block 级别统一字段)
    timeout: "2h"

    # 最大重试次数 (block 级别统一字段，替代 error_handling.max_retries)
    max_retries: 3

    # ----------------------------------------------------------------
    # 执行后端 (Kevin 编排器使用)
    # ----------------------------------------------------------------
    # runner 声明此 Block 由哪种执行后端运行
    # 缺省值: claude_cli (向后兼容，不写 runner = claude_cli)
    runner: "claude_cli | shell | api_call"

    # ----------------------------------------------------------------
    # 幂等性重置 (Kevin 编排器: resume/retry 前执行)
    # ----------------------------------------------------------------
    # pre_check 是一条 shell 命令，在 Block 每次（重新）执行前运行。
    # 用途：清理上次失败留下的半成品，确保工作区干净。
    # 如果 pre_check 返回非零退出码，Block 直接标记失败。
    # 示例:
    #   pre_check: "git checkout . && git clean -fd"    # 恢复所有未提交修改
    #   pre_check: "rm -f .kevin/analysis.md"           # 删除旧产物
    pre_check: ""

    # runner 类型特有参数 (不含 timeout/max_retries，这些用 block 级别字段)
    runner_config:
      # --- claude_cli 类型 ---
      # cwd: "{{target_repo}}"       # Claude Code CLI 工作目录
      # model: "opus"                 # 可选，指定模型
      # context_filter:               # 上下文预算管理 (gitignore 风格排除列表)
      #   - "node_modules"            # 排除巨大目录，避免上下文窗口溢出
      #   - "dist"
      #   - "*.min.js"
      #   - "tests/fixtures"

      # --- shell 类型 ---
      # cwd: "{{target_repo}}"       # shell 命令工作目录
      # command: "pytest tests/ --tb=short"

      # --- api_call 类型 ---
      # method: "POST"
      # url: "https://api.example.com/analyze"
      # headers:
      #   Authorization: "Bearer {{token}}"
      #   Content-Type: "application/json"
      # body:
      #   input: "{{previous_block_output}}"

  # ================================================================
  # 3. 输入
  # ================================================================
  input:
    # 来自上一个 Block 的输出
    from_previous_blocks:
      - block_id: "BLOCK-B1"
        artifacts:
          - "blueprint.yaml"
          - "api_contract.yaml"

    # 外部输入
    external_inputs:
      - source: "github://owner/repo/main"
        type: "code"
        description: "当前代码库状态"

      - source: "Learning Agent"
        type: "knowledge"
        description: "历史模式和最佳实践"

  # ================================================================
  # 4. 技能和工具
  # ================================================================
  capabilities:
    required_skills:
      - "skill1"
      - "skill2"

    required_tools:
      - tool: "github_api"
        actions: ["read", "write"]

      - tool: "bash_execution"
        actions: ["command_execution"]

  # ================================================================
  # 5. 执行步骤
  # ================================================================
  steps:
    - step_id: "S1"
      action: "步骤描述"
      tool: "tool_name"
      input: "输入描述"
      output: "输出描述"

    - step_id: "S2"
      action: "步骤描述"
      tool: "tool_name"
      input: "输入描述"
      output: "输出描述"

  # ================================================================
  # 6. 输出
  # ================================================================
  output:
    artifacts:
      - artifact_type: "blueprint | code | test_report | security_scan | api_doc | deployment_manifest"
        name: "制品名称"
        storage_location: "s3://artifacts/..."
        format: "JSON | YAML | text"

    events:
      - event_type: "BlockCompletedEvent"
        payload:
          block_id: "BLOCK-xxx"
          status: "completed"
          artifacts: ["artifact1", "artifact2"]

  # ================================================================
  # 7. 验证器 (机器可执行的自动检查)
  # ================================================================
  # validators 在 Block 执行完成后自动运行
  # 失败时根据 execution.max_retries 决定重试或终止
  validators:
    # L1: Git 变更检查 — 确认 Block 产生了文件变更
    - type: "git_diff_check"
      min_files_changed: 1            # 最少变更文件数

    # L2: 命令门禁 — 运行 shell 命令，exit_code == 0 视为通过
    - type: "command"
      run: "pytest tests/ --tb=short"
      # timeout: 60                   # 可选，秒

    # L3: 文件存在检查 — 确认预期产出文件已生成
    - type: "file_exists"
      path: "src/health.py"           # 支持 glob 模式

  # ================================================================
  # 8. 验收条件 (人类可读的验收标准)
  # ================================================================
  # acceptance_criteria 与 validators 共存:
  #   validators = 机器可执行的自动检查
  #   acceptance_criteria = 人类可读的验收标准
  acceptance_criteria:
    - "验收条件1"
    - "验收条件2"

  # ================================================================
  # 9. 度量指标
  # ================================================================
  metrics:
    - metric_name: "execution_time"
      target: "≤ 2h"

    - metric_name: "token_usage"
      target: "≤ 10000"

  # ================================================================
  # 10. 错误处理
  # ================================================================
  error_handling:
    on_failure:
      action: "retry | escalate | abort"
      # max_retries 已提升到 execution 级别 (execution.max_retries)
      escalation_trigger: "连续失败达到 max_retries 次"

# ================================================================
# Block Template 结束
# ================================================================
